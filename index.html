let SOCIO_NODES=[], SOCIO_EDGES=[], SOCIO_ANIM=null,
    SOCIO_DRAG=null, SOCIO_DRAG_OFF={x:0,y:0},
    SOCIO_SPOTLIGHT=null, SOCIO_SHOW_PULSE=true,
    SOCIO_DRAG_MODE='free',   // 'free' | 'group' | 'lasso' | 'physics'
    SOCIO_VIEW_MODE='normal', // 'normal' | 'risk'
    SOCIO_DRAG_SNAPSHOT=null, // grup modunda bağlı düğüm ofsetleri
    SOCIO_LASSO={active:false,x0:0,y0:0,x1:0,y1:0}, // kement koordinatları
    SOCIO_LASSO_SEL=new Set(); // kementle seçilen düğüm idleri
const SOCIO_W=900, SOCIO_H=620;

function bindSociogramPage(project) {
  const svg = document.getElementById('socio-svg');
  if (!svg) return;
  const active = project.participants.filter(p => p.active);
  const pm = project.analysis?.pulseMetrics || null;
  const ZERO = {receivedChoices:0,receivedRejections:0,sentChoices:0,
                sentRejections:0,mutualChoices:0,mutualRejections:0,netChoiceScore:0};
  let currentFilter = 'all';

  // ── Yardımcılar ─────────────────────────────────────────────────────────
  function getPulseScore(pid) { return pm?.personPulseScores?.[pid] ?? null; }
  function pulseRingColor(s) {
    if (s===null) return null;
    return s>=75?'#0e7c5b':s>=50?'#b45309':'#c0392b';
  }
  function getRiskColor(pid) {
    // Risk modunda düğüm rengi risk skoruna göre
    const m = project.analysis.personMetrics.find(x=>x.participantId===pid);
    const ps = getPulseScore(pid);
    let risk = 0;
    if (m?.isolationType==='tam') risk+=40;
    else if (m?.isolationType==='tek-yonlu') risk+=20;
    if ((m?.receivedRejections||0)>=3) risk+=20;
    else if ((m?.receivedRejections||0)>=1) risk+=10;
    if (ps!==null) { if(ps<40)risk+=40; else if(ps<60)risk+=20; else if(ps<75)risk+=10; }
    risk=Math.min(risk,100);
    if (risk>=70) return '#c0392b';
    if (risk>=40) return '#b45309';
    return '#0e7c5b';
  }
  function getFilteredRelations(qid) {
    return qid&&qid!=='all'
      ? project.analysis.relations.filter(r=>r.questionId===qid)
      : project.analysis.relations;
  }
  function buildMetricsMap(rels) {
    const map = new Map(active.map(p=>[p.id,{...ZERO}]));
    for (const r of rels) {
      const f=map.get(r.from)||{...ZERO}, t=map.get(r.to)||{...ZERO};
      if(r.type==='seçim'){f.sentChoices++;t.receivedChoices++;}
      else{f.sentRejections++;t.receivedRejections++;}
      map.set(r.from,f); map.set(r.to,t);
    }
    for (const [,m] of map) m.netChoiceScore=(m.receivedChoices||0)-(m.receivedRejections||0);
    return map;
  }
  function nodeSize(m) { return Math.max(16,Math.min(34,16+(m.receivedChoices||0)*2.5)); }

  function initNodes() {
    const mm = buildMetricsMap(getFilteredRelations(currentFilter));
    SOCIO_NODES = active.map((p,i) => {
      const angle=2*Math.PI*i/Math.max(active.length,1);
      const radius=Math.min(220,Math.max(120,active.length*16));
      return {id:p.id, label:participantName(project,p.id), code:p.values.code||'',
              gender:(p.values.gender||'').toLowerCase(),
              x:SOCIO_W/2+radius*Math.cos(angle), y:SOCIO_H/2+radius*Math.sin(angle),
              vx:0, vy:0, m:mm.get(p.id)||{...ZERO}};
    });
  }
  function refreshNodeMetrics() {
    const mm=buildMetricsMap(getFilteredRelations(currentFilter));
    SOCIO_NODES=SOCIO_NODES.map(n=>({...n,m:mm.get(n.id)||{...ZERO}}));
  }
  function buildEdges(qid) {
    const rels=getFilteredRelations(qid); const seen=new Set(); SOCIO_EDGES=[];
    for (const r of rels) {
      const mutual=rels.some(r2=>r2.from===r.to&&r2.to===r.from&&r2.type===r.type);
      if (mutual) {
        const pk=[r.from,r.to].sort().join('_')+'_'+r.type+'_m';
        if(seen.has(pk)) continue; seen.add(pk);
        SOCIO_EDGES.push({from:r.from,to:r.to,type:r.type,mutual:true,isAlgi:r.isAlgi||false});
      } else {
        const key=r.from+'_'+r.to+'_'+r.type;
        if(seen.has(key)) continue; seen.add(key);
        SOCIO_EDGES.push({from:r.from,to:r.to,type:r.type,mutual:false,isAlgi:r.isAlgi||false});
      }
    }
  }

  // Bir düğüme bağlı tüm düğümleri bul (seçim + itme)
  function getConnectedIds(pid) {
    const ids = new Set([pid]);
    for (const e of SOCIO_EDGES) {
      if (e.from===pid) ids.add(e.to);
      if (e.to===pid)   ids.add(e.from);
    }
    return ids;
  }

  // ── SVG Çiz ─────────────────────────────────────────────────────────────
  function drawSVG() {
    const nmap=new Map(SOCIO_NODES.map(n=>[n.id,n]));
    const spotConn = SOCIO_SPOTLIGHT
      ? new Set(SOCIO_EDGES.filter(e=>e.from===SOCIO_SPOTLIGHT||e.to===SOCIO_SPOTLIGHT).flatMap(e=>[e.from,e.to]))
      : null;

    let html=`<defs>
      <marker id="ac" markerWidth="7" markerHeight="7" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L7,3z" fill="#2d6a4f"/></marker>
      <marker id="ac-s" markerWidth="7" markerHeight="7" refX="0" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M7,0 L7,6 L0,3z" fill="#2d6a4f"/></marker>
      <marker id="ar" markerWidth="7" markerHeight="7" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L7,3z" fill="#c0392b"/></marker>
      <marker id="ar-s" markerWidth="7" markerHeight="7" refX="0" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M7,0 L7,6 L0,3z" fill="#c0392b"/></marker>
    </defs>`;

    // Kement seçim alanı SVG içinde
    if (SOCIO_DRAG_MODE==='lasso' && SOCIO_LASSO.active) {
      const lx=Math.min(SOCIO_LASSO.x0,SOCIO_LASSO.x1);
      const ly=Math.min(SOCIO_LASSO.y0,SOCIO_LASSO.y1);
      const lw=Math.abs(SOCIO_LASSO.x1-SOCIO_LASSO.x0);
      const lh=Math.abs(SOCIO_LASSO.y1-SOCIO_LASSO.y0);
      html+=`<rect x="${lx}" y="${ly}" width="${lw}" height="${lh}"
        fill="rgba(26,86,160,.06)" stroke="var(--accent)"
        stroke-width="1.5" stroke-dasharray="6,3" rx="4"/>`;
    }

    // Kenarlar
    for (const e of SOCIO_EDGES) {
      const a=nmap.get(e.from), b=nmap.get(e.to); if(!a||!b) continue;
      const edgeActive=!SOCIO_SPOTLIGHT||e.from===SOCIO_SPOTLIGHT||e.to===SOCIO_SPOTLIGHT;
      const op=edgeActive?1:0.05;
      const dx=b.x-a.x, dy=b.y-a.y, d=Math.sqrt(dx*dx+dy*dy)||1;
      const ux=dx/d, uy=dy/d;
      const sx=a.x+ux*(nodeSize(a.m)+6), sy=a.y+uy*(nodeSize(a.m)+6);
      const ex=b.x-ux*(nodeSize(b.m)+6), ey=b.y-uy*(nodeSize(b.m)+6);
      // Algılanan ilişkiler: farklı renk tonu ve noktalı çizgi
      const col=e.isAlgi
        ? (e.type==='seçim'?'#6366f1':'#f97316')   // mor=algılanan seçim, turuncu=algılanan itme
        : (e.type==='seçim'?'#2d6a4f':'#c0392b');   // yeşil=seçim, kırmızı=itme
      const dash=e.isAlgi
        ? 'stroke-dasharray="3,3"'                   // algılanan: kısa noktalı
        : (e.type==='itme'?'stroke-dasharray="5,4"':''); // itme: uzun kesik
      const strokeW=e.isAlgi?'1':'';
      const mEnd=e.type==='seçim'?'ac':'ar';
      const mSt=e.type==='seçim'?'ac-s':'ar-s';
      if (e.mutual) {
        const px=-uy*24, py=ux*24;
        const cx=(sx+ex)/2+px, cy=(sy+ey)/2+py;
        html+=`<path d="M${sx},${sy} Q${cx},${cy} ${ex},${ey}" stroke="${col}" stroke-width="${e.isAlgi?'1.2':'2.5'}" ${dash} fill="none" opacity="${op*(e.isAlgi?0.55:0.75)}" marker-start="url(#${mSt})" marker-end="url(#${mEnd})"/>`;
      } else {
        html+=`<path d="M${sx},${sy} L${ex},${ey}" stroke="${col}" stroke-width="${e.isAlgi?'1':'1.5'}" ${dash} fill="none" opacity="${op*(e.isAlgi?0.5:0.65)}" marker-end="url(#${mEnd})"/>`;
      }
    }

    // Düğümler
    for (const n of SOCIO_NODES) {
      const sz=nodeSize(n.m);
      const isActive=!SOCIO_SPOTLIGHT||n.id===SOCIO_SPOTLIGHT||(spotConn&&spotConn.has(n.id));
      const op=isActive?1:0.15;
      const isFemale=n.gender.includes('kad');
      const isLassoSel=SOCIO_LASSO_SEL.has(n.id);

      // Risk modu vs normal
      let fill;
      if (SOCIO_VIEW_MODE==='risk') {
        fill = getRiskColor(n.id);
      } else {
        const net=(n.m.receivedChoices||0)-(n.m.receivedRejections||0);
        fill=net>0?`hsl(140,${35+net*5}%,${72-net*3}%)`:net<0?`hsl(0,${35+Math.abs(net)*5}%,${78-Math.abs(net)*2}%)`:'#e8e6e0';
      }

      const pulseScore=getPulseScore(n.id);
      const ringColor=SOCIO_SHOW_PULSE?pulseRingColor(pulseScore):null;
      const ringW=4, ringR=sz+ringW+1;

      // Kement seçili düğüm ek halkası
      const selStroke=isLassoSel?'var(--accent)':'';
      const selStrokeW=isLassoSel?3:0;

      html+=`<g transform="translate(${n.x},${n.y})" data-id="${n.id}" class="snode" style="cursor:${SOCIO_DRAG_MODE==='lasso'?'crosshair':'grab'};opacity:${op}">`;

      // Kement seçim halkası
      if (isLassoSel) {
        if (isFemale) html+=`<circle cx="0" cy="0" r="${sz+8}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-dasharray="4,2" opacity="0.7"/>`;
        else html+=`<polygon points="0,${-(sz+8)} ${(sz+8)*.866},${(sz+8)*.5} ${-(sz+8)*.866},${(sz+8)*.5}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-dasharray="4,2" opacity="0.7"/>`;
      }

      // Pulse halkası
      if (ringColor) {
        if (isFemale) html+=`<circle cx="0" cy="0" r="${ringR}" fill="none" stroke="${ringColor}" stroke-width="${ringW}" opacity="0.85"/>`;
        else html+=`<polygon points="0,${-ringR} ${ringR*.866},${ringR*.5} ${-ringR*.866},${ringR*.5}" fill="none" stroke="${ringColor}" stroke-width="${ringW}" opacity="0.85"/>`;
      }

      // Gövde
      if (isFemale) html+=`<circle cx="0" cy="0" r="${sz}" fill="${fill}" stroke="${isLassoSel?'var(--accent)':'#888'}" stroke-width="${isLassoSel?2.5:1.5}"/>`;
      else html+=`<polygon points="0,${-sz} ${sz*.866},${sz*.5} ${-sz*.866},${sz*.5}" fill="${fill}" stroke="${isLassoSel?'var(--accent)':'#888'}" stroke-width="${isLassoSel?2.5:1.5}"/>`;

      // Seçilme sayısı
      if ((n.m.receivedChoices||0)>0) {
        const dy=isFemale?'4':String(Math.round(sz*.17));
        html+=`<text text-anchor="middle" dy="${dy}" font-size="11" font-weight="bold" fill="white" pointer-events="none">${n.m.receivedChoices}</text>`;
      }

      // Pulse % (sadece normal modda)
      if (SOCIO_SHOW_PULSE && pulseScore!==null && SOCIO_VIEW_MODE==='normal') {
        html+=`<text text-anchor="middle" dy="${sz+24}" font-size="9" fill="${ringColor||'#888'}" font-weight="700" pointer-events="none">${pulseScore}%</text>`;
      }

      // Risk modu: risk skoru göster
      if (SOCIO_VIEW_MODE==='risk') {
        const m=project.analysis.personMetrics.find(x=>x.participantId===n.id);
        const ps=getPulseScore(n.id);
        let r2=0;
        if(m?.isolationType==='tam')r2+=40;else if(m?.isolationType==='tek-yonlu')r2+=20;
        if((m?.receivedRejections||0)>=3)r2+=20;else if((m?.receivedRejections||0)>=1)r2+=10;
        if(ps!==null){if(ps<40)r2+=40;else if(ps<60)r2+=20;else if(ps<75)r2+=10;}
        r2=Math.min(r2,100);
        if (r2>0) html+=`<text text-anchor="middle" dy="${sz+14}" font-size="9" fill="${fill}" font-weight="800" pointer-events="none">⚠${r2}</text>`;
      }

      const labelDy=(SOCIO_SHOW_PULSE&&pulseScore!==null&&SOCIO_VIEW_MODE==='normal')?sz+34:sz+13;
      const label=esc(n.code||n.label.split(' ')[0]);
      html+=`<text text-anchor="middle" dy="${labelDy}" font-size="10" fill="#555" pointer-events="none">${label}</text>`;
      html+=`</g>`;
    }

    svg.innerHTML=html;

    // Düğüm event'leri
    svg.querySelectorAll('.snode').forEach(g=>{
      g.addEventListener('mousedown', e=>{
        if (SOCIO_DRAG_MODE==='lasso') return; // kement modda düğüme tıklama drag başlatmaz
        SOCIO_DRAG=g.dataset.id;
        const r=svg.getBoundingClientRect();
        const nd=SOCIO_NODES.find(n=>n.id===SOCIO_DRAG);
        const scX=SOCIO_W/r.width, scY=SOCIO_H/r.height;
        SOCIO_DRAG_OFF={x:(e.clientX-r.left)*scX-nd.x, y:(e.clientY-r.top)*scY-nd.y};

        // Grup modu: bağlı düğümlerin offset anlık görüntüsü
        if (SOCIO_DRAG_MODE==='group') {
          const connIds=getConnectedIds(SOCIO_DRAG);
          SOCIO_DRAG_SNAPSHOT={};
          for (const cid of connIds) {
            const cn=SOCIO_NODES.find(n=>n.id===cid);
            if (cn) SOCIO_DRAG_SNAPSHOT[cid]={dx:cn.x-nd.x, dy:cn.y-nd.y};
          }
        } else if (SOCIO_DRAG_MODE==='lasso' && SOCIO_LASSO_SEL.size>0) {
          // Kement seçili düğümler grupça sürüklenir
          SOCIO_DRAG_SNAPSHOT={};
          for (const cid of SOCIO_LASSO_SEL) {
            const cn=SOCIO_NODES.find(n=>n.id===cid);
            if (cn) SOCIO_DRAG_SNAPSHOT[cid]={dx:cn.x-nd.x, dy:cn.y-nd.y};
          }
        } else {
          SOCIO_DRAG_SNAPSHOT=null;
        }

        if(SOCIO_ANIM) cancelAnimationFrame(SOCIO_ANIM);
        e.preventDefault();
      });

      g.addEventListener('click', e=>{
        if (SOCIO_DRAG_MODE==='lasso') return;
        if (Math.abs(e.movementX)+Math.abs(e.movementY)<3) {
          const id=g.dataset.id;
          if (SOCIO_SPOTLIGHT===id) { SOCIO_SPOTLIGHT=null; closeDetailPanel(); }
          else { SOCIO_SPOTLIGHT=id; showDetailPanel(project,id); }
          drawSVG();
        }
      });
    });
  }

  // ── Force simulation ─────────────────────────────────────────────────────
  function runForce() {
    if(SOCIO_ANIM) cancelAnimationFrame(SOCIO_ANIM);
    let frame=0;
    function tick(){
      if(frame++>250) return; // daha fazla iterasyon → daha iyi ayrışma
      const nmap=new Map(SOCIO_NODES.map(n=>[n.id,n]));

      for(let i=0;i<SOCIO_NODES.length;i++){
        SOCIO_NODES[i].vx=0; SOCIO_NODES[i].vy=0;
        for(let j=0;j<SOCIO_NODES.length;j++){
          if(i===j) continue;
          const dx=SOCIO_NODES[i].x-SOCIO_NODES[j].x;
          const dy=SOCIO_NODES[i].y-SOCIO_NODES[j].y;
          const d=Math.sqrt(dx*dx+dy*dy)||1;

          // Normal itme kuvveti
          const f=4500/(d*d);
          SOCIO_NODES[i].vx+=dx/d*f;
          SOCIO_NODES[i].vy+=dy/d*f;

          // Çakışma önleme: düğümler arası min mesafe
          const ni=SOCIO_NODES[i], nj=SOCIO_NODES[j];
          const minDist=nodeSize(ni.m)+nodeSize(nj.m)+28; // iki düğüm yarıçapı + boşluk
          if(d < minDist){
            const overlap=(minDist-d)/2;
            const push=overlap*0.8; // güçlü it
            ni.vx+=dx/d*push;
            ni.vy+=dy/d*push;
          }
        }
      }

      // Kenar çekme kuvveti — bağlı düğümleri yaklaştır
      for(const e of SOCIO_EDGES){
        const a=nmap.get(e.from), b=nmap.get(e.to); if(!a||!b) continue;
        const dx=b.x-a.x, dy=b.y-a.y;
        const d=Math.sqrt(dx*dx+dy*dy)||1;
        const idealDist=e.type==='seçim'?130:160; // seçim bağları biraz daha yakın
        const f=(d-idealDist)*0.018;
        a.vx+=dx/d*f; a.vy+=dy/d*f;
        b.vx-=dx/d*f; b.vy-=dy/d*f;
      }

      // Merkeze hafif çekiş + pozisyon güncelle
      const cooling=Math.max(0.3, 1-frame/250); // zamanla yavaşla
      for(const n of SOCIO_NODES){
        n.vx+=(SOCIO_W/2-n.x)*0.003;
        n.vy+=(SOCIO_H/2-n.y)*0.003;
        n.x=Math.max(50,Math.min(SOCIO_W-50, n.x+n.vx*0.5*cooling));
        n.y=Math.max(50,Math.min(SOCIO_H-50, n.y+n.vy*0.5*cooling));
      }

      drawSVG();
      SOCIO_ANIM=requestAnimationFrame(tick);
    }
    SOCIO_ANIM=requestAnimationFrame(tick);
  }

  // ── Mouse olayları ───────────────────────────────────────────────────────
  let lassoStartSVG={x:0,y:0};

  function svgCoords(e) {
    const r=svg.getBoundingClientRect();

      x:(e.clientX-r.left)*(SOCIO_W/r.width),
      y:(e.clientY-r.top)*(SOCIO_H/r.height)

  svg.addEventListener('mousedown', e=>{
    if(SOCIO_DRAG_MODE!=='lasso') return;
    if(e.target.closest('.snode')) return; // düğüme tıklandıysa pas geç
    const sc=svgCoords(e);
    SOCIO_LASSO={active:true,x0:sc.x,y0:sc.y,x1:sc.x,y1:sc.y};
    lassoStartSVG=sc;
    SOCIO_LASSO_SEL.clear();
    e.preventDefault();
  });

  document.addEventListener('mousemove', e=>{
    if(SOCIO_DRAG) {
      const r=svg.getBoundingClientRect();
      const scX=SOCIO_W/r.width, scY=SOCIO_H/r.height;
      const nx=Math.max(40,Math.min(SOCIO_W-40,(e.clientX-r.left)*scX-SOCIO_DRAG_OFF.x));
      const ny=Math.max(40,Math.min(SOCIO_H-40,(e.clientY-r.top)*scY-SOCIO_DRAG_OFF.y));
      const n=SOCIO_NODES.find(n=>n.id===SOCIO_DRAG);
      if(!n) return;
      if((SOCIO_DRAG_MODE==='group'||SOCIO_DRAG_MODE==='lasso') && SOCIO_DRAG_SNAPSHOT) {
        // Tüm bağlı/seçili düğümleri birlikte taşı
        for(const[cid,off] of Object.entries(SOCIO_DRAG_SNAPSHOT)){
          const cn=SOCIO_NODES.find(x=>x.id===cid);
          if(cn){cn.x=Math.max(40,Math.min(SOCIO_W-40,nx+off.dx));cn.y=Math.max(40,Math.min(SOCIO_H-40,ny+off.dy));}
        }
      } else if(SOCIO_DRAG_MODE==='physics') {
        // ── Fizik modu: soru türüne göre kuvvet ──────────────────
        n.x=nx; n.y=ny;

        // Seçili soru tipini bul
        const filterVal = currentFilter;
        const filteredQ = project.questions.find(q=>q.id===filterVal);
        const filterCat = filteredQ ? filteredQ.category : 'all';

        // Kuvvet parametreleri soru türüne göre
        // attract: pozitif = çek, repel: pozitif = it
        // Her soru türü için { attract, repel, algiAttract, algiRepel }
        const FORCES = {
          'all':              { attract:0.12, repel:0.10, algiAttract:0.05, algiRepel:0.04 },
          'seçim':            { attract:0.18, repel:0,    algiAttract:0,    algiRepel:0    },
          'itme':             { attract:0,    repel:0.16, algiAttract:0,    algiRepel:0    },
          'algılanan-seçim':  { attract:0,    repel:0,    algiAttract:0.12, algiRepel:0    },
          'algılanan-itme':   { attract:0,    repel:0,    algiAttract:0,    algiRepel:0.10 },
        };
        const F = FORCES[filterCat] || FORCES['all'];

        for(const e of SOCIO_EDGES){
          let force=0;

          // Yön mantığı:
          // Seçim (A→B): A sürüklenince B gelir, B sürüklenince A gelmez
          // İtme  (A→B): A sürüklenince B kaçar, B sürüklenince A kaçmaz
          // Karşılıklı seçim (mutual): her ikisi de gelir

          const dragIsFrom = e.from === SOCIO_DRAG;
          const dragIsTo   = e.to   === SOCIO_DRAG;
          if(!dragIsFrom && !dragIsTo) continue;

          // otherId: sürüklenmeyen taraf
          const otherId = dragIsFrom ? e.to : e.from;
          const other = SOCIO_NODES.find(x=>x.id===otherId);
          if(!other) continue;

          const dx=n.x-other.x, dy=n.y-other.y;
          const dist=Math.sqrt(dx*dx+dy*dy)||1;

          if(!e.isAlgi) {
            if(e.type==='seçim' && F.attract>0){
              // Seçim: sadece seçen (from) sürüklenince seçilen (to) gelir
              // Karşılıklı seçimde (mutual) her iki yönde de çalışır
              if(dragIsFrom || e.mutual){
                force=F.attract*(dist>120?1:0.3);
                other.x=Math.max(40,Math.min(SOCIO_W-40,other.x+dx/dist*force*20));
                other.y=Math.max(40,Math.min(SOCIO_H-40,other.y+dy/dist*force*20));
              }
            } else if(e.type==='itme' && F.repel>0){
              // İtme: sadece iten (from) sürüklenince itilen (to) kaçar
              if(dragIsFrom){
                force=F.repel*(dist<150?1:0.2);
                other.x=Math.max(40,Math.min(SOCIO_W-40,other.x-dx/dist*force*20));
                other.y=Math.max(40,Math.min(SOCIO_H-40,other.y-dy/dist*force*20));
              }
            }
          } else {
            // Algılanan ilişki — daha zayıf, aynı yön mantığı
            if(e.type==='seçim' && F.algiAttract>0){
              if(dragIsFrom || e.mutual){
                force=F.algiAttract*(dist>120?1:0.3);
                other.x=Math.max(40,Math.min(SOCIO_W-40,other.x+dx/dist*force*20));
                other.y=Math.max(40,Math.min(SOCIO_H-40,other.y+dy/dist*force*20));
                }
            } else if(e.type==='itme' && F.algiRepel>0){
              force=F.algiRepel*(dist<150?1:0.2);
              other.x=Math.max(40,Math.min(SOCIO_W-40,other.x-dx/dist*force*20));
              other.y=Math.max(40,Math.min(SOCIO_H-40,other.y-dy/dist*force*20));
            }
          }
        }
      } else {
        n.x=nx; n.y=ny;
      }
      drawSVG();
    } else if(SOCIO_DRAG_MODE==='lasso' && SOCIO_LASSO.active) {
      const sc=svgCoords(e);
      SOCIO_LASSO.x1=sc.x; SOCIO_LASSO.y1=sc.y;
      // Hangi düğümler kement içinde?
      const lx0=Math.min(SOCIO_LASSO.x0,sc.x), lx1=Math.max(SOCIO_LASSO.x0,sc.x);
      const ly0=Math.min(SOCIO_LASSO.y0,sc.y), ly1=Math.max(SOCIO_LASSO.y0,sc.y);
      SOCIO_LASSO_SEL.clear();
      for(const n of SOCIO_NODES){
        if(n.x>=lx0&&n.x<=lx1&&n.y>=ly0&&n.y<=ly1) SOCIO_LASSO_SEL.add(n.id);
      }
      drawSVG();
    }
  });

  document.addEventListener('mouseup', ()=>{
    SOCIO_DRAG=null;
    SOCIO_DRAG_SNAPSHOT=null;
    if(SOCIO_LASSO.active){
      SOCIO_LASSO.active=false;
      // Kement bitti: seçili düğümler SOCIO_LASSO_SEL'de kalır, birlikte taşınabilir
      drawSVG();
    }
  });

  // ── Kontroller ───────────────────────────────────────────────────────────
  document.getElementById('mode-free')?.addEventListener('click', ()=>setDragMode('free'));
  document.getElementById('mode-group')?.addEventListener('click', ()=>setDragMode('group'));
  document.getElementById('mode-lasso')?.addEventListener('click', ()=>setDragMode('lasso'));
  document.getElementById('mode-physics')?.addEventListener('click', ()=>{
    setDragMode('physics');
    // Fizik modunda otomatik yerleşim çalışmasın —
    // kuvvetler sadece sürükleme sırasında işlesin
    if(SOCIO_ANIM){ cancelAnimationFrame(SOCIO_ANIM); SOCIO_ANIM=null; }
    drawSVG();
  });
  document.getElementById('view-normal')?.addEventListener('click', ()=>setViewMode('normal'));
  document.getElementById('view-risk')?.addEventListener('click', ()=>setViewMode('risk'));

  const filterSel=document.getElementById('socio-filter');
  if(filterSel) filterSel.onchange=()=>{
    currentFilter=filterSel.value; SOCIO_SPOTLIGHT=null; closeDetailPanel();
    buildEdges(currentFilter); refreshNodeMetrics(); drawSVG();
  };

  const searchInput=document.getElementById('socio-search');
  if(searchInput) searchInput.oninput=()=>{
    const q=searchInput.value.trim().toLowerCase();
    if(!q){SOCIO_SPOTLIGHT=null;drawSVG();return;}
    const found=SOCIO_NODES.find(n=>n.label.toLowerCase().includes(q));
    if(found){SOCIO_SPOTLIGHT=found.id;showDetailPanel(project,found.id);drawSVG();}
  };

  const pulseToggle=document.getElementById('pulse-layer-toggle');
  if(pulseToggle){
    SOCIO_SHOW_PULSE=pulseToggle.checked;
    pulseToggle.onchange=()=>{SOCIO_SHOW_PULSE=pulseToggle.checked;drawSVG();};
  }

  document.getElementById('reset-socio-layout')?.addEventListener('click', ()=>{
    SOCIO_SPOTLIGHT=null; SOCIO_LASSO_SEL.clear(); closeDetailPanel();
    initNodes(); buildEdges(currentFilter); runForce();
  });

  const dlBtn=document.getElementById('download-svg-btn');
  if(dlBtn) dlBtn.onclick=()=>{
    const svgEl=document.getElementById('socio-svg'); if(!svgEl) return;
    const svgData=new XMLSerializer().serializeToString(svgEl);
    const canvas=document.createElement('canvas'); canvas.width=1800; canvas.height=1240;
    const ctx=canvas.getContext('2d'); ctx.fillStyle='#f8fbff'; ctx.fillRect(0,0,1800,1240);
    const img=new Image();
    const blob=new Blob([svgData],{type:'image/svg+xml'});
    const url=URL.createObjectURL(blob);
    img.onload=()=>{ctx.drawImage(img,0,0,1800,1240);URL.revokeObjectURL(url);const a=document.createElement('a');a.download='sosyogram.png';a.href=canvas.toDataURL('image/png');a.click();};
    img.src=url;
  };

  // ── Başlat ───────────────────────────────────────────────────────────────
  initNodes(); buildEdges(currentFilter); runForce();
}

function calcRiskScore(metric, pulseScore, scaleScores) {
  if (!metric) return 0;
  let risk = 0;
  if (metric.isolationType === 'tam') risk += 40;
  else if (metric.isolationType === 'tek-yonlu') risk += 20;
  if ((metric.receivedRejections || 0) >= 3) risk += 20;
  else if ((metric.receivedRejections || 0) >= 1) risk += 10;
  if (pulseScore !== null && pulseScore !== undefined) {
    if (pulseScore < 40) risk += 15;
    else if (pulseScore < 60) risk += 8;
    else if (pulseScore < 75) risk += 4;
  }
  // Klinik ölçek (BDI/CDI) skoru varsa risk'e ekle
  if (scaleScores) {
    for (const [sid, s] of Object.entries(scaleScores)) {
      if (!s) continue;
      const pct = s.total / s.maxPossible; // 0-1 arası
      if (pct >= 0.65) risk += 25;       // Şiddetli
      else if (pct >= 0.45) risk += 15;  // Orta
      else if (pct >= 0.25) risk += 8;   // Hafif
    }
  }
  return Math.min(risk, 100);
}

function getRuleBasedIntervention(metric, pulseScore, scaleScores) {
  const sss = metric?.sss || 0;
  const iso = metric?.isolationType;
  const rr = metric?.receivedRejections || 0;
  const risk = calcRiskScore(metric, pulseScore, scaleScores);

  // Klinik ölçek şiddetli ise her şeyden önce belirt
  if (scaleScores) {
    for (const [sid, s] of Object.entries(scaleScores)) {
      if (!s) continue;
      const pct = s.total / s.maxPossible;
      if (pct >= 0.65) {
        const scaleName = sid === 'bdi' ? 'BDI' : sid === 'cdi' ? 'CDI' : sid.toUpperCase();
        if (iso === 'tam' || iso === 'tek-yonlu') {
          return { oncelik: '🔴 Acil', eylem: `${scaleName} şiddetli + sosyal izolasyon`, detay: `${scaleName} puanı şiddetli düzeyde (${s.label}) ve kişi sosyal olarak izole. Bu birliktelik ciddi risk taşıyor. Uzman değerlendirmesi ve bire bir görüşme için öncelikli randevu oluştur.` };
        }
        return { oncelik: '🔴 Acil', eylem: `${scaleName} şiddetli puan — uzman değerlendirmesi`, detay: `${scaleName} puanı şiddetli düzeyde (${s.label}). Sosyometrik konum da dikkate alındığında acil bireysel görüşme gerekli. Okul/kurum psikoloğu ile koordineli çalış.` };
      }
      if (pct >= 0.45 && (iso || rr >= 2)) {
        const scaleName = sid === 'bdi' ? 'BDI' : sid === 'cdi' ? 'CDI' : sid.toUpperCase();
        return { oncelik: '🔴 Acil', eylem: `${scaleName} orta + olumsuz sosyal konum`, detay: `${scaleName} orta düzey (${s.label}) ile sosyal dışlanma birlikte seyretmekte. Bu kombinasyon risk faktörlerini artırıyor. Öncelikli bireysel görüşme planla.` };
      }
    }
  }

  if (risk >= 70) {
    if (iso === 'tam') return { oncelik: '🔴 Acil', eylem: 'Birebir görüşme planla', detay: 'Güvenilir bir mentorla eşleştir. Neden izole olduğunu anlamak için birebir, yargısız bir görüşme yap. Küçük grup aktivitelerine kademeli dahil et.' };
    if (iso === 'tek-yonlu') return { oncelik: '🔴 Acil', eylem: 'Sosyal bağ kurmasını destekle', detay: 'Seçim yaptığı kişilerle ortak etkinlik ver. Olumlu geri bildirim fırsatları yarat. Grup dinamiklerini gözlemle.' };
    if (rr >= 3) return { oncelik: '🔴 Acil', eylem: 'Çatışma analizi yap', detay: 'Yüksek itilme ciddi çatışmaya işaret ediyor. Bireysel görüşme ve gerekirse arabuluculuk süreci başlat.' };
    return { oncelik: '🔴 Acil', eylem: 'Destek görüşmesi planla', detay: 'Olumsuz sosyometrik konum birleşik değerlendirilmeli. Kapsamlı bireysel görüşme yap.' };
  }
  if (risk >= 40) {
    if (sss >= 0.3) return { oncelik: '🟡 Orta', eylem: 'Overload riskini değerlendir', detay: 'Merkezi kişi yoruluyor olabilir. Üstlendiği rolleri listele, gerekirse sorumluluk devri planla.' };
    if (iso) return { oncelik: '🟡 Orta', eylem: 'Köprü ilişkisi kur', detay: 'Ortak etkinlik veya proje öner. İzole kişiyi merkezi bir kişiyle eşleştir.' };
    return { oncelik: '🟡 Orta', eylem: 'Periyodik takip başlat', detay: 'Pulse ve ölçek skorlarını düzenli izle. Düşüş devam ederse bireysel görüşmeye geç.' };
  }
  if (sss >= 0.3 && (pulseScore === null || pulseScore >= 75)) {
    return { oncelik: '🟢 İyi', eylem: 'Mentor/model olarak konumlandır', detay: 'Yıldız kişi. Yeni üyelere mentor olabilir, etkinliklerde öne çıkarılabilir.' };
  }
  return { oncelik: '🟢 Düşük', eylem: 'İzlemeye devam', detay: 'Mevcut durumu koru. Periyodik takipte kal.' };
}

        const iv = getRuleBasedIntervention(m, pulseScore, scaleScoresEx);
        return {
          kisi: participantName(project, m.participantId),
          sss: m.sss || 0,
          aldigi_secim: m.receivedChoices,
          aldigi_itme: m.receivedRejections,
          izolasyon: m.isolationType || '—',
          pulse_skoru: pulseScore ?? '—',
          ...(pm?.personScaleScores?.[m.participantId] ? Object.fromEntries(Object.entries(pm.personScaleScores[m.participantId]).filter(([,s])=>s).map(([sid,s])=>[sid+'_puan', s.total+' ('+s.label+')'])) : {}),
          risk_skoru: risk,
          oncelik: iv.oncelik,
          eylem: iv.eylem,
          detay: iv.detay
        };
      }).sort((a, b) => b.risk_skoru - a.risk_skoru);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rows), 'Mudahale_Onerileri');
      XLSX.writeFile(wb, `${project.name}_mudahale.xlsx`);
    };
  }

  // Bireysel AI önerisi
  document.querySelectorAll('[data-ai-pid]').forEach(btn => {
    btn.onclick = async () => {
      const pid = btn.dataset.aiPid;
      const resultDiv = document.getElementById('ai-result-' + pid);
      const m = metrics.find(x => x.participantId === pid);
      const p = active.find(x => x.id === pid);
      const pulseScore = pm?.personPulseScores?.[pid] ?? null;
      const scaleScoresBtn = pm?.personScaleScores?.[pid] ?? null;
      const risk = calcRiskScore(m, pulseScore, scaleScoresBtn);

      btn.disabled = true;
      btn.textContent = '⏳ Analiz ediliyor…';
      resultDiv.innerHTML = '';

      // Pulse boyut skorları
      const resp = project.responses.find(r => r.respondentId === pid && r.status !== 'excluded');
      const dimScores = {};
      const PULSE_DIM_LABELS = { 'psikolojik-guvenlik': 'Psikolojik Güvenlik', 'motivasyon': 'Motivasyon', 'is-yuku': 'İş Yükü', 'takim-uyumu': 'Takım Uyumu', 'yonetici-iliskisi': 'Yönetici İlişkisi', 'genel': 'Genel' };
      if (resp) {
        for (const q of project.questions.filter(q => q.category === 'pulse-scale')) {
          const ans = (resp.answers || []).find(a => a.questionId === q.id);
          if (ans && ans.numericValue !== undefined) {
            const dim = q.pulseDimension || 'genel';
            const pct = Math.round((ans.numericValue / (q.pulseMax || 5)) * 100);
            if (!dimScores[dim]) dimScores[dim] = [];
            dimScores[dim].push(pct);
          }
        }
      }
      const dimSummary = Object.entries(dimScores).map(([dim, vals]) => {
        const avg = Math.round(vals.reduce((s, v) => s + v, 0) / vals.length);
        return `${PULSE_DIM_LABELS[dim] || dim}: ${avg}/100`;
      }).join(', ');

      // Scale özeti
      const scaleScoresSummary = pm?.personScaleScores?.[pid]
        ? Object.entries(pm.personScaleScores[pid]).filter(([,s])=>s).map(([sid,s])=>sid.toUpperCase()+': '+s.total+'/'+s.maxPossible+' ('+s.label+')').join(', ')
        : 'Ölçek uygulanmamış';

      const prompt = `Sen bir okul psikolojik danışmanlığı ve gelişim alanında uzman bir psikologsun. Aşağıdaki kişinin sosyometri, pulse survey ve klinik ölçek verilerini birlikte değerlendir.

KİŞİ: ${p?.values.fullName || '—'} (${p?.values.gender || '—'})
KURUM: ${project.institution.name || '—'}, ${project.institution.unit || '—'}

SOSYOMETRİ VERİLERİ:
- Aldığı seçim: ${m?.receivedChoices || 0}
- Aldığı itme: ${m?.receivedRejections || 0}
- Yaptığı seçim: ${m?.sentChoices || 0}
- SSS Skoru: ${m?.sss || 0} (−1 ile +1 arası, yüksek = pozitif statü)
- İzolasyon türü: ${m?.isolationType || 'yok'}
- Karşılıklı seçim sayısı: ${m?.mutualChoices || 0}

PULSE VERİLERİ:
- Genel pulse skoru: ${pulseScore !== null ? pulseScore + '/100' : 'veri yok'}
${dimSummary ? '- Boyut skorları: ' + dimSummary : ''}

KLİNİK ÖLÇEK SONUÇLARI:
${scaleScoresSummary}

BİRLEŞİK RİSK SKORU: ${risk}/100

Lütfen şunları ver:
1. Tüm veriler birlikte ne anlatıyor? (2-3 cümle, net ve somut)
2. Klinik ölçek sonuçları sosyometrik konumla nasıl örtüşüyor?
3. Acil müdahale adımları (bu hafta yapılabilecek somut adımlar)
4. Orta vadeli müdahale (1-3 ay içinde)
5. Dikkat edilmesi gereken risk sinyalleri

Türkçe yaz. PDR/okul psikoloğuna yönelik pratik ve uygulanabilir ol. Klinik sonuçları yetkisiz kişilerle paylaşma konusunda uyar.`;

      try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1000,
            messages: [{ role: 'user', content: prompt }]
          })
        });
        const data = await response.json();
        const text = data.content?.map(c => c.text || '').join('') || 'Yanıt alınamadı.';
        resultDiv.innerHTML = `
          <div style="background:var(--pulse-soft);border:1px solid var(--pulse);border-radius:10px;padding:14px;margin-top:8px;">
            <div style="font-size:11px;font-weight:800;color:var(--pulse);margin-bottom:8px;">🤖 AI ANALİZİ</div>
            <div style="font-size:13px;line-height:1.7;white-space:pre-wrap;">${esc(text)}</div>
          </div>`;
      } catch (err) {
        resultDiv.innerHTML = `<div class="error">AI bağlantı hatası: ${esc(err.message)}</div>`;
      }
      btn.disabled = false;
      btn.textContent = '🤖 AI Öneri Al';
    };
  });

  // Grup AI analizi
  const groupBtn = document.getElementById('ai-group-btn');
  if (groupBtn) {
    groupBtn.onclick = async () => {
      const resultDiv = document.getElementById('ai-group-result');
      groupBtn.disabled = true;
      groupBtn.textContent = '⏳ Analiz ediliyor…';
      resultDiv.innerHTML = '';

      const riskData = metrics.map(m => {
        const pulseScore = pm?.personPulseScores?.[m.participantId] ?? null;
        const scaleScoresGrp = pm?.personScaleScores?.[m.participantId] ?? null;
        const risk = calcRiskScore(m, pulseScore, scaleScoresGrp);
        const scaleLabel = scaleScoresGrp ? Object.entries(scaleScoresGrp).filter(([,s])=>s).map(([sid,s])=>sid.toUpperCase()+':'+s.label).join(',') : '—';
        return { isim: participantName(project, m.participantId), sss: m.sss, rc: m.receivedChoices, rr: m.receivedRejections, iso: m.isolationType || 'yok', pulse: pulseScore, olcek: scaleLabel, risk };
      }).sort((a, b) => b.risk - a.risk);

      const gm = an.groupMetrics || {};
      const prompt = `Sen bir takım gelişimi uzmanısın. Aşağıdaki takımın sosyometri ve pulse survey sonuçlarını analiz et.

KURUM: ${project.institution.name || '—'}, ${project.institution.unit || '—'}
TAKIM BÜYÜKLÜĞü: ${active.length} kişi
KATILIM ORANI: %${Math.round((gm.participationRate || 0) * 100)}
AĞ YOĞUNLUĞU: %${gm.networkDensity || 0}
KARŞILIKLI SEÇİM ORANI: %${gm.mutualRate || 0}
TAM İZOLE KİŞİ: ${gm.fullyIsolated?.length || 0}
TEK YÖNLÜ İZOLE: ${gm.oneWayIsolated?.length || 0}
YILDIZ KİŞİ: ${gm.stars?.length || 0}

EN YÜKSEK RİSKLİ 5 KİŞİ:
${riskData.slice(0, 5).map(d => `- ${d.isim}: Risk=${d.risk}, SSS=${d.sss}, Seçildi=${d.rc}, İtildi=${d.rr}, İzolasyon=${d.iso}, Pulse=${d.pulse ?? '—'}, Ölçek=${d.olcek||'—'}`).join('\n')}

Lütfen şunları ver:
1. Takımın genel sosyal sağlık durumu (3-4 cümle)
2. En kritik 3 müdahale alanı (öncelik sırasıyla)
3. Takım genelinde önerilen aktiviteler/pratikler (somut, uygulanabilir)
4. Yöneticiye özel uyarılar

Türkçe, pratik ve somut yaz.`;

      try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1200,
            messages: [{ role: 'user', content: prompt }]
          })
        });
        const data = await response.json();
        const text = data.content?.map(c => c.text || '').join('') || 'Yanıt alınamadı.';
        resultDiv.innerHTML = `
          <div style="background:var(--pulse-soft);border:1px solid var(--pulse);border-radius:10px;padding:16px;">
            <div style="font-size:11px;font-weight:800;color:var(--pulse);margin-bottom:10px;">🤖 GRUP ANALİZİ</div>
            <div style="font-size:13px;line-height:1.7;white-space:pre-wrap;">${esc(text)}</div>
          </div>`;
      } catch (err) {
        resultDiv.innerHTML = `<div class="error">AI bağlantı hatası: ${esc(err.message)}</div>`;
      }
      groupBtn.disabled = false;
      groupBtn.textContent = 'Grup Analizi Yap';
    };
  }
}


function render() {
  renderSidebar();
  const view = document.getElementById('view');
  const project = getProject();
  if (!project) { view.innerHTML = renderProjectsPage(); bindProjectsPage(); return; }
  let html = '';
  if (ui.currentPage==='institution') html = renderInstitutionPage(project);
  else if (ui.currentPage==='participants') html = renderParticipantsPage(project);
  else if (ui.currentPage==='questions') html = renderQuestionsPage(project);
  else if (ui.currentPage==='responses') html = renderResponsesPage(project);
  else if (ui.currentPage==='excel') html = renderExcelPage(project);
  else if (ui.currentPage==='googleform') html = renderGoogleFormPage(project);
  else if (ui.currentPage==='analysis') html = renderAnalysisPage(project);
  else if (ui.currentPage==='sociogram') html = renderSociogramPage(project);
  else if (ui.currentPage==='mudahale') html = renderMudahalePage(project);
  else if (ui.currentPage==='reports') html = renderReportsPage(project);
  else html = renderInstitutionPage(project);
  view.innerHTML = html;
  if (ui.currentPage==='institution') bindInstitutionPage(project);
  else if (ui.currentPage==='participants') bindParticipantsPage(project);
  else if (ui.currentPage==='questions') bindQuestionsPage(project);
  else if (ui.currentPage==='responses') bindResponsesPage(project);
  else if (ui.currentPage==='excel') bindExcelPage(project);
  else if (ui.currentPage==='googleform') bindGoogleFormPage(project);
  else if (ui.currentPage==='analysis') bindAnalysisPage(project);
  else if (ui.currentPage==='sociogram') bindSociogramPage(project);
  else if (ui.currentPage==='mudahale') bindMudahalePage(project);
  else if (ui.currentPage==='reports') bindReportsPage(project);
}
render();
</script>

<script>
let deferredInstallPrompt = null;
const installBtn = document.getElementById('install-app-btn');
if (installBtn) {
  installBtn.addEventListener('click', async () => { if (!deferredInstallPrompt) return; deferredInstallPrompt.prompt(); await deferredInstallPrompt.userChoice; deferredInstallPrompt = null; installBtn.classList.add('hidden'); });
}
window.addEventListener('beforeinstallprompt', (event) => { event.preventDefault(); deferredInstallPrompt = event; installBtn?.classList.remove('hidden'); });
window.addEventListener('appinstalled', () => { deferredInstallPrompt = null; installBtn?.classList.add('hidden'); });
if ('serviceWorker' in navigator) { window.addEventListener('load', async () => { try { await navigator.serviceWorker.register('./sw.js'); } catch (err) { console.error('SW kayıt hatası:', err); } }); }
</script>
