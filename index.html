  <meta name="theme-color" content="#2563eb" />
  <script src="./vendor/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg: #f0f4f8;
      --surface: #ffffff;
      --surface2: #f7f9fc;
      --border: #dde4ed;
      --text: #111827;
      --muted: #5a6a7e;
      --accent: #1a56a0;
      --accent-soft: #dbeafe;
      --accent2: #0e7c5b;
      --accent2-soft: #d1fae5;
      --danger: #c0392b;
      --danger-soft: #fde8e6;
      --ok: #0e7c5b;
      --ok-soft: #d1fae5;
      --warning: #b45309;
      --warning-soft: #fef3c7;
      --pulse: #7c3aed;
      --pulse-soft: #ede9fe;
      --radius: 14px;
      --radius-sm: 8px;
      --shadow: 0 2px 8px rgba(15, 23, 42, .07), 0 8px 24px rgba(15, 23, 42, .05);
      --shadow-sm: 0 1px 4px rgba(15, 23, 42, .06);
    }

    * {
      box-sizing: border-box;
    }

    [data-theme="dark"] {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #0d1117;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --accent-soft: #1c2d3f;
      --accent2: #3fb950;
      --accent2-soft: #122d1c;
      --danger: #f85149;
      --danger-soft: #2d1117;
      --ok: #3fb950;
      --ok-soft: #122d1c;
      --warning: #d29922;
      --warning-soft: #272115;
      --pulse: #a78bfa;
      --pulse-soft: #2e1065;
      background: var(--bg);
    }

    [data-theme="dark"] body {
      background: var(--bg);
    }

    [data-theme="dark"] svg {
      background: radial-gradient(circle at center, #162032 0%, #0f172a 100%) !important;
    }

    [data-theme="dark"] input,
    [data-theme="dark"] select,
    [data-theme="dark"] textarea {
      background: var(--surface2) !important;
      color: var(--text) !important;
      border-color: var(--border) !important;
    }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      max-width: 1320px;
      margin: 0 auto;
      padding: 24px;
    }

    .shell {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 20px;
      min-height: calc(100vh - 48px);
    }

    .sidebar,
    .panel,
    .card,
    .table-wrap,
    .empty {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .sidebar {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: sticky;
      top: 24px;
      height: fit-content;
      border-left: 3px solid var(--accent);
    }

    .brand {
      padding: 8px 12px 14px;
      border-bottom: 1px solid var(--border);
    }

    .brand h1 {
      margin: 0 0 3px;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -.3px;
      color: var(--accent);
    }

    .brand p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .project-head {
      padding: 12px;
      border-radius: 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
    }

    .project-head strong {
      display: block;
      margin-bottom: 4px;
    }

    .project-head span {
      color: var(--muted);
      font-size: 12px;
    }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .nav-group {
      margin-top: 10px;
    }

    .nav-group-label {
      font-size: 10px;
      font-weight: 800;
      color: var(--muted);
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 4px 10px 6px;
      display: block;
    }

    .nav button {
      width: 100%;
      text-align: left;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text);
      padding: 9px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background .12s;
    }

    .nav button .nav-icon {
      font-size: 15px;
      width: 20px;
      text-align: center;
      flex-shrink: 0;
    }

    .nav button.active {
      background: var(--accent-soft);
      color: var(--accent);
      border-color: var(--accent-soft);
      font-weight: 700;
    }

    .nav button:hover:not(.active) {
      background: var(--surface2);
    }

    .content {
      min-width: 0;
    }

    .panel {
      padding: 22px;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
      margin-bottom: 20px;
    }

    .page-title {
      margin: 0 0 6px;
      font-size: 28px;
    }

    .page-subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 14px;

    function inferQuestionCategory(title) { const n = normalizeTR(title); if (/ISTEMEZ|UYGUN GORMEZ|DISLAR|UZAK|REDD|OLMASIN/.test(n) && /SENI|SIZI|LISTESINE|TAHMIN|SANIYORSUN/.test(n)) return 'algılanan-itme'; if (/LISTESINE|TAHMIN|SANIYORSUN|KIM ALIR|SENI SECEN|ALACAGINI/.test(n)) return 'algılanan-seçim'; if (/ISTEMEZ|UYGUN GORMEZ|DISLAR|IT|UZAK|REDD|OLMASIN/.test(n)) return 'itme'; return 'seçim'; }

    function buildRelations(project, useRankWeight) {
      const questionMap = new Map(project.questions.map(q => [q.id, q.category]));
      const rels = [];
      for (const response of project.responses) {
        if (!response.respondentId || response.status === 'invalid' || response.status === 'excluded') continue;
        for (const answer of response.answers) {
          const type = questionMap.get(answer.questionId);
          if (!type) continue;

    function buildGroupMetrics(project, personMetrics, relations) {
      const active = project.participants.filter(p => p.active);
      const respondentIds = new Set(project.responses.filter(r => r.respondentId && r.status !== 'invalid' && r.status !== 'excluded').map(r => r.respondentId));
      const mostChosen = [...personMetrics].sort((a, b) => b.receivedChoices - a.receivedChoices).slice(0, 3).filter(x => x.receivedChoices > 0).map(x => x.participantId);
      const mostRejected = [...personMetrics].sort((a, b) => b.receivedRejections - a.receivedRejections).slice(0, 3).filter(x => x.receivedRejections > 0).map(x => x.participantId);

      const adjMap = new Map(active.map(p => [p.id, new Set()]));

      const visited = new Set(); const cliques = [];
      for (const p of active) { if (visited.has(p.id)) continue; const group = []; const stack = [p.id]; while (stack.length) { const curr = stack.pop(); if (visited.has(curr)) continue; visited.add(curr); group.push(curr); adjMap.get(curr)?.forEach(n => { if (!visited.has(n)) stack.push(n); }); } if (group.length > 1) cliques.push(group); }
      const fullyIsolated = personMetrics.filter(m => m.isolationType === 'tam').map(m => m.participantId);
      const oneWayIsolated = personMetrics.filter(m => m.isolationType === 'tek-yonlu').map(m => m.participantId);
      const stars = personMetrics.filter(m => m.sss >= 0.3 && m.receivedRejections <= 1).map(m => m.participantId);
      const isolated = personMetrics.filter(m => m.receivedChoices === 0 && m.sentChoices === 0 && m.receivedRejections === 0 && m.sentRejections === 0).map(m => m.participantId);
      const choiceRels = relations.filter(r => r.type === 'seçim').length;
      const N = active.length; const maxPossible = N > 1 ? N * (N - 1) : 1;
      const networkDensity = Math.round((choiceRels / maxPossible) * 100);
      const mutualRate = choiceRels > 0 ? Math.round((mutualChoicePairs.length * 2 / choiceRels) * 100) : 0;
      const autoSummary = [];
      autoSummary.push('Grubun katılım oranı %' + Math.round((respondentIds.size / (active.length || 1)) * 100) + 'tir (' + respondentIds.size + '/' + active.length + ' kişi).');
      if (stars.length) autoSummary.push(stars.length + ' kişi yüksek tercih skoru ile öne çıkmaktadır.');
      if (fullyIsolated.length) autoSummary.push(fullyIsolated.length + ' kişi sosyometrik ağın tamamen dışındadır (tam izole).');
      if (oneWayIsolated.length) autoSummary.push(oneWayIsolated.length + ' kişi seçim yapıyor ancak hiç seçilmiyor (tek yönlü izole).');
      autoSummary.push('Seçim ağının yoğunluğu %' + networkDensity + 'tür.');
      autoSummary.push('Karşılıklı seçim oranı %' + mutualRate + 'tir (' + mutualChoicePairs.length + ' çift).');
      if (cliques.length) autoSummary.push(cliques.length + ' alt grup/küme tespit edilmiştir.');
      if (mutualRejectionPairs.length) autoSummary.push(mutualRejectionPairs.length + ' karşılıklı itme ilişkisi bulunmaktadır.');
      return { totalParticipants: active.length, totalRespondents: respondentIds.size, participationRate: active.length ? respondentIds.size / active.length : 0, mostChosen, mostRejected, isolated, fullyIsolated, oneWayIsolated, stars, mutualChoicePairs, mutualRejectionPairs, nonRespondents, genderStats, cliques, networkDensity, mutualRate, autoSummary };
    }
    function buildPulseMetrics(project) {
      const PULSE_CATS = ['pulse-scale', 'pulse-yesno', 'pulse-text', 'scale-item'];
      const pulseQs = project.questions.filter(q => PULSE_CATS.includes(q.category));
      if (!pulseQs.length) return null;

      const active = project.participants.filter(p => p.active);
      const validResps = project.responses.filter(r =>
        r.respondentId && r.status !== 'excluded' && r.status !== 'invalid'
      );

      // Soru bazlı istatistikler
      const questionStats = {};
      const dimMap = {};

      for (const q of pulseQs) {
        const answers = validResps.map(r => {
          const ans = (r.answers || []).find(a => a.questionId === q.id);
          return ans?.numericValue ?? null;
        }).filter(v => v !== null);

        const avg = answers.length
          ? Math.round(answers.reduce((s, v) => s + v, 0) / answers.length * 10) / 10
          : null;
        const maxVal = q.pulseMax || 5;

        questionStats[q.id] = { avg, maxVal, count: answers.length, answers };

        if (avg !== null && q.category === 'pulse-scale') {
          const dim = q.pulseDimension || 'genel';
          if (!dimMap[dim]) dimMap[dim] = [];
          dimMap[dim].push(Math.round((avg / maxVal) * 100));
        }
      }

      // Boyut ortalamaları (pulse)
      const dimensionAverages = {};
      for (const [dim, vals] of Object.entries(dimMap)) {
        dimensionAverages[dim] = Math.round(vals.reduce((s, v) => s + v, 0) / vals.length);
      }

      // Kişi bazlı pulse skoru (0-100)
      const personPulseScores = {};
      for (const p of active) {
        const resp = validResps.find(r => r.respondentId === p.id);
        if (!resp) { personPulseScores[p.id] = null; continue; }
        const scores = [];
        for (const q of pulseQs.filter(q => q.category === 'pulse-scale')) {
          const ans = (resp.answers || []).find(a => a.questionId === q.id);
          if (ans?.numericValue !== undefined) {
            scores.push(Math.round((ans.numericValue / (q.pulseMax || 5)) * 100));
          }
        }
        personPulseScores[p.id] = scores.length
          ? Math.round(scores.reduce((s, v) => s + v, 0) / scores.length)
          : null;
      }

      // ── Ölçek puanları (BDI, CDI vb.) ────────────────────────────────────────
      // Her ölçek kendi scaleId'sine sahip; sorular scaleId ile gruplanır
      const scaleQs = project.questions.filter(q => q.category === 'scale-item');
      const scaleGroups = {};
      for (const q of scaleQs) {
        const sid = q.scaleId || 'genel';
        if (!scaleGroups[sid]) scaleGroups[sid] = [];
        scaleGroups[sid].push(q);
      }

      // Her kişi için ölçek toplam puanı ve kategorisi
      const personScaleScores = {};
      for (const p of active) {
        personScaleScores[p.id] = {};
        const resp = validResps.find(r => r.respondentId === p.id);
        for (const [sid, qs] of Object.entries(scaleGroups)) {
          if (!resp) { personScaleScores[p.id][sid] = null; continue; }
          let total = 0, answered = 0;
          for (const q of qs) {
            const ans = (resp.answers || []).find(a => a.questionId === q.id);
            if (ans?.numericValue !== undefined && ans.numericValue !== null) {
              total += ans.numericValue;
              answered++;
            }
          }
          if (answered === 0) { personScaleScores[p.id][sid] = null; continue; }
          // Kesim puanları ölçeğe göre
          const CUTOFFS = {
            'bdi': [{ max: 13, label: 'Minimal', color: '#0e7c5b' }, { max: 19, label: 'Hafif', color: '#b45309' }, { max: 28, label: 'Orta', color: '#d97706' }, { max: 999, label: 'Şiddetli', color: '#c0392b' }],
            'cdi': [{ max: 19, label: 'Normal', color: '#0e7c5b' }, { max: 29, label: 'Hafif', color: '#b45309' }, { max: 39, label: 'Orta', color: '#d97706' }, { max: 999, label: 'Şiddetli', color: '#c0392b' }],
          };
          const cuts = CUTOFFS[sid] || [{ max: 999, label: '—', color: '#888' }];
          const cat = cuts.find(c => total <= c.max) || cuts[cuts.length - 1];
          personScaleScores[p.id][sid] = { total, answered, label: cat.label, color: cat.color, maxPossible: qs.length * (qs[0]?.scaleMax || 3) };
        }
      }

      return { questionStats, dimensionAverages, personPulseScores, personScaleScores, scaleGroups };
    }

    function runAnalysis(project) {
      const relations = buildRelations(project);
      const personMetrics = buildPersonMetrics(project, relations);
      const groupMetrics = buildGroupMetrics(project, personMetrics, relations);
      const pulseMetrics = buildPulseMetrics(project);
      project.analysis = { ...(project.analysis || {}), calculatedAt: nowISO(), relations, personMetrics, groupMetrics, pulseMetrics, unmatchedNames: project.analysis?.unmatchedNames || [] };
      project.updatedAt = nowISO(); updateProject(project); return project.analysis;
    }

    function bindProjectsPage() {
      const dmHome = document.getElementById('dark-mode-toggle-home');
      if (dmHome) dmHome.onclick = () => { const isDark = document.documentElement.getAttribute('data-theme') === 'dark'; document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark'); localStorage.setItem('sosyo_theme', isDark ? 'light' : 'dark'); };
      document.getElementById('create-project').onclick = () => { const input = document.getElementById('new-project-name'); const name = input.value.trim(); const sector = document.getElementById('new-project-sector').value; if (!name) return showMessage('error', 'Proje adı boş olamaz.'); const p = projectTemplate(name, sector); updateProject(p); openProject(p.id); };
      document.querySelectorAll('[data-open]').forEach(btn => btn.onclick = () => openProject(btn.dataset.open));
      document.querySelectorAll('[data-export]').forEach(btn => btn.onclick = () => { const p = getProjects().find(x => x.id === btn.dataset.export); if (p) exportProject(p); });
      document.querySelectorAll('[data-delete]').forEach(btn => btn.onclick = () => { if (!confirm('Projeyi silmek istediğine emin misin?')) return; deleteProject(btn.dataset.delete); render(); });
    }

    function renderInstitutionPage(project) {
      const f = project.institution;
      return `<div class="page-header"><div><h2 class="page-title">Çalışma</h2><p class="page-subtitle">Proje adı, kurum ve genel ayarlar.</p></div><div style="display:flex;gap:10px;"><button class="btn btn-soft" id="create-post-test-btn" style="background:var(--accent-soft);color:var(--accent);border-color:var(--accent);" title="Mevcut katılımcı listesini kopyalayarak yeni dönemi başlatır">Zaman Serisi: Son-Test Başlat</button><button class="btn btn-primary" id="save-institution">Kaydet</button></div></div>
  ${renderMessages()}
  <div class="card"><div class="grid-2"><div class="field"><label>Kurum Adı</label><input id="inst-name" class="input" value="${esc(f.name)}"></div><div class="field"><label>Kurum Türü</label><input id="inst-type" class="input" value="${esc(f.type)}"></div></div>
  <div class="grid-2" style="margin-top:14px;"><div class="field"><label>Birim / Grup</label><input id="inst-unit" class="input" value="${esc(f.unit)}"></div><div class="field"><label>Şehir</label><input id="inst-city" class="input" value="${esc(f.city)}"></div></div>
  <div class="grid-2" style="margin-top:14px;"><div class="field"><label>Katılımcı Kod Öneki</label><input id="inst-codeprefix" class="input" value="${esc(f.codePrefix || '')}" placeholder="örn: AS"></div><div class="field" style="align-self:flex-end;"><button class="btn btn-soft" id="assign-codes-btn" ${project.participants.filter(p => p.active).length === 0 ? 'disabled' : ''}>🔢 Kodları Ata</button><div class="small muted" style="margin-top:6px;">Mevcut kişilere sırayla kod verir</div></div></div>
  <div class="field" style="margin-top:14px;"><label>Notlar</label><textarea id="inst-notes" class="textarea">${esc(f.notes)}</textarea></div></div>`;
    }
    function bindInstitutionPage(project) {
      document.getElementById('save-institution').onclick = () => { project.institution = { name: document.getElementById('inst-name').value, type: document.getElementById('inst-type').value, unit: document.getElementById('inst-unit').value, city: document.getElementById('inst-city').value, notes: document.getElementById('inst-notes').value, codePrefix: document.getElementById('inst-codeprefix').value.trim().toUpperCase() }; project.updatedAt = nowISO(); updateProject(project); showMessage('success', 'Kurum bilgileri kaydedildi.'); };
      const assignBtn = document.getElementById('assign-codes-btn');

      function showScaleForm() {
        slot.innerHTML = `
      <div class="card" style="margin-bottom:18px;border-left:4px solid #059669;">
        <div class="section-title" style="margin-top:0;color:#059669;">📋 Hazır Ölçek Ekle</div>

        </div>

          <button class="btn" style="background:#059669;color:white;border-color:#059669;" id="save-scale-btn">Ölçeği Ekle</button>
          <button class="btn" id="cancel-scale-btn">İptal</button>
        </div>

        // Radio label hover efekti
        slot.querySelectorAll('.scale-option-label').forEach(label => {
          const radio = label.querySelector('input[type=radio]');
          label.onclick = () => {
            slot.querySelectorAll('.scale-option-label').forEach(l => l.style.borderColor = 'var(--border)');
            label.style.borderColor = READY_SCALES[radio.value]?.color || 'var(--accent)';

        document.getElementById('cancel-scale-btn').onclick = () => slot.innerHTML = '';
        document.getElementById('save-scale-btn').onclick = () => {

          const scale = READY_SCALES[chosen.value];

          // Aynı ölçek zaten ekli mi?
          const alreadyAdded = project.questions.some(q => q.scaleId === scale.id);

            if (!confirm(`"${scale.name}" zaten eklenmiş. Yeniden eklemek istiyor musunuz?`)) return;

          project.updatedAt = nowISO();

    function matchParticipantByName(participants, rawName) {
      const norm = normalizeTR(rawName); if (!norm) return null;
      let exact = participants.find(p => normalizeTR(p.values.fullName) === norm); if (exact) return exact;
      let inc = participants.find(p => normalizeTR(p.values.fullName).includes(norm) || norm.includes(normalizeTR(p.values.fullName))); if (inc) return inc;
      const tt = norm.split(' ').filter(Boolean); let best = null, bestScore = 0;
      for (const p of participants) { const pn = normalizeTR(p.values.fullName); const tokens = pn.split(' ').filter(Boolean); let score = 0; for (const t of tt) if (tokens.includes(t)) score++; if (score > bestScore) { bestScore = score; best = p; } }
      return bestScore >= Math.min(2, tt.length) ? best : null;
    }
    function importWorkbookIntoProject(project, fileName, workbook) {
      const sheetName = workbook.SheetNames[0]; const sheet = workbook.Sheets[sheetName]; const rows = XLSX.utils.sheet_to_json(sheet, { defval: '', raw: false });
      if (!rows.length) throw new Error('Excel içinde veri bulunamadı.');
      const headers = Object.keys(rows[0]);

      // Ölçek sütunlarını ayır: [CDI 1], [BDI 3] gibi başlıklar
      const SCALE_PATTERN = /^\[(CDI|BDI)\s*(\d+)\]/i;
      const scaleHeaders = headers.filter(h => SCALE_PATTERN.test(h.trim()));
      const otherHeaders = headers.filter(h => !SCALE_PATTERN.test(h.trim()));

      const participantHeaders = otherHeaders.filter(h => !questionLike(h) && !/Zaman damgası/i.test(h) && !/beklent/i.test(h));
      const questionHeaders = otherHeaders.filter(h => questionLike(h));

      if (!participantHeaders.some(h => /ad/i.test(h) && /soyad/i.test(h))) throw new Error('Ad Soyad sütunu bulunamadı.');
      if (!questionHeaders.length && !scaleHeaders.length) throw new Error('Sosyometrik soru veya ölçek sütunu bulunamadı.');

      const headerToKey = new Map(); const seenFieldKeys = new Set();
      for (const h of participantHeaders) { let key = inferFieldKey(h); if (seenFieldKeys.has(key)) { let suffix = 2; while (seenFieldKeys.has(key + '_' + suffix)) suffix++; key = key + '_' + suffix; } seenFieldKeys.add(key); headerToKey.set(h, key); }
      const fields = []; for (const h of participantHeaders) { const key = headerToKey.get(h); if (key === 'fullName') continue; fields.push({ key, label: h, type: 'text', required: false }); }
      project.schema.requiredFields = [{ key: 'fullName', label: 'Ad Soyad', type: 'text', required: true }, { key: 'gender', label: 'Cinsiyet', type: 'select', required: false, options: ['Kadın', 'Erkek'] }]; project.schema.customFields = fields;
      project.participants = rows.map((row) => { const values = { fullName: '', gender: '' }; for (const h of participantHeaders) { const key = headerToKey.get(h); values[key] = String(row[h] ?? '').trim(); if (key === 'fullName') values.fullName = String(row[h] ?? '').trim(); } return { id: uid('p'), values, active: true, createdAt: nowISO() }; }).filter(p => p.values.fullName);

      // Sosyometrik sorular
      const socioQs = questionHeaders.map((h, idx) => { const max = Math.max(1, ...rows.map(r => splitNames(r[h]).length), 3); return { id: uid('q'), category: inferQuestionCategory(h), title: h, description: "Excel'den otomatik alındı", min: 0, max, required: false, order: idx + 1, createdAt: nowISO() }; });

      // Ölçek soruları — [CDI 1] → CDI'nin 1. sorusu
      const SCALE_META = {
        cdi: { name: "Çocuklar İçin Depresyon Ölçeği (CDI)", maxPerItem: 2, itemTitles: ["Üzüntü", "Gelecek", "Başarı", "Zevk", "Kötülük", "Ceza", "Kendinden Nefret", "Suçlama", "Kendine Zarar", "Ağlama", "Huzursuzluk", "İnsanlar", "Karar", "Görünüm", "Okul", "Uyku", "Yorgunluk", "İştah", "Ağrı", "Yalnızlık", "Okul Eğlencesi", "Arkadaş", "Okul Başarısı", "Uyum", "Kurallara Uymak", "Dikkat", "Öz-Sevgi"] },
        bdi: { name: "Beck Depresyon Envanteri (BDI-II)", maxPerItem: 3, itemTitles: ["Üzüntü", "Karamsarlık", "Geçmişteki Başarısızlıklar", "Zevk Kaybı", "Suçluluk", "Cezalandırılma", "Kendinden Hoşnutsuzluk", "Öz-Eleştiri", "İntihar Düşünceleri", "Ağlama", "Ajitasyon", "İlgi Kaybı", "Kararsızlık", "Değersizlik", "Enerji Kaybı", "Uyku Düzeni", "Sinirlilik", "İştah Değişikliği", "Konsantrasyon", "Yorgunluk", "Cinsel İstek"] }
      };

      const scaleQsMap = {}; // scaleId → [questions]
      for (const h of scaleHeaders) {
        const m = h.trim().match(SCALE_PATTERN);
        if (!m) continue;
        const sid = m[1].toLowerCase();
        const itemIdx = parseInt(m[2]) - 1; // 0-based
        const meta = SCALE_META[sid];
        if (!meta) continue;
        if (!scaleQsMap[sid]) scaleQsMap[sid] = [];
        const itemTitle = meta.itemTitles[itemIdx] || ('Madde ' + (itemIdx + 1));
        scaleQsMap[sid].push({
          id: uid('q'),
          title: '[' + sid.toUpperCase() + ' ' + (itemIdx + 1) + '] ' + itemTitle,
          description: '',
          category: 'scale-item',
          scaleId: sid,
          scaleName: meta.name,
          scaleMax: meta.maxPerItem,
          scaleItemIndex: itemIdx,
          _header: h, // Excel sütun başlığı — yanıt eşleştirmesi için
          min: 0, max: meta.maxPerItem, required: false,
          order: socioQs.length + scaleQsMap[sid].length + 1,
          createdAt: nowISO()
        });
      }
      // Sıralı hale getir
      for (const sid of Object.keys(scaleQsMap)) {
        scaleQsMap[sid].sort((a, b) => a.scaleItemIndex - b.scaleItemIndex);
      }
      const allScaleQs = Object.values(scaleQsMap).flat();

      project.questions = [...socioQs, ...allScaleQs];

      const unmatchedNames = [];
      project.responses = rows.map((row) => {
        const respondentNameHeader = participantHeaders.find(h => /ad/i.test(h) && /soyad/i.test(h));
        const respondentName = String(row[respondentNameHeader] ?? '').trim();
        const respondent = matchParticipantByName(project.participants, respondentName);

        // Sosyometrik yanıtlar
        const socioAnswers = socioQs.map((q, i) => {
          const rawSelections = splitNames(row[questionHeaders[i]]);
          const selectedIds = [];
          for (const rawName of rawSelections) { const target = matchParticipantByName(project.participants, rawName); if (target) selectedIds.push(target.id); else unmatchedNames.push({ respondent: respondentName, question: q.title, rawName }); }
          return { questionId: q.id, selectedIds: [...new Set(selectedIds)], numericValue: undefined, textValue: undefined };
        });

        // Ölçek yanıtları — sayısal değer olarak oku
        const scaleAnswers = allScaleQs.map(q => {
          const raw = row[q._header];
          const num = raw !== undefined && raw !== '' ? parseInt(String(raw).trim()) : undefined;
          const val = (!isNaN(num) && num >= 0 && num <= q.scaleMax) ? num : undefined;
          return { questionId: q.id, selectedIds: [], numericValue: val, textValue: undefined };
        });

        return {
          id: uid('r'),
          googleResponseId: null,
          submittedAt: (() => { const v = row['Zaman damgası']; if (!v) return nowISO(); const d = new Date(v); return isNaN(d.getTime()) ? nowISO() : d.toISOString(); })(),
          respondentId: respondent ? respondent.id : null,
          answers: [...socioAnswers, ...scaleAnswers],
          edited: false, editedAt: null,
          status: respondent ? 'valid' : 'pending'
        };
      });

      project.analysis = { calculatedAt: null, relations: [], personMetrics: [], groupMetrics: null, unmatchedNames, pulseMetrics: null };
      project.importInfo = { fileName, sheetName, importedAt: nowISO(), rowCount: rows.length, participantHeaders, questionHeaders, scaleHeaders };
      project.updatedAt = nowISO(); updateProject(project);
      return { rowCount: rows.length, questionCount: project.questions.length, participantCount: project.participants.length, unmatchedNames, scaleCount: allScaleQs.length };
    }

    function renderResponsesPage(project) {
      const responses = project.responses || [];

      const PULSE_CATS = ['pulse-scale', 'pulse-yesno', 'pulse-text', 'scale-item'];
      const pulseQs   = project.questions.filter(q => PULSE_CATS.includes(q.category));

      // ── Ön-Test verisi (varsa) ────────────────────────────────────────────

      const preTestProject = isPostTest ? (loadProjects().find(p => p.id === project.preTestProjectId) || null) : null;
      const preResponses   = preTestProject?.responses || [];
      const hasPreData     = isPostTest && preTestProject && preResponses.length > 0;
      // isim-bazlı ön-test pulse haritası (renderComparePage ile aynı mantık)
      const prePulseByName = (() => {
        const raw = preTestProject?.analysis?.pulseMetrics?.personPulseScores || {};
        const out = {};
        for (const [pid, val] of Object.entries(raw)) {

      const hasPrePulse = Object.keys(prePulseByName).length > 0;

      // sekme durumu — ui'da sakla
      if (!ui.responsesTab) ui.responsesTab = 'current';

      const tabBtn = (key, label) => `<button data-resp-tab="${key}" style="

      // ── Mevcut Dönem sekmesi ─────────────────────────────────────────────
      const currentTab = `
    ${pending.length
      ? `<div class="notice" style="margin-bottom:16px;">⚠ ${pending.length} yanıt eşleşmemiş.</div>`

    <div class="table-wrap"><table>

        <th>İşlem</th>

      ${responses.map((r, i) => {
        const p = project.participants.find(x => x.id === r.respondentId);
        const totalSocio = r.answers.filter(a => socioQs.some(q => q.id === a.questionId)).reduce((s,a) => s+(a.selectedIds||[]).length,0);
        const pulseAnswered = pulseQs.filter(q => { const ans=(r.answers||[]).find(a=>a.questionId===q.id); return ans&&(ans.numericValue!==undefined&&ans.numericValue!==null||ans.textValue); }).length;
        return `<tr>
          <td class="small muted">${i+1}</td>
          <td>${p ? esc(p.values.fullName||'') : '<span style="color:var(--danger)">Eşleşmedi</span>'}</td>
          <td class="small muted">${formatDate(r.submittedAt)}</td>
          <td><span class="badge ${r.status==='valid'?'badge-ok':r.status==='excluded'?'badge-danger':'badge-soft'}">${r.status==='valid'?'Geçerli':r.status==='excluded'?'Dışlandı':'Beklemede'}</span></td>
          <td class="small">${totalSocio} seçim</td>
          ${hasPulse?`<td class="small">${pulseAnswered>0?`<span style="color:var(--pulse);font-weight:700;">${pulseAnswered}/${pulseQs.length}</span>`:'<span style="color:var(--muted);">—</span>'}</td>`:''}
          <td><div class="row">
            <select class="select" style="font-size:12px;padding:4px 8px;" data-assign-response="${r.id}">
              <option value="">-- Kişi Ata --</option>
              ${project.participants.filter(p=>p.active).map(p=>`<option value="${p.id}" ${r.respondentId===p.id?'selected':''}>${esc(p.values.fullName||p.id)}</option>`).join('')}
            </select>

            <button class="btn btn-danger" style="font-size:12px;padding:4px 8px;" data-delete-response="${r.id}">Sil</button>
          </div></td>
        </tr>`;
      }).join('')}
      </tbody>
    </table></div>`;

      // ── Dönem Karşılaştırması sekmesi ────────────────────────────────────
      let compareTab = '';
      if (hasPreData) {
        const preQsSocio = (preTestProject.questions || []).filter(q => !PULSE_CATS.includes(q.category));
        const preQsPulse = (preTestProject.questions || []).filter(q => PULSE_CATS.includes(q.category));
        const preParticipants = preTestProject.participants || [];
        const preMetricsRaw   = preTestProject.analysis?.personMetrics || [];

        // İsim bazlı ön-test katılımcısı bul
        function findPreParticipant(postP) {
          const norm = normalizeTR(postP.values.fullName||'');
          return preParticipants.find(pp => normalizeTR(pp.values.fullName||'') === norm) || null;
        }

        const rows = project.participants.filter(p => p.active).map(p => {
          const prePart  = findPreParticipant(p);
          const curResp  = responses.find(r => r.respondentId === p.id && r.status !== 'excluded');
          const preResp  = prePart ? preResponses.find(r => r.respondentId === prePart.id && r.status !== 'excluded') : null;

          // Pulse ortalama
          function avgPulse(resp, qs) {
            if (!resp) return null;
            const scores = [];
            for (const q of qs.filter(q=>q.category==='pulse-scale')) {
              const ans = (resp.answers||[]).find(a=>a.questionId===q.id);
              if (ans?.numericValue!=null) scores.push(Math.round((ans.numericValue/(q.pulseMax||5))*100));
            }
            return scores.length ? Math.round(scores.reduce((s,v)=>s+v,0)/scores.length) : null;
          }
          const curPulse = hasPulse ? avgPulse(curResp, pulseQs) : null;
          const prePulse = avgPulse(preResp, preQsPulse);

          // Metrikler — isim bazlı eşleştirme
          const curM = project.analysis.personMetrics?.find(x=>x.participantId===p.id);
          const preM = prePart ? preMetricsRaw.find(x=>x.participantId===prePart.id) : null;

          const curRC = curM?.receivedChoices ?? '—';
          const preRC = preM?.receivedChoices ?? '—';
          const rcDelta = (typeof curRC==='number' && typeof preRC==='number') ? curRC-preRC : null;

          const curSSS = curM?.sss ?? null;
          const preSSS = preM?.sss ?? null;
          const sssDelta = (curSSS!==null && preSSS!==null) ? +(curSSS-preSSS).toFixed(2) : null;

          const curIso = curM?.isolationType || null;
          const preIso = preM?.isolationType || null;

          let overallStatus = 'Aynı';
          let overallColor  = '#64748b';
          if (sssDelta !== null && sssDelta > 0.1) { overallStatus='🌟 İyileşti'; overallColor='#0e7c5b'; }
          else if (sssDelta !== null && sssDelta < -0.1) { overallStatus='⚠ Kötüleşti'; overallColor='#c0392b'; }

          function delta(val, inv=false) {
            if (val===null) return '<span style="color:var(--muted)">—</span>';
            const good = inv ? val<0 : val>0;
            const bad  = inv ? val>0 : val<0;
            const col  = good ? '#0e7c5b' : bad ? '#c0392b' : '#64748b';
            const sym  = val>0 ? '▲ +' : val<0 ? '▼ ' : '';
            return `<span style="color:${col};font-weight:800;font-size:12px;">${sym}${Math.abs(val)}</span>`;
          }
          function pulseDelta(cur, pre) {
            if (cur===null||pre===null) return '';
            const d = cur-pre;
            const col = d>5?'#0e7c5b':d<-5?'#c0392b':'#64748b';
            const sym = d>0?'▲ +':d<0?'▼ ':'';
            return `<span style="color:${col};font-weight:800;font-size:11px;">${sym}${Math.abs(d)}</span>`;
          }

          let isoCell = '';
          if (!preIso && !curIso) isoCell = '<span style="color:var(--muted);font-size:11px;">—</span>';
          else if (preIso==='tam' && !curIso) isoCell = '<span style="background:#d1fae5;color:#0e7c5b;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:700;">✓ İzolasyondan çıktı</span>';
          else if (!preIso && curIso==='tam') isoCell = '<span style="background:#fde8e6;color:#c0392b;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:700;">🚨 Yeni tam izole</span>';
          else if (preIso==='tek-yonlu' && !curIso) isoCell = '<span style="background:#d1fae5;color:#0e7c5b;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:700;">↑ Tek-yönlüden çıktı</span>';
          else if (!preIso && curIso==='tek-yonlu') isoCell = '<span style="background:#fef3c7;color:#b45309;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:700;">↓ Tek-yönlü izole</span>';
          else isoCell = `<span style="font-size:11px;color:var(--muted);">${preIso||'—'} → ${curIso||'—'}</span>`;

          return `<tr>
            <td><strong>${esc(p.values.fullName||'—')}</strong></td>
            <td>
              <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
                <span style="color:var(--muted);font-size:12px;">${preRC} → ${curRC}</span>
                ${delta(rcDelta)}
              </div>
            </td>
            <td>
              <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
                <span style="color:var(--muted);font-size:12px;">${preSSS!==null?preSSS.toFixed(2):'—'} → ${curSSS!==null?curSSS.toFixed(2):'—'}</span>
                ${sssDelta!==null?`<span style="color:${sssDelta>0.05?'#0e7c5b':sssDelta<-0.05?'#c0392b':'#64748b'};font-weight:800;font-size:12px;">${sssDelta>0?'▲ +':''}${sssDelta.toFixed(2)}</span>`:''}
              </div>
            </td>
            ${(hasPulse||prePulse!==null)?`<td>
              <div style="display:flex;align-items:center;gap:6px;">
                <span style="color:var(--muted);font-size:12px;">${prePulse!==null?prePulse+'%':'—'} → ${curPulse!==null?curPulse+'%':'—'}</span>
                ${pulseDelta(curPulse,prePulse)}
              </div>
            </td>`:''}
            <td>${isoCell}</td>
            <td style="text-align:center;">
              <span style="background:${overallColor}18;color:${overallColor};padding:3px 10px;border-radius:99px;font-size:12px;font-weight:700;">${overallStatus}</span>
            </td>
            <td style="font-size:11px;color:var(--muted);">
              ${preResp?formatDate(preResp.submittedAt).split(',')[0]:'—'}
              <span style="padding:0 4px;">→</span>
              ${curResp?formatDate(curResp.submittedAt).split(',')[0]:'—'}
            </td>
          </tr>`;
        }).join('');

        compareTab = `
        <div class="notice" style="margin-bottom:16px;font-size:13px;">
          Ön-Test: <strong>${esc(preTestProject.name)}</strong> &nbsp;➔&nbsp; Son-Test: <strong>${esc(project.name)}</strong>
        </div>
        <div class="table-wrap"><table>
          <thead><tr>
            <th>Ad Soyad</th>
            <th>Aldığı Seçim (Δ)</th>
            <th>SSS (Δ)</th>
            ${(hasPulse||hasPrePulse)?`<th style="color:var(--pulse);">💜 Pulse (Δ)</th>`:''}
            <th>İzolasyon</th>
            <th>Genel Durum</th>
            <th>Tarihler</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table></div>`;
      }

      return `
    <div class="page-header">
      <div><h2 class="page-title">Yanıtlar</h2>
      <p class="page-subtitle">${responses.length} yanıt · ${pending.length} eşleşmemiş · ${socioQs.length} sosyo soru${hasPulse?` · ${pulseQs.length} pulse soru`:''}</p></div>
    </div>
    ${renderMessages()}
    ${isPostTest && hasPreData ? `
    <div style="border-bottom:1px solid var(--border);margin-bottom:20px;display:flex;gap:0;">

    ${(!isPostTest || activeTab==='current') ? currentTab : ''}
    ${(isPostTest && activeTab==='compare') ? compareTab : ''}
    ${(isPostTest && !hasPreData) ? `<div class="notice">Ön-Test projesinde henüz yanıt yok veya analiz çalıştırılmamış.</div>${currentTab}` : ''}
    `;
    }
    function bindResponsesPage(project) {
      document.querySelectorAll('[data-resp-tab]').forEach(btn => {

    }

    function renderExcelPage(project) {
      const info = project.importInfo; const validCount = project.responses.filter(r => r.status === 'valid').length;
      return `<div class="page-header"><div><h2 class="page-title">Veri Aktar</h2><p class="page-subtitle">Excel'den kişi, soru ve yanıt verilerini içe aktar.</p></div></div>
  ${renderMessages()}
  <div class="card" style="margin-bottom:18px;"><div class="field"><label>.xlsx veya .csv dosyası</label><input id="excel-file" class="input" type="file" accept=".xlsx,.xls,.csv"/></div><div class="row" style="margin-top:14px;"><button class="btn btn-primary" id="import-excel">Dosyayı İçeri Al</button><button class="btn" id="run-analysis-after-import">İçeri Al + Analizi Çalıştır</button></div></div>
  ${info ? `<div class="card" style="margin-bottom:18px;"><div class="section-title">Son İçeri Aktarım</div><div class="grid-2"><div><strong>Dosya:</strong> ${esc(info.fileName)}</div><div><strong>Satır:</strong> ${info.rowCount}</div><div><strong>Geçerli yanıt:</strong> ${validCount}</div><div><strong>Tarih:</strong> ${esc(formatDate(info.importedAt))}</div></div></div>` : ''}
  ${project.analysis?.unmatchedNames?.length ? `<div class="card warning"><strong>Eşleşmeyen isimler:</strong><ul class="match-list">${project.analysis.unmatchedNames.slice(0, 25).map(x => `<li>${esc(x.respondent)} → ${esc(x.rawName)}</li>`).join('')}</ul></div>` : ''}
  `;

    function bindExcelPage(project) {
      async function run(doAnalysis) { const input = document.getElementById('excel-file'); const file = input.files[0]; if (!file) return showMessage('error', 'Önce Excel dosyasını seç.'); try { const buf = await file.arrayBuffer(); const wb = XLSX.read(buf, { type: 'array' }); const result = importWorkbookIntoProject(project, file.name, wb); if (doAnalysis) runAnalysis(project); render(); const scaleMsg = result.scaleCount ? ` · ${result.scaleCount} ölçek sorusu` : ''; showMessage('success', `Excel içeri alındı. ${result.participantCount} kişi · ${result.questionCount} soru${scaleMsg}.`); } catch (err) { showMessage('error', err.message || 'Excel içeri alınamadı.'); } }
      document.getElementById('import-excel').onclick = () => run(false);
      document.getElementById('run-analysis-after-import').onclick = () => run(true);

    function renderAnalysisPage(project) {
      const an = project.analysis;
      const gm = an.groupMetrics;
      const metrics = an.personMetrics || [];
      const pm = an.pulseMetrics || null;
      const hasPulse = project.questions.some(q => q.category === 'pulse-scale' || q.category === 'pulse-yesno' || q.category === 'pulse-text');
      const hasScale = project.questions.some(q => q.category === 'scale-item');
      const tab = ui.analysisTab || 'sosyo';

      const tabBar = `
    <div style="display:flex;gap:4px;border-bottom:2px solid var(--border);margin-bottom:20px;">
      <button data-atab="sosyo" style="padding:10px 20px;border:none;background:none;cursor:pointer;font-size:14px;font-weight:600;border-bottom:3px solid ${tab === 'sosyo' ? 'var(--accent)' : 'transparent'};color:${tab === 'sosyo' ? 'var(--accent)' : 'var(--muted)'};margin-bottom:-2px;">📊 Sosyometri</button>
      ${hasPulse ? `<button data-atab="pulse" style="padding:10px 20px;border:none;background:none;cursor:pointer;font-size:14px;font-weight:600;border-bottom:3px solid ${tab === 'pulse' ? 'var(--pulse)' : 'transparent'};color:${tab === 'pulse' ? 'var(--pulse)' : 'var(--muted)'};margin-bottom:-2px;">💜 Pulse Survey</button>` : ''}
      ${hasScale ? `<button data-atab="scale" style="padding:10px 20px;border:none;background:none;cursor:pointer;font-size:14px;font-weight:600;border-bottom:3px solid ${tab === 'scale' ? '#059669' : 'transparent'};color:${tab === 'scale' ? '#059669' : 'var(--muted)'};margin-bottom:-2px;">📋 Klinik Ölçekler</button>` : ''}
    </div>`;

      return `
    <div class="page-header">
      <div><h2 class="page-title">Analiz</h2><p class="page-subtitle">${project.responses.filter(r => r.status !== 'invalid' && r.status !== 'excluded').length} geçerli yanıt · ${project.participants.filter(p => p.active).length} katılımcı</p></div>
      <div class="row" style="align-items:center;">
        <label style="display:flex;align-items:center;gap:8px;font-size:14px;cursor:pointer;"><input type="checkbox" id="rank-weight-toggle" style="width:16px;height:16px;">Seçim sırası ağırlıklı</label>
        <button class="btn btn-primary" id="run-analysis">Analizi Çalıştır</button>
      </div>
    </div>
    ${renderMessages()}
    ${!an.calculatedAt ? `<div class="empty"><div class="empty-icon">📊</div><div class="empty-title">Analiz bekleniyor</div><div class="empty-desc">Yanıtlar yüklendikten sonra "Analizi Çalıştır" butonuna bas.</div></div>` : `
      ${tabBar}
      ${tab === 'sosyo' ? renderSosyoTab(project, gm, metrics) : tab === 'scale' ? renderScaleTab(project, pm) : renderPulseTab(project, pm)}
    `}`;
    }

    function renderSosyoTab(project, gm, metrics) {
      // Orijinal analiz içeriği — hiçbir şey değişmedi
      return `
    <div class="notice">Son hesaplama: ${esc(formatDate(project.analysis.calculatedAt))}</div>
    <div class="stats">
      <div class="card"><div class="muted" style="font-size:12px;">🎯 Katılım Oranı</div><div class="stat-value" style="color:var(--accent)">${gm ? Math.round(gm.participationRate * 100) : 0}%</div><div class="small muted">${gm ? gm.totalRespondents + '/' + gm.totalParticipants + ' kişi' : ''}</div></div>
      <div class="card"><div class="muted" style="font-size:12px;">🕸 Ağ Yoğunluğu</div><div class="stat-value">${gm ? gm.networkDensity : 0}%</div></div>
      <div class="card"><div class="muted" style="font-size:12px;">🔄 Karş. Seçim</div><div class="stat-value" style="color:var(--ok)">${gm ? gm.mutualRate : 0}%</div></div>
      <div class="card"><div class="muted" style="font-size:12px;">⭐ Yıldız</div><div class="stat-value" style="color:var(--ok)">${gm ? (gm.stars?.length || 0) : 0}</div></div>
      <div class="card"><div class="muted" style="font-size:12px;">🔴 Tam İzole</div><div class="stat-value" style="color:var(--warning)">${gm ? (gm.fullyIsolated?.length || 0) : 0}</div></div>

    <div class="table-wrap"><table><thead><tr><th>Kişi</th><th>Seçildi</th><th>İtildi</th><th>Seçti</th><th>İtti</th><th>Karş.Seçim</th><th>Net</th><th>SSS</th><th title="Kişinin seçileceğini düşündüğü kişi sayısı / gerçekte seçildiği kişi sayısı. Yüksek = Sosyal konumunu doğru algılıyor.">Alg.Doğr.%</th><th>Durum</th></tr></thead><tbody>
    ${[...metrics].sort((a, b) => b.receivedChoices - a.receivedChoices).map(m => {

        const hasPercData = (m.perceivedChoices || 0) > 0 || (m.receivedChoices || 0) > 0;

      }).join('')}

    function renderScaleTab(project, pm) {
      const scaleQs = project.questions.filter(q => q.category === 'scale-item');
      if (!scaleQs.length) {
        return `<div class="empty"><div class="empty-icon">📋</div><div class="empty-title">Klinik ölçek yok</div><div class="empty-desc">Ölçek sayfasından "📋 Hazır Ölçek" butonuyla BDI veya CDI ekleyebilirsin.</div></div>`;
      }

      const active = project.participants.filter(p => p.active);
      const validResps = project.responses.filter(r => r.respondentId && r.status !== 'excluded' && r.status !== 'invalid');
      const scaleGroups = {};
      scaleQs.forEach(q => { const sid = q.scaleId || 'genel'; if (!scaleGroups[sid]) scaleGroups[sid] = []; scaleGroups[sid].push(q); });

      const SCALE_COLORS = { bdi: '#7c3aed', cdi: '#0369a1' };
      const SCALE_CUTOFFS = {
        bdi: [{ max: 13, label: 'Minimal', color: '#0e7c5b' }, { max: 19, label: 'Hafif', color: '#b45309' }, { max: 28, label: 'Orta', color: '#d97706' }, { max: 999, label: 'Şiddetli', color: '#c0392b' }],
        cdi: [{ max: 19, label: 'Normal', color: '#0e7c5b' }, { max: 29, label: 'Hafif', color: '#b45309' }, { max: 39, label: 'Orta', color: '#d97706' }, { max: 999, label: 'Şiddetli', color: '#c0392b' }],
      };

      function getCategory(sid, total) {
        const cuts = SCALE_CUTOFFS[sid] || [{ max: 999, label: '—', color: '#888' }];
        return cuts.find(c => total <= c.max) || cuts[cuts.length - 1];
      }

      // Kişi bazlı puanlar
      const personScores = {};
      for (const p of active) {
        personScores[p.id] = {};
        const resp = validResps.find(r => r.respondentId === p.id);
        for (const [sid, qs] of Object.entries(scaleGroups)) {
          if (!resp) { personScores[p.id][sid] = null; continue; }
          let total = 0, answered = 0;
          for (const q of qs) {
            const ans = (resp.answers || []).find(a => a.questionId === q.id);
            if (ans?.numericValue !== undefined && ans.numericValue !== null) { total += ans.numericValue; answered++; }
          }
          personScores[p.id][sid] = answered > 0 ? { total, answered, maxPossible: qs.length * (qs[0]?.scaleMax || 3) } : null;
        }
      }

      // Sosyometrik metrikler
      const metrics = project.analysis.personMetrics || [];

      let html = '';
      for (const [sid, qs] of Object.entries(scaleGroups)) {
        const scaleName = qs[0]?.scaleName || sid.toUpperCase();
        const scaleColor = SCALE_COLORS[sid] || '#059669';
        const maxScore = qs.length * (qs[0]?.scaleMax || 3);

        // Grup istatistikleri
        const allScores = active.map(p => personScores[p.id][sid]).filter(s => s !== null);
        const avgTotal = allScores.length ? Math.round(allScores.reduce((s, v) => s + v.total, 0) / allScores.length * 10) / 10 : null;
        const catCounts = {};
        allScores.forEach(s => {
          const cat = getCategory(sid, s.total);
          catCounts[cat.label] = (catCounts[cat.label] || 0) + 1;
        });

        html += `
    <div class="card" style="margin-bottom:24px;border-left:4px solid ${scaleColor};">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;flex-wrap:wrap;gap:10px;">
        <div>
          <div style="font-size:15px;font-weight:800;color:${scaleColor};">${esc(scaleName)}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:3px;">${qs.length} soru · Max ${maxScore} puan · ${allScores.length} yanıt</div>
        </div>
        ${avgTotal !== null ? `<div style="text-align:right;">
          <div style="font-size:28px;font-weight:900;color:${getCategory(sid, avgTotal).color};">${avgTotal}</div>
          <div style="font-size:11px;color:var(--muted);">Grup ort. · ${getCategory(sid, avgTotal).label}</div>
        </div>` : ''}
      </div>

      <!-- Dağılım -->
      ${Object.keys(catCounts).length ? `
      <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;">
        ${Object.entries(catCounts).map(([label, count]) => {
          const cat = (SCALE_CUTOFFS[sid] || []).find(c => c.label === label);
          return `<div style="background:${cat?.color || '#888'}22;border:1px solid ${cat?.color || '#888'}44;border-radius:8px;padding:8px 14px;text-align:center;">
            <div style="font-size:20px;font-weight:800;color:${cat?.color || '#888'};">${count}</div>
            <div style="font-size:11px;color:var(--muted);">${esc(label)}</div>
          </div>`;
        }).join('')}
      </div>` : ''}

      <!-- Kişi tablosu — sadece yetkili görür -->
      <div style="background:var(--warning-soft);border:1px solid var(--warning);border-radius:8px;padding:8px 12px;margin-bottom:12px;font-size:12px;color:var(--warning);font-weight:600;">
        🔒 Bu tablo yalnızca yetkili PDR/uzman içindir. Katılımcılarla paylaşmayın.
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Katılımcı</th>
            <th>Toplam Puan</th>
            <th>Kategori</th>
            <th>Sosyo SSS</th>
            <th>Sosyo Durum</th>
            <th>Risk Notu</th>
          </tr></thead>
          <tbody>
            ${[...active].sort((a, b) => {
          const sa = personScores[a.id][sid];
          const sb = personScores[b.id][sid];
          return (sb?.total ?? -1) - (sa?.total ?? -1);
        }).map(p => {
          const s = personScores[p.id][sid];
          const m = metrics.find(x => x.participantId === p.id);
          const sss = m?.sss ?? '—';
          const isoLabel = m?.isolationType === 'tam' ? '🔴 Tam İzole' : m?.isolationType === 'tek-yonlu' ? '🟡 Tek Yönlü' : (m?.sss || 0) >= 0.3 && (m?.receivedRejections || 0) <= 1 ? '⭐ Yıldız' : '—';
          if (!s) return `<tr>
                <td><strong>${esc(p.values.fullName || '—')}</strong></td>
                <td colspan="5" style="color:var(--muted);font-size:12px;">Yanıt yok</td>
              </tr>`;
          const cat = getCategory(sid, s.total);
          // Risk notu: yüksek skor + izole veya çok itilen → özel dikkat
          let riskNote = '';
          if (s.total >= (sid === 'bdi' ? 29 : 40)) {
            riskNote = '⚠️ Acil değerlendirme';
          } else if (s.total >= (sid === 'bdi' ? 20 : 30) && (m?.isolationType || (m?.receivedRejections || 0) >= 2)) {
            riskNote = '🔶 Öncelikli görüşme';
          } else if (s.total >= (sid === 'bdi' ? 14 : 20)) {
            riskNote = '🔷 Takipte tut';
          }
          return `<tr style="${s.total >= (sid === 'bdi' ? 29 : 40) ? 'background:var(--danger-soft);' : ''}">
                <td><strong>${esc(p.values.fullName || '—')}</strong></td>
                <td><strong style="font-size:16px;color:${cat.color};">${s.total}</strong><span style="font-size:11px;color:var(--muted);"> / ${s.maxPossible}</span></td>
                <td><span style="background:${cat.color}22;color:${cat.color};padding:3px 10px;border-radius:99px;font-size:12px;font-weight:700;">${esc(cat.label)}</span></td>
                <td style="font-weight:700;color:${sss >= 0 ? 'var(--ok)' : 'var(--danger)'};">${typeof sss === 'number' ? (sss > 0 ? '+' : '') + sss : '—'}</td>
                <td>${esc(isoLabel)}</td>
                <td style="font-size:12px;font-weight:600;">${riskNote}</td>
              </tr>`;
        }).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
      }

      return html;
    }

    function renderPulseTab(project, pm) {
      const PULSE_DIM_LABELS = {
        'psikolojik-guvenlik': 'Psikolojik Güvenlik',
        'motivasyon': 'Motivasyon',
        'is-yuku': 'İş Yükü',
        'takim-uyumu': 'Takım Uyumu',
        'yonetici-iliskisi': 'Yönetici İlişkisi',
        'genel': 'Genel'
      };
      const metrics = project.analysis.personMetrics || [];
      const active = project.participants.filter(p => p.active);
      const pulseQs = project.questions.filter(q =>
        q.category === 'pulse-scale' || q.category === 'pulse-yesno' || q.category === 'pulse-text'
      );

      if (!pulseQs.length) {
        return `<div class="empty"><div class="empty-icon">💜</div><div class="empty-title">Pulse sorusu yok</div><div class="empty-desc">Henüz pulse sorusu eklenmemiş. Ölçek sayfasından pulse sorusu ekleyebilirsin.</div></div>`;
      }

      // Soru bazlı istatistikler
      const validResps = project.responses.filter(r => r.respondentId && r.status !== 'excluded' && r.status !== 'invalid');

      const qStats = pulseQs.map(q => {
        const answers = validResps.map(r => {
          const ans = (r.answers || []).find(a => a.questionId === q.id);
          return ans?.numericValue ?? null;
        }).filter(v => v !== null);
        const avg = answers.length ? answers.reduce((s, v) => s + v, 0) / answers.length : null;
        const maxVal = q.pulseMax || 5;
        return { q, answers, avg, maxVal, pct: avg !== null ? Math.round((avg / maxVal) * 100) : null };
      });

      // Boyut ortalamaları
      const dimMap = {};
      for (const { q, avg, maxVal } of qStats) {
        if (avg === null || q.category !== 'pulse-scale') continue;
        const dim = q.pulseDimension || 'genel';
        if (!dimMap[dim]) dimMap[dim] = [];
        dimMap[dim].push(Math.round((avg / maxVal) * 100));
      }
      const dimAvgs = Object.entries(dimMap).map(([dim, vals]) => ({
        dim,
        label: PULSE_DIM_LABELS[dim] || dim,
        avg: Math.round(vals.reduce((s, v) => s + v, 0) / vals.length)
      })).sort((a, b) => a.avg - b.avg);

      // Kişi bazlı pulse skorları
      const personScores = active.map(p => {
        const resp = validResps.find(r => r.respondentId === p.id);
        if (!resp) return { p, score: null };
        const scores = [];
        for (const q of pulseQs.filter(q => q.category === 'pulse-scale')) {
          const ans = (resp.answers || []).find(a => a.questionId === q.id);
          if (ans?.numericValue !== undefined) scores.push(Math.round((ans.numericValue / (q.pulseMax || 5)) * 100));
        }
        return { p, score: scores.length ? Math.round(scores.reduce((s, v) => s + v, 0) / scores.length) : null };
      });

      // Sosyo-Pulse 2x2 matrisi
      const quadData = metrics.map(m => {
        const ps = personScores.find(x => x.p.id === m.participantId);
        return { m, score: ps?.score ?? null };
      }).filter(d => d.score !== null);

      const q1 = quadData.filter(d => d.m.sss >= 0 && d.score >= 60);   // Yıldız + İyi
      const q2 = quadData.filter(d => d.m.sss >= 0 && d.score < 60);    // Yıldız + Düşük
      const q3 = quadData.filter(d => d.m.sss < 0 && d.score >= 60);    // İzole + İyi
      const q4 = quadData.filter(d => d.m.sss < 0 && d.score < 60);     // İzole + Düşük

      function quadCard(title, desc, color, bg, people) {
        return `<div style="background:${bg};border-radius:12px;padding:14px;border:1px solid ${color}44;">
      <div style="font-weight:800;font-size:13px;color:${color};margin-bottom:4px;">${title}</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:10px;">${desc}</div>
      ${people.length
            ? people.map(d => `<div style="font-size:12px;padding:3px 0;border-bottom:1px solid ${color}22;">${esc(participantName(project, d.m.participantId))} <span style="color:${color};font-size:11px;">SSS:${d.m.sss > 0 ? '+' : ''}${d.m.sss} · Pulse:${d.score}</span></div>`).join('')
            : `<div style="font-size:12px;color:var(--muted);">Bu kademede kimse yok</div>`}
    </div>`;
      }

      return `
    <!-- Pulse özet kutusu -->
    ${dimAvgs.length ? `
    <div class="card" style="margin-bottom:20px;border-left:4px solid var(--pulse);">
      <div style="font-size:13px;font-weight:800;color:var(--pulse);margin-bottom:14px;">💜 BOYUT BAZLI ORTALAMALAR</div>
      ${dimAvgs.map(({ label, avg }) => {
        const color = avg >= 75 ? 'var(--ok)' : avg >= 50 ? 'var(--warning)' : 'var(--danger)';
        return `<div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border);">
          <div style="width:170px;font-size:13px;font-weight:600;flex-shrink:0;">${esc(label)}</div>
          <div style="flex:1;height:8px;background:var(--surface2);border-radius:99px;">
            <div style="width:${avg}%;height:100%;border-radius:99px;background:${color};transition:width .4s;"></div>
          </div>
          <div style="width:40px;text-align:right;font-size:13px;font-weight:800;color:${color};">${avg}%</div>
        </div>`;
      }).join('')}
    </div>` : ''}

    <!-- Soru bazlı sonuçlar -->
    <div class="section-title">SORU BAZLI SONUÇLAR</div>
    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:24px;">
      ${qStats.map(({ q, answers, avg, maxVal, pct }) => {
        const color = pct === null ? 'var(--muted)' : pct >= 75 ? 'var(--ok)' : pct >= 50 ? 'var(--warning)' : 'var(--danger)';
        const dimLabel = PULSE_DIM_LABELS[q.pulseDimension] || '';
        return `<div class="card" style="padding:14px;">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:12px;flex-wrap:wrap;">
            <div>
              <strong style="font-size:14px;">${esc(q.title)}</strong>
              ${dimLabel ? `<span style="background:var(--pulse-soft);color:var(--pulse);padding:2px 8px;border-radius:99px;font-size:11px;font-weight:700;margin-left:8px;">${esc(dimLabel)}</span>` : ''}
            </div>
            ${avg !== null
            ? `<div style="font-size:22px;font-weight:800;color:${color};">${avg.toFixed(1)}<span style="font-size:13px;color:var(--muted);"> / ${maxVal}</span></div>`
            : '<div class="muted small">Veri yok</div>'}
          </div>
          ${pct !== null ? `
          <div style="height:6px;background:var(--surface2);border-radius:99px;margin-bottom:6px;">
            <div style="width:${pct}%;height:100%;border-radius:99px;background:${color};"></div>
          </div>
          <div style="display:flex;gap:16px;font-size:12px;color:var(--muted);">
            <span>Yanıt: ${answers.length}</span>
            <span>Min: ${Math.min(...answers)}</span>
            <span>Max: ${Math.max(...answers)}</span>
          </div>` : ''}
          ${q.category === 'pulse-yesno' && answers.length
            ? `<div style="margin-top:6px;font-size:13px;">✓ Evet: ${answers.filter(v => v === 1).length} &nbsp; ✗ Hayır: ${answers.filter(v => v === 0).length}</div>`
            : ''}
        </div>`;
      }).join('')}
    </div>

    <!-- Kişi bazlı skorlar -->
    <div class="section-title">KİŞİ BAZLI PULSE SKORLARI</div>
    <div class="table-wrap" style="margin-bottom:24px;">
      <table>
        <thead><tr><th>Kişi</th><th>Pulse Skoru (0-100)</th><th>Durum</th><th>Sosyo SSS</th></tr></thead>
        <tbody>
          ${personScores.sort((a, b) => (b.score ?? -1) - (a.score ?? -1)).map(({ p, score }) => {
        const color = score === null ? 'var(--muted)' : score >= 75 ? 'var(--ok)' : score >= 50 ? 'var(--warning)' : 'var(--danger)';
        const label = score === null ? '—' : score >= 75 ? 'İyi' : score >= 50 ? 'Orta' : 'Düşük';
        const m = metrics.find(x => x.participantId === p.id);
        const sss = m?.sss ?? '—';
        return `<tr>
              <td><strong>${esc(p.values.fullName || '—')}</strong></td>
              <td>
                ${score !== null
            ? `<div style="display:flex;align-items:center;gap:10px;">
                      <div style="flex:1;height:6px;background:var(--surface2);border-radius:99px;">
                        <div style="width:${score}%;height:100%;border-radius:99px;background:${color};"></div>
                      </div>
                      <strong style="color:${color};width:32px;">${score}</strong>
                    </div>`
            : '<span class="muted small">Yanıt yok</span>'}
              </td>
              <td><span style="background:${score === null ? 'var(--surface2)' : score >= 75 ? 'var(--ok-soft)' : score >= 50 ? 'var(--warning-soft)' : 'var(--danger-soft)'};color:${score === null ? 'var(--muted)' : score >= 75 ? 'var(--ok)' : score >= 50 ? 'var(--warning)' : 'var(--danger)'};padding:3px 10px;border-radius:99px;font-size:12px;font-weight:700;">${label}</span></td>
              <td style="font-weight:700;color:${sss >= 0 ? 'var(--ok)' : 'var(--danger)'};">${typeof sss === 'number' ? (sss > 0 ? '+' : '') + sss : '—'}</td>
            </tr>`;
      }).join('')}
        </tbody>

    function exportExcelReport(project) {
      const wb = XLSX.utils.book_new();
      const PULSE_CATS = ['pulse-scale', 'pulse-yesno', 'pulse-text', 'scale-item'];
      const pm = project.analysis.pulseMetrics;

      // Katılımcılar
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(project.participants.filter(p => p.active).map(p => p.values)), 'Kisiler');
      // Sorular
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(project.questions.map(q => ({ baslik: q.title, kategori: q.category, min: q.min, max: q.max }))), 'Sorular');
      // İlişkiler
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(project.analysis.relations.map(r => ({ from: participantName(project, r.from), to: participantName(project, r.to), soru: project.questions.find(q => q.id === r.questionId)?.title || r.questionId, tip: r.type }))), 'Iliskiler');
      // Sosyo metrikler
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(project.analysis.personMetrics.map(m => ({ kisi: participantName(project, m.participantId), aldigi_secim: m.receivedChoices, aldigi_itme: m.receivedRejections, net: m.netScore || 0, sss: m.sss || 0, izolasyon: m.isolationType || '—' }))), 'Sosyo_Metrikler');

      // Pulse metrikler (varsa)
      if (pm) {
        // Kişi bazlı pulse skorları
        const pulseRows = project.participants.filter(p => p.active).map(p => {
          const score = pm.personPulseScores[p.id];
          const pss = pm.personScaleScores?.[p.id] ?? null;
          const risk = calcRiskScore(project.analysis.personMetrics.find(m => m.participantId === p.id), score, pss);
          return { kisi: p.values.fullName || '—', pulse_skoru: score ?? '—', risk_skoru: risk };
        });
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(pulseRows), 'Pulse_Kisiler');

        // Boyut ortalamaları
        const PULSE_DIM_LABELS = { 'psikolojik-guvenlik': 'Psikolojik Güvenlik', 'motivasyon': 'Motivasyon', 'is-yuku': 'İş Yükü', 'takim-uyumu': 'Takım Uyumu', 'yonetici-iliskisi': 'Yönetici İlişkisi', 'genel': 'Genel' };
        const dimRows = Object.entries(pm.dimensionAverages).map(([dim, avg]) => ({ boyut: PULSE_DIM_LABELS[dim] || dim, ortalama_pct: avg }));
        if (dimRows.length) XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(dimRows), 'Pulse_Boyutlar');
      }

      XLSX.writeFile(wb, `${project.name}_rapor.xlsx`);
    }

    function buildReportHtml(project, secs, sociogramPng, opts) {

      const css = `body{font-family:Arial,sans-serif;padding:30px;color:#111;font-size:13px;}h1{font-size:22px;margin:0 0 4px;}h2{font-size:17px;margin:28px 0 10px;border-bottom:2px solid #2563eb;padding-bottom:6px;color:#1e3a8a;}table{width:100%;border-collapse:collapse;margin-top:10px;margin-bottom:16px;}th,td{border:1px solid #d1d5db;padding:7px 10px;font-size:12px;}th{background:#eff6ff;color:#1e3a8a;font-weight:700;}tr:nth-child(even){background:#f9fafb;}.ok{background:#dcfce7;color:#166534;}.danger{background:#fee2e2;color:#991b1b;}.badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:700;}`;

      if (secs.kurumBilgileri) html += `<h2>Kurum Bilgileri</h2><table><tbody><tr><th>Kurum Adı</th><td>${esc(project.institution.name || '—')}</td><th>Birim</th><td>${esc(project.institution.unit || '—')}</td></tr></tbody></table>`;

      if (secs.katilimciListesi) { html += `<h2>Katılımcı Listesi</h2><table><thead><tr><th>Ad Soyad</th><th>Cinsiyet</th><th>Kod</th></tr></thead><tbody>`; active.forEach(p => { html += `<tr><td>${esc(pName(p.id))}</td><td>${esc(p.values.gender || '—')}</td><td>${esc(p.values.code || '—')}</td></tr>`; }); html += `</tbody></table>`; }
      if (secs.soruListesi) { html += `<h2>Soru Listesi</h2><table><thead><tr><th>Soru</th><th>Kategori</th><th>Min</th><th>Max</th></tr></thead><tbody>`; project.questions.forEach(q => { html += `<tr><td>${esc(q.title)}</td><td>${esc(q.category)}</td><td>${q.min}</td><td>${q.max}</td></tr>`; }); html += `</tbody></table>`; }
      if (secs.kisiMetrikleri) { html += `<h2>Kişi Bazlı Metrikler</h2><table><thead><tr><th>Kişi</th><th>Seçildi</th><th>İtildi</th><th>Net</th><th>SSS</th><th>Durum</th></tr></thead><tbody>`;[...metrics].sort((a, b) => b.receivedChoices - a.receivedChoices).forEach(m => { const status = m.isolationType === 'tam' ? 'Tam İzole' : m.isolationType === 'tek-yonlu' ? 'Tek Yönlü' : (m.sss || 0) >= 0.3 && (m.receivedRejections || 0) <= 1 ? '⭐ Yıldız' : '—'; html += `<tr><td><strong>${esc(pName(m.participantId))}</strong></td><td>${m.receivedChoices}</td><td>${m.receivedRejections}</td><td style="font-weight:700;color:${(m.netScore || 0) >= 0 ? '#166534' : '#991b1b'}">${(m.netScore || 0) > 0 ? '+' : ''}${m.netScore || 0}</td><td>${m.sss || 0}</td><td>${esc(status)}</td></tr>`; }); html += `</tbody></table>`; }

    let SOCIO_NODES = [], SOCIO_EDGES = [], SOCIO_ANIM = null,
      SOCIO_DRAG = null, SOCIO_DRAG_OFF = { x: 0, y: 0 },
      SOCIO_SPOTLIGHT = null, SOCIO_SHOW_PULSE = true,

      SOCIO_VIEW_MODE = 'normal', // 'normal' | 'risk'
      SOCIO_LEVEL_MODE = 'micro', // 'micro' | 'macro'
