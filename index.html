<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sosyal Pusula</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <meta name="theme-color" content="#2563eb" />
  <script src="./vendor/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg: #f0f4f8;
      --surface: #ffffff;
      --surface2: #f7f9fc;
      --border: #dde4ed;
      --text: #111827;
      --muted: #5a6a7e;
      --accent: #1a56a0;
      --accent-soft: #dbeafe;
      --accent2: #0e7c5b;
      --accent2-soft: #d1fae5;
      --danger: #c0392b;
      --danger-soft: #fde8e6;
      --ok: #0e7c5b;
      --ok-soft: #d1fae5;
      --warning: #b45309;
      --warning-soft: #fef3c7;
      --pulse: #7c3aed;
      --pulse-soft: #ede9fe;
      --radius: 14px;
      --radius-sm: 8px;
      --shadow: 0 2px 8px rgba(15,23,42,.07), 0 8px 24px rgba(15,23,42,.05);
      --shadow-sm: 0 1px 4px rgba(15,23,42,.06);
    }
    * { box-sizing: border-box; }
    [data-theme="dark"] {
      --bg: #0d1117; --surface: #161b22; --surface2: #0d1117; --border: #30363d;
      --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff; --accent-soft: #1c2d3f;
      --accent2: #3fb950; --accent2-soft: #122d1c; --danger: #f85149; --danger-soft: #2d1117;
      --ok: #3fb950; --ok-soft: #122d1c; --warning: #d29922; --warning-soft: #272115;
      --pulse: #a78bfa; --pulse-soft: #2e1065;
      background: var(--bg);
    }
    [data-theme="dark"] body { background: var(--bg); }
    [data-theme="dark"] svg { background: radial-gradient(circle at center, #162032 0%, #0f172a 100%) !important; }
    [data-theme="dark"] input, [data-theme="dark"] select, [data-theme="dark"] textarea {
      background: var(--surface2) !important; color: var(--text) !important; border-color: var(--border) !important;
    }
    body { margin:0; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    .app { max-width: 1320px; margin: 0 auto; padding: 24px; }
    .shell { display: grid; grid-template-columns: 280px 1fr; gap: 20px; min-height: calc(100vh - 48px); }
    .sidebar, .panel, .card, .table-wrap, .empty { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); }
    .sidebar { padding: 16px; display: flex; flex-direction: column; gap: 10px; position: sticky; top: 24px; height: fit-content; border-left: 3px solid var(--accent); }
    .brand { padding: 8px 12px 14px; border-bottom: 1px solid var(--border); }
    .brand h1 { margin: 0 0 3px; font-size: 18px; font-weight: 800; letter-spacing: -.3px; color: var(--accent); }
    .brand p { margin: 0; color: var(--muted); font-size: 12px; line-height: 1.4; }
    .project-head { padding: 12px; border-radius: 14px; background: var(--surface2); border: 1px solid var(--border); }
    .project-head strong { display: block; margin-bottom: 4px; }
    .project-head span { color: var(--muted); font-size: 12px; }
    .nav { display: flex; flex-direction: column; gap: 2px; }
    .nav-group { margin-top: 10px; }
    .nav-group-label { font-size: 10px; font-weight: 800; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; padding: 4px 10px 6px; display: block; }
    .nav button { width: 100%; text-align: left; border: 1px solid transparent; background: transparent; color: var(--text); padding: 9px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 8px; transition: background .12s; }
    .nav button .nav-icon { font-size: 15px; width: 20px; text-align: center; flex-shrink: 0; }
    .nav button.active { background: var(--accent-soft); color: var(--accent); border-color: var(--accent-soft); font-weight: 700; }
    .nav button:hover:not(.active) { background: var(--surface2); }
    .content { min-width: 0; }
    .panel { padding: 22px; }
    .page-header { display: flex; justify-content: space-between; gap: 18px; align-items: flex-start; margin-bottom: 20px; }
    .page-title { margin: 0 0 6px; font-size: 28px; }
    .page-subtitle { margin: 0; color: var(--muted); font-size: 14px; line-height: 1.6; }
    .btn { border: 1px solid var(--border); background: var(--surface); color: var(--text); padding: 10px 14px; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 14px; display: inline-flex; gap: 8px; align-items: center; justify-content: center; text-decoration: none; }
    .btn:hover { filter: brightness(.99); }
    .btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
    .btn-danger { background: var(--danger); color: white; border-color: var(--danger); }
    .btn-soft { background: var(--surface2); }
    .btn:disabled { opacity: .55; cursor: not-allowed; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; }
    .field { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
    .field label { font-size: 13px; color: var(--muted); font-weight: 600; }
    .input, .select, .textarea { width: 100%; border: 1px solid var(--border); background: white; border-radius: 12px; padding: 11px 12px; font: inherit; color: var(--text); }
    .textarea { min-height: 120px; resize: vertical; }
    .input:focus, .select:focus, .textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
    .grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; }
    .card { padding: 18px; transition: box-shadow .15s; }
    .stats { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; margin-bottom: 24px; }
    .stat-value { font-size: 28px; font-weight: 800; margin-top: 4px; line-height: 1; }
    .table-wrap { overflow: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 760px; }
    th, td { text-align: left; padding: 12px 14px; border-bottom: 1px solid #e8eef7; vertical-align: top; font-size: 14px; }
    th { font-size: 11px; letter-spacing: .05em; color: var(--muted); text-transform: uppercase; background: var(--surface2); position: sticky; top: 0; font-weight: 700; }
    .badge { display: inline-flex; align-items: center; justify-content: center; border-radius: 999px; padding: 4px 10px; font-size: 12px; font-weight: 700; border: 1px solid transparent; }
    .badge-ok { background: var(--ok-soft); color: var(--ok); }
    .badge-warn { background: var(--warning-soft); color: var(--warning); }
    .badge-danger { background: var(--danger-soft); color: var(--danger); }
    .badge-soft { background: var(--surface2); color: var(--muted); border-color: var(--border); }
    .empty { padding: 48px 24px; text-align: center; color: var(--muted); display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .empty-icon { font-size: 36px; opacity: .4; }
    .empty-title { font-size: 16px; font-weight: 600; color: var(--text); }
    .empty-desc { font-size: 13px; max-width: 300px; line-height: 1.6; }
    .notice, .error, .success { padding: 12px 14px; border-radius: 12px; margin-bottom: 14px; font-size: 14px; border: 1px solid transparent; }
    .notice { background: var(--surface2); border-color: var(--border); color: var(--muted); }
    .error { background: var(--danger-soft); border-color: #fecaca; color: var(--danger); }
    .success { background: var(--ok-soft); border-color: #bbf7d0; color: var(--ok); }
    .warning { background: var(--warning-soft); border-color: #fed7aa; color: var(--warning); }
    .section-title { font-size: 13px; font-weight: 800; color: var(--muted); letter-spacing: .06em; margin: 18px 0 10px; }
    .question-card { border: 1px solid var(--border); border-radius: 16px; padding: 16px; background: white; }
    .question-card h4 { margin: 0 0 8px; font-size: 16px; }
    .question-card p { margin: 0 0 12px; color: var(--muted); line-height: 1.6; font-size: 14px; }
    svg { display: block; width: 100%; height: auto; background: radial-gradient(circle at center, #f8fbff 0%, #eef4fb 100%); }
    .legend { display: flex; flex-wrap: wrap; gap: 12px; font-size: 13px; color: var(--muted); margin: 12px 0 0; }
    .legend span { display: inline-flex; align-items: center; gap: 6px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .projects-list { display: flex; flex-direction: column; gap: 12px; }
    .project-item { border: 1px solid var(--border); border-radius: 12px; padding: 18px; background: var(--surface); transition: box-shadow .15s, transform .1s; cursor: pointer; }
    .project-item:hover { box-shadow: 0 4px 16px rgba(26,86,160,.1); transform: translateY(-1px); }
    .project-item h3 { margin: 0 0 8px; }
    .project-item p { margin: 0; color: var(--muted); font-size: 13px; }
    .split { display: flex; justify-content: space-between; gap: 12px; align-items: center; flex-wrap: wrap; }
    .muted { color: var(--muted); }
    .small { font-size: 12px; }
    .match-list { margin: 0; padding-left: 18px; }
    .detail-panel { position: fixed; right: 0; top: 0; height: 100vh; width: 320px; background: var(--surface); border-left: 1px solid var(--border); box-shadow: 0 4px 18px rgba(0,0,0,.12); padding: 24px; overflow-y: auto; z-index: 100; transform: translateX(100%); transition: transform .25s; }
    .detail-panel.open { transform: translateX(0); }
    .detail-close { position: absolute; top: 16px; right: 16px; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 20px; line-height: 1; }
    .detail-name { font-size: 22px; font-weight: 700; margin-bottom: 4px; padding-right: 24px; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 14px 0; }
    .detail-metric { background: var(--surface2); border-radius: 10px; padding: 10px 12px; }
    .detail-metric-label { font-size: 11px; color: var(--muted); }
    .detail-metric-val { font-size: 22px; font-weight: 700; }
    .divider { height: 1px; background: var(--border); margin: 16px 0; }
    .install-fab { position: fixed; right: 20px; bottom: 20px; z-index: 110; box-shadow: 0 14px 32px rgba(37,99,235,.28); }
    .install-fab.hidden { display: none; }
    @media (max-width: 980px) { .shell { grid-template-columns: 1fr; } .sidebar { position: static; } .grid-2, .grid-3, .stats { grid-template-columns: 1fr; } }
    @media (max-width: 640px) { .app { padding: 10px; } .shell { gap: 10px; } .panel { padding: 14px; } .page-title { font-size: 22px; } .sidebar { padding: 12px; } .btn { padding: 8px 10px; font-size: 13px; } .detail-panel { width: 100% !important; } table { min-width: 500px; } }
  </style>
</head>
<body>
  <div class="app">
    <div class="shell">
      <aside class="sidebar" id="sidebar"></aside>
      <main class="content">
        <div class="panel" id="view"></div>
      </main>
    </div>
  </div>
  <button class="btn btn-primary install-fab hidden" id="install-app-btn">Uygulamayı Yükle</button>
<script>
const STORAGE_KEY = 'sosyometri_local_projects_v2';
(function(){ const t = localStorage.getItem('sosyo_theme') || 'light'; document.documentElement.setAttribute('data-theme', t); })();
const ui = { currentProjectId: null, currentPage: 'projects', messages: [], analysisTab: 'sosyo' };

function nowISO() { return new Date().toISOString(); }
function uid(prefix='id') { return prefix + '_' + Math.random().toString(36).slice(2, 10); }
function esc(str) { return String(str ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function formatDate(v) { if (!v) return '—'; const d = new Date(v); if (Number.isNaN(d.getTime())) return String(v); return d.toLocaleString('tr-TR'); }
function loadProjects() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { return []; } }
function saveProjects(projects) { localStorage.setItem(STORAGE_KEY, JSON.stringify(projects)); }
function getProjects() { return loadProjects(); }
function getProject() { return getProjects().find(p => p.id === ui.currentProjectId) || null; }
function updateProject(project) { const projects = getProjects(); const idx = projects.findIndex(p => p.id === project.id); if (idx >= 0) projects[idx] = project; else projects.push(project); saveProjects(projects); }
function deleteProject(id) { saveProjects(getProjects().filter(p => p.id !== id)); if (ui.currentProjectId === id) { ui.currentProjectId = null; ui.currentPage = 'projects'; } }
function projectTemplate(name='Yeni Proje') {
  return { id: uid('proj'), name, createdAt: nowISO(), updatedAt: nowISO(), institution: { name:'', type:'', unit:'', city:'', notes:'', codePrefix:'' }, schema: { requiredFields: [{ key:'fullName', label:'Ad Soyad', type:'text', required:true }, { key:'gender', label:'Cinsiyet', type:'select', required:false, options:['Kadın','Erkek'] }], customFields: [] }, participants: [], questions: [], responses: [], analysis: { calculatedAt:null, relations:[], personMetrics:[], groupMetrics:null, unmatchedNames:[], pulseMetrics: null }, importInfo: null };
}
function normalizeTR(s) { return String(s ?? '').normalize('NFKD').replace(/[\u0300-\u036f]/g, '').replace(/İ/g,'I').replace(/ı/g,'i').replace(/Ö/g,'O').replace(/ö/g,'o').replace(/Ü/g,'U').replace(/ü/g,'u').replace(/Ş/g,'S').replace(/ş/g,'s').replace(/Ğ/g,'G').replace(/ğ/g,'g').replace(/Ç/g,'C').replace(/ç/g,'c').toUpperCase().replace(/[^A-Z0-9 ]+/g,' ').replace(/\s+/g,' ').trim(); }
function splitNames(value) { if (!value) return []; return String(value).replace(/\r/g,'\n').replace(/\u2022/g,'\n').replace(/\s+-\s+/g,'\n').replace(/\d+\)/g,'\n').replace(/\d+\./g,'\n').split(/[\n,;\/]+/).map(s=>s.trim()).filter(Boolean); }
function inferQuestionCategory(title) { const n = normalizeTR(title); if (/ISTEMEZ|UYGUN GORMEZ|DISLAR|UZAK|REDD|OLMASIN/.test(n) && /SENI|SIZI|LISTESINE|TAHMIN|SANIYORSUN/.test(n)) return 'algılanan-itme'; if (/LISTESINE|TAHMIN|SANIYORSUN|KIM ALIR|SENI SECEN|ALACAGINI/.test(n)) return 'algılanan-seçim'; if (/ISTEMEZ|UYGUN GORMEZ|DISLAR|IT|UZAK|REDD|OLMASIN/.test(n)) return 'itme'; return 'seçim'; }
function inferFieldKey(header) { const n = normalizeTR(header); if (/AD.*SOYAD/.test(n)) return 'fullName'; if (/CINSIYET/.test(n)) return 'gender'; if (/YAS/.test(n)) return 'yas'; if (/EGITIM/.test(n)) return 'egitimDurumu'; return n.toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'') || uid('alan'); }
function questionLike(header) { const n = normalizeTR(header); if (/ZAMAN/.test(n)) return false; if (/BEKLENT/.test(n)) return false; if (/HANGI|KIM|LISTESINE|OTURMAK|KATILMAK/.test(n)) return true; if (header.includes('?')) return true; return false; }
function buildRelations(project, useRankWeight) {
  const questionMap = new Map(project.questions.map(q => [q.id, q.category]));
  const rels = [];
  for (const response of project.responses) {
    if (!response.respondentId || response.status === 'invalid' || response.status === 'excluded') continue;
    for (const answer of response.answers) {
      const type = questionMap.get(answer.questionId);
      if (!type) continue;
      if (['pulse-scale','pulse-yesno','pulse-text','scale-item'].includes(type)) continue;
      const isAlgi = type === 'algılanan-seçim' || type === 'algılanan-itme';
      const effectiveType = isAlgi ? (type === 'algılanan-seçim' ? 'seçim' : 'itme') : type;
      for (let i = 0; i < answer.selectedIds.length; i++) {
        const targetId = answer.selectedIds[i];
        if (!targetId || targetId === response.respondentId) continue;
        const weight = useRankWeight ? Math.max(1, answer.selectedIds.length - i) : 1;
        if (isAlgi) rels.push({ from: targetId, to: response.respondentId, questionId: answer.questionId, type: effectiveType, weight, isAlgi: true });
        else rels.push({ from: response.respondentId, to: targetId, questionId: answer.questionId, type: effectiveType, weight, isAlgi: false });
      }
    }
  }
  return rels;
}
function buildPersonMetrics(project, relations) {
  const active = project.participants.filter(p => p.active); const N = active.length;
  return active.map(p => {
    const pid = p.id;
    const rc = relations.filter(r => r.to === pid && r.type === 'seçim').length;
    const rr = relations.filter(r => r.to === pid && r.type === 'itme').length;
    const sc = relations.filter(r => r.from === pid && r.type === 'seçim').length;
    const sr = relations.filter(r => r.from === pid && r.type === 'itme').length;
    const mc = relations.filter(r => r.from === pid && r.type === 'seçim' && relations.some(r2 => r2.from === r.to && r2.to === pid && r2.type === 'seçim')).length;
    const mr = relations.filter(r => r.from === pid && r.type === 'itme' && relations.some(r2 => r2.from === r.to && r2.to === pid && r2.type === 'itme')).length;
    const sss = N > 1 ? (rc - rr) / (N - 1) : 0;
    const perceivedChoices = relations.filter(r => r.to === pid && r.type === 'seçim' && r.isAlgi).length;
    const actualChoices = rc;
    const perceptualAccuracy = actualChoices > 0 ? Math.min(perceivedChoices, actualChoices) / Math.max(perceivedChoices, actualChoices) : (perceivedChoices === 0 ? 1 : 0);
    const expansivity = N > 1 ? Math.round((sc / (N - 1)) * 100) / 100 : 0;
    let isolationType = null;
    if (rc===0 && sc===0 && rr===0 && sr===0) isolationType = 'tam';
    else if (rc===0 && sc>0) isolationType = 'tek-yonlu';
    return { participantId: pid, receivedChoices: rc, receivedRejections: rr, sentChoices: sc, sentRejections: sr, mutualChoices: mc, mutualRejections: mr, netScore: rc-rr, sss: Math.round(sss*100)/100, expansivity, isolationType, perceivedChoices, perceptualAccuracy: Math.round(perceptualAccuracy*100) };
  });
}
function buildGroupMetrics(project, personMetrics, relations) {
  const active = project.participants.filter(p => p.active);
  const respondentIds = new Set(project.responses.filter(r => r.respondentId && r.status !== 'invalid' && r.status !== 'excluded').map(r => r.respondentId));
  const mostChosen = [...personMetrics].sort((a,b) => b.receivedChoices-a.receivedChoices).slice(0,3).filter(x=>x.receivedChoices>0).map(x=>x.participantId);
  const mostRejected = [...personMetrics].sort((a,b) => b.receivedRejections-a.receivedRejections).slice(0,3).filter(x=>x.receivedRejections>0).map(x=>x.participantId);
  const seen = new Set(); const mutualChoicePairs = []; const mutualRejectionPairs = [];
  for (const r of relations) { const key = [r.from,r.to,r.type].sort().join('_'); if (seen.has(key)) continue; const m = relations.find(r2=>r2.from===r.to&&r2.to===r.from&&r2.type===r.type); if (m) { seen.add(key); if (r.type==='seçim') mutualChoicePairs.push([r.from,r.to]); else mutualRejectionPairs.push([r.from,r.to]); } }
  const nonRespondents = active.filter(p=>!respondentIds.has(p.id)).map(p=>p.id);
  const genderStats = {};
  for (const r of relations.filter(r=>r.type==='seçim')) { const fp=active.find(p=>p.id===r.from); const tp=active.find(p=>p.id===r.to); if(!fp||!tp) continue; const fg=(fp.values.gender||'').toLowerCase().includes('erkek')?'E':'K'; const tg=(tp.values.gender||'').toLowerCase().includes('erkek')?'E':'K'; const key=fg+'→'+tg; genderStats[key]=(genderStats[key]||0)+1; }
  const adjMap = new Map(active.map(p=>[p.id,new Set()]));
  for (const [a,b] of mutualChoicePairs) { adjMap.get(a)?.add(b); adjMap.get(b)?.add(a); }
  const visited = new Set(); const cliques = [];
  for (const p of active) { if (visited.has(p.id)) continue; const group=[]; const stack=[p.id]; while(stack.length){const curr=stack.pop();if(visited.has(curr))continue;visited.add(curr);group.push(curr);adjMap.get(curr)?.forEach(n=>{if(!visited.has(n))stack.push(n);});} if(group.length>1) cliques.push(group); }
  const fullyIsolated = personMetrics.filter(m=>m.isolationType==='tam').map(m=>m.participantId);
  const oneWayIsolated = personMetrics.filter(m=>m.isolationType==='tek-yonlu').map(m=>m.participantId);
  const stars = personMetrics.filter(m=>m.sss>=0.3&&m.receivedRejections<=1).map(m=>m.participantId);
  const isolated = personMetrics.filter(m=>m.receivedChoices===0&&m.sentChoices===0&&m.receivedRejections===0&&m.sentRejections===0).map(m=>m.participantId);
  const choiceRels = relations.filter(r=>r.type==='seçim').length;
  const N = active.length; const maxPossible = N>1?N*(N-1):1;
  const networkDensity = Math.round((choiceRels/maxPossible)*100);
  const mutualRate = choiceRels>0?Math.round((mutualChoicePairs.length*2/choiceRels)*100):0;
  const autoSummary = [];
  autoSummary.push('Grubun katılım oranı %'+Math.round((respondentIds.size/(active.length||1))*100)+'tir ('+respondentIds.size+'/'+active.length+' kişi).');
  if(stars.length) autoSummary.push(stars.length+' kişi yüksek tercih skoru ile öne çıkmaktadır.');
  if(fullyIsolated.length) autoSummary.push(fullyIsolated.length+' kişi sosyometrik ağın tamamen dışındadır (tam izole).');
  if(oneWayIsolated.length) autoSummary.push(oneWayIsolated.length+' kişi seçim yapıyor ancak hiç seçilmiyor (tek yönlü izole).');
  autoSummary.push('Seçim ağının yoğunluğu %'+networkDensity+'tür.');
  autoSummary.push('Karşılıklı seçim oranı %'+mutualRate+'tir ('+mutualChoicePairs.length+' çift).');
  if(cliques.length) autoSummary.push(cliques.length+' alt grup/küme tespit edilmiştir.');
  if(mutualRejectionPairs.length) autoSummary.push(mutualRejectionPairs.length+' karşılıklı itme ilişkisi bulunmaktadır.');
  return { totalParticipants:active.length, totalRespondents:respondentIds.size, participationRate:active.length?respondentIds.size/active.length:0, mostChosen, mostRejected, isolated, fullyIsolated, oneWayIsolated, stars, mutualChoicePairs, mutualRejectionPairs, nonRespondents, genderStats, cliques, networkDensity, mutualRate, autoSummary };
}
function buildPulseMetrics(project) {
  const PULSE_CATS = ['pulse-scale','pulse-yesno','pulse-text','scale-item'];
  const pulseQs = project.questions.filter(q => PULSE_CATS.includes(q.category));
  if (!pulseQs.length) return null;

  const active = project.participants.filter(p => p.active);
  const validResps = project.responses.filter(r =>
    r.respondentId && r.status !== 'excluded' && r.status !== 'invalid'
  );

  // Soru bazlı istatistikler
  const questionStats = {};
  const dimMap = {};

  for (const q of pulseQs) {
    const answers = validResps.map(r => {
      const ans = (r.answers || []).find(a => a.questionId === q.id);
      return ans?.numericValue ?? null;
    }).filter(v => v !== null);

    const avg = answers.length
      ? Math.round(answers.reduce((s,v) => s+v, 0) / answers.length * 10) / 10
      : null;
    const maxVal = q.pulseMax || 5;

    questionStats[q.id] = { avg, maxVal, count: answers.length, answers };

    if (avg !== null && q.category === 'pulse-scale') {
      const dim = q.pulseDimension || 'genel';
      if (!dimMap[dim]) dimMap[dim] = [];
      dimMap[dim].push(Math.round((avg / maxVal) * 100));
    }
  }

  // Boyut ortalamaları (pulse)
  const dimensionAverages = {};
  for (const [dim, vals] of Object.entries(dimMap)) {
    dimensionAverages[dim] = Math.round(vals.reduce((s,v) => s+v, 0) / vals.length);
  }

  // Kişi bazlı pulse skoru (0-100)
  const personPulseScores = {};
  for (const p of active) {
    const resp = validResps.find(r => r.respondentId === p.id);
    if (!resp) { personPulseScores[p.id] = null; continue; }
    const scores = [];
    for (const q of pulseQs.filter(q => q.category === 'pulse-scale')) {
      const ans = (resp.answers || []).find(a => a.questionId === q.id);
      if (ans?.numericValue !== undefined) {
        scores.push(Math.round((ans.numericValue / (q.pulseMax || 5)) * 100));
      }
    }
    personPulseScores[p.id] = scores.length
      ? Math.round(scores.reduce((s,v) => s+v, 0) / scores.length)
      : null;
  }

  // ── Ölçek puanları (BDI, CDI vb.) ────────────────────────────────────────
  // Her ölçek kendi scaleId'sine sahip; sorular scaleId ile gruplanır
  const scaleQs = project.questions.filter(q => q.category === 'scale-item');
  const scaleGroups = {};
  for (const q of scaleQs) {
    const sid = q.scaleId || 'genel';
    if (!scaleGroups[sid]) scaleGroups[sid] = [];
    scaleGroups[sid].push(q);
  }

  // Her kişi için ölçek toplam puanı ve kategorisi
  const personScaleScores = {};
  for (const p of active) {
    personScaleScores[p.id] = {};
    const resp = validResps.find(r => r.respondentId === p.id);
    for (const [sid, qs] of Object.entries(scaleGroups)) {
      if (!resp) { personScaleScores[p.id][sid] = null; continue; }
      let total = 0, answered = 0;
      for (const q of qs) {
        const ans = (resp.answers || []).find(a => a.questionId === q.id);
        if (ans?.numericValue !== undefined && ans.numericValue !== null) {
          total += ans.numericValue;
          answered++;
        }
      }
      if (answered === 0) { personScaleScores[p.id][sid] = null; continue; }
      // Kesim puanları ölçeğe göre
      const CUTOFFS = {
        'bdi': [{max:13,label:'Minimal',color:'#0e7c5b'},{max:19,label:'Hafif',color:'#b45309'},{max:28,label:'Orta',color:'#d97706'},{max:999,label:'Şiddetli',color:'#c0392b'}],
        'cdi': [{max:19,label:'Normal',color:'#0e7c5b'},{max:29,label:'Hafif',color:'#b45309'},{max:39,label:'Orta',color:'#d97706'},{max:999,label:'Şiddetli',color:'#c0392b'}],
      };
      const cuts = CUTOFFS[sid] || [{max:999,label:'—',color:'#888'}];
      const cat = cuts.find(c => total <= c.max) || cuts[cuts.length-1];
      personScaleScores[p.id][sid] = { total, answered, label: cat.label, color: cat.color, maxPossible: qs.length * (qs[0]?.scaleMax || 3) };
    }
  }

  return { questionStats, dimensionAverages, personPulseScores, personScaleScores, scaleGroups };
}

function runAnalysis(project) {
  const relations = buildRelations(project);
  const personMetrics = buildPersonMetrics(project, relations);
  const groupMetrics = buildGroupMetrics(project, personMetrics, relations);
  const pulseMetrics = buildPulseMetrics(project);
  project.analysis = { ...(project.analysis||{}), calculatedAt: nowISO(), relations, personMetrics, groupMetrics, pulseMetrics, unmatchedNames: project.analysis?.unmatchedNames||[] };
  project.updatedAt = nowISO(); updateProject(project); return project.analysis;
}

function participantCode(project, participantId) { const p = project.participants.find(x => x.id === participantId); if(!p) return participantId; return p.values.code || p.values.fullName || '—'; }

                <div style="font-size:11px;font-weight:700;color:${s.color};margin-top:4px;">Kesim puanları: ${esc(s.cutoffs)}</div>

        <div style="background:var(--warning-soft);border:1px solid var(--warning);border-radius:10px;padding:12px;margin-bottom:16px;">

          <div style="font-size:12px;color:var(--text);line-height:1.6;">Bu ölçekler yalnızca yetkili PDR/uzman tarafından yorumlanmalıdır. Sonuçlar katılımcılarla doğrudan paylaşılmamalıdır.</div>
        </div>
        <div class="row">
          <button class="btn" style="background:#059669;color:white;border-color:#059669;" id="save-scale-btn">Ölçeği Ekle</button>
          <button class="btn" id="cancel-scale-btn">İptal</button>
        </div>
      </div>`;

    // Radio label hover efekti
    slot.querySelectorAll('.scale-option-label').forEach(label => {
      const radio = label.querySelector('input[type=radio]');
      label.onclick = () => {
        slot.querySelectorAll('.scale-option-label').forEach(l => l.style.borderColor = 'var(--border)');
        label.style.borderColor = READY_SCALES[radio.value]?.color || 'var(--accent)';
      };
    });

    document.getElementById('cancel-scale-btn').onclick = () => slot.innerHTML = '';
    document.getElementById('save-scale-btn').onclick = () => {
      const chosen = slot.querySelector('input[name="scale-choice"]:checked');
      if (!chosen) return showMessage('error', 'Lütfen bir ölçek seçin.');
      const scale = READY_SCALES[chosen.value];
      if (!scale) return;

      // Aynı ölçek zaten ekli mi?
      const alreadyAdded = project.questions.some(q => q.scaleId === scale.id);
      if (alreadyAdded) {
        if (!confirm(`"\${scale.name}" zaten eklenmiş. Yeniden eklemek istiyor musunuz?`)) return;
        // Eskilerini sil
        const oldIds = project.questions.filter(q => q.scaleId === scale.id).map(q => q.id);
        project.questions = project.questions.filter(q => q.scaleId !== scale.id);
        project.responses.forEach(r => r.answers = r.answers.filter(a => !oldIds.includes(a.questionId)));
      }

      // Soruları ekle
      scale.items.forEach((item, idx) => {
        project.questions.push({
          id: uid('q'),
          title: `[\${scale.id.toUpperCase()} \${idx+1}] \${item.title}`,
          description: item.desc,
          category: 'scale-item',
          scaleId: scale.id,
          scaleName: scale.name,
          scaleMax: scale.maxPerItem,
          scaleItemIndex: idx,
          min: 0, max: scale.maxPerItem,
          required: true,
          order: project.questions.length + 1,
          createdAt: nowISO()
        });
      });

      project.updatedAt = nowISO();
      updateProject(project);
      render();
      showMessage('success', `"\${scale.name}" eklendi (\${scale.items.length} soru).`);
    };
  }

  // Buton bağlamaları
  document.getElementById('add-question-toggle').onclick = () => showSocioForm();
  document.getElementById('add-pulse-toggle').onclick    = () => showPulseForm();
  document.getElementById('add-scale-toggle')?.addEventListener('click', () => showScaleForm());

  document.querySelectorAll('[data-edit-question]').forEach(btn =>
    btn.onclick = () => showSocioForm(btn.dataset.editQuestion));

  document.querySelectorAll('[data-edit-pulse]').forEach(btn =>
    btn.onclick = () => showPulseForm(btn.dataset.editPulse));

  document.querySelectorAll('[data-delete-question]').forEach(btn =>
    btn.onclick = () => {
      if (!confirm('Soruyu silmek istediğine emin misin?')) return;
      project.questions = project.questions.filter(q => q.id !== btn.dataset.deleteQuestion);
      project.responses.forEach(r => r.answers = r.answers.filter(a => a.questionId !== btn.dataset.deleteQuestion));
      project.updatedAt=nowISO(); updateProject(project); render();
    });

  document.querySelectorAll('[data-delete-scale]').forEach(btn =>
    btn.onclick = () => {
      const sid = btn.dataset.deleteScale;
      const scaleName = project.questions.find(q=>q.scaleId===sid)?.scaleName || sid;
      if (!confirm(`"${scaleName}" ölçeğini kaldırmak istediğine emin misin? (${project.questions.filter(q=>q.scaleId===sid).length} soru silinecek)`)) return;
      const oldIds = project.questions.filter(q=>q.scaleId===sid).map(q=>q.id);
      project.questions = project.questions.filter(q => q.scaleId !== sid);
      project.responses.forEach(r => r.answers = r.answers.filter(a => !oldIds.includes(a.questionId)));
      project.updatedAt=nowISO(); updateProject(project); render();
      showMessage('success', `"${scaleName}" kaldırıldı.`);
    });
}

function matchParticipantByName(participants, rawName) {
  const norm = normalizeTR(rawName); if(!norm) return null;
  let exact = participants.find(p => normalizeTR(p.values.fullName) === norm); if(exact) return exact;
  let inc = participants.find(p => normalizeTR(p.values.fullName).includes(norm) || norm.includes(normalizeTR(p.values.fullName))); if(inc) return inc;
  const tt = norm.split(' ').filter(Boolean); let best=null,bestScore=0;
  for(const p of participants){const pn=normalizeTR(p.values.fullName);const tokens=pn.split(' ').filter(Boolean);let score=0;for(const t of tt)if(tokens.includes(t))score++;if(score>bestScore){bestScore=score;best=p;}}
  return bestScore>=Math.min(2,tt.length)?best:null;
}
function importWorkbookIntoProject(project, fileName, workbook) {
  const sheetName=workbook.SheetNames[0];const sheet=workbook.Sheets[sheetName];const rows=XLSX.utils.sheet_to_json(sheet,{defval:'',raw:false});
  if(!rows.length) throw new Error('Excel içinde veri bulunamadı.');
  const headers=Object.keys(rows[0]);

  // Ölçek sütunlarını ayır: [CDI 1], [BDI 3] gibi başlıklar
  const SCALE_PATTERN = /^\[(CDI|BDI)\s*(\d+)\]/i;
  const scaleHeaders = headers.filter(h => SCALE_PATTERN.test(h.trim()));
  const otherHeaders = headers.filter(h => !SCALE_PATTERN.test(h.trim()));

  const participantHeaders=otherHeaders.filter(h=>!questionLike(h)&&!/Zaman damgası/i.test(h)&&!/beklent/i.test(h));
  const questionHeaders=otherHeaders.filter(h=>questionLike(h));

  if(!participantHeaders.some(h=>/ad/i.test(h)&&/soyad/i.test(h))) throw new Error('Ad Soyad sütunu bulunamadı.');
  if(!questionHeaders.length && !scaleHeaders.length) throw new Error('Sosyometrik soru veya ölçek sütunu bulunamadı.');

  const headerToKey=new Map();const seenFieldKeys=new Set();
  for(const h of participantHeaders){let key=inferFieldKey(h);if(seenFieldKeys.has(key)){let suffix=2;while(seenFieldKeys.has(key+'_'+suffix))suffix++;key=key+'_'+suffix;}seenFieldKeys.add(key);headerToKey.set(h,key);}
  const fields=[];for(const h of participantHeaders){const key=headerToKey.get(h);if(key==='fullName')continue;fields.push({key,label:h,type:'text',required:false});}
  project.schema.requiredFields=[{key:'fullName',label:'Ad Soyad',type:'text',required:true},{key:'gender',label:'Cinsiyet',type:'select',required:false,options:['Kadın','Erkek']}];project.schema.customFields=fields;
  project.participants=rows.map((row,idx)=>{const values={fullName:'',gender:''};for(const h of participantHeaders){const key=headerToKey.get(h);values[key]=String(row[h]??'').trim();if(key==='fullName')values.fullName=String(row[h]??'').trim();}return{id:uid('p'),values,active:true,createdAt:nowISO(),_rowIndex:idx};}).filter(p=>p.values.fullName);

  // Sosyometrik sorular
  const socioQs = questionHeaders.map((h,idx)=>{const max=Math.max(1,...rows.map(r=>splitNames(r[h]).length),3);return{id:uid('q'),category:inferQuestionCategory(h),title:h,description:"Excel'den otomatik alındı",min:0,max,required:false,order:idx+1,createdAt:nowISO()};});

  // Ölçek soruları — [CDI 1] → CDI'nin 1. sorusu
  const SCALE_META = {
    cdi: { name:"Çocuklar İçin Depresyon Ölçeği (CDI)", maxPerItem:2, itemTitles:["Üzüntü","Gelecek","Başarı","Zevk","Kötülük","Ceza","Kendinden Nefret","Suçlama","Kendine Zarar","Ağlama","Huzursuzluk","İnsanlar","Karar","Görünüm","Okul","Uyku","Yorgunluk","İştah","Ağrı","Yalnızlık","Okul Eğlencesi","Arkadaş","Okul Başarısı","Uyum","Kurallara Uymak","Dikkat","Öz-Sevgi"] },
    bdi: { name:"Beck Depresyon Envanteri (BDI-II)", maxPerItem:3, itemTitles:["Üzüntü","Karamsarlık","Geçmişteki Başarısızlıklar","Zevk Kaybı","Suçluluk","Cezalandırılma","Kendinden Hoşnutsuzluk","Öz-Eleştiri","İntihar Düşünceleri","Ağlama","Ajitasyon","İlgi Kaybı","Kararsızlık","Değersizlik","Enerji Kaybı","Uyku Düzeni","Sinirlilik","İştah Değişikliği","Konsantrasyon","Yorgunluk","Cinsel İstek"] }
  };

  const scaleQsMap = {}; // scaleId → [questions]
  for(const h of scaleHeaders) {
    const m = h.trim().match(SCALE_PATTERN);
    if(!m) continue;
    const sid = m[1].toLowerCase();
    const itemIdx = parseInt(m[2]) - 1; // 0-based
    const meta = SCALE_META[sid];
    if(!meta) continue;
    if(!scaleQsMap[sid]) scaleQsMap[sid] = [];
    const itemTitle = meta.itemTitles[itemIdx] || ('Madde '+(itemIdx+1));
    scaleQsMap[sid].push({
      id: uid('q'),
      title: '['+sid.toUpperCase()+' '+(itemIdx+1)+'] '+itemTitle,
      description: '',
      category: 'scale-item',
      scaleId: sid,
      scaleName: meta.name,
      scaleMax: meta.maxPerItem,
      scaleItemIndex: itemIdx,
      _header: h, // Excel sütun başlığı — yanıt eşleştirmesi için
      min:0, max:meta.maxPerItem, required:false,
      order: socioQs.length + scaleQsMap[sid].length + 1,
      createdAt: nowISO()
    });
  }
  // Sıralı hale getir
  for(const sid of Object.keys(scaleQsMap)) {
    scaleQsMap[sid].sort((a,b) => a.scaleItemIndex - b.scaleItemIndex);
  }
  const allScaleQs = Object.values(scaleQsMap).flat();

  project.questions = [...socioQs, ...allScaleQs];

  const unmatchedNames=[];
  project.responses=rows.map((row)=>{
    const respondentNameHeader=participantHeaders.find(h=>/ad/i.test(h)&&/soyad/i.test(h));
    const respondentName=String(row[respondentNameHeader]??'').trim();
    const respondent=matchParticipantByName(project.participants,respondentName);

    // Sosyometrik yanıtlar
    const socioAnswers = socioQs.map((q,i)=>{
      const rawSelections=splitNames(row[questionHeaders[i]]);
      const selectedIds=[];
      for(const rawName of rawSelections){const target=matchParticipantByName(project.participants,rawName);if(target)selectedIds.push(target.id);else unmatchedNames.push({respondent:respondentName,question:q.title,rawName});}
      return{questionId:q.id,selectedIds:[...new Set(selectedIds)],numericValue:undefined,textValue:undefined};
    });

    // Ölçek yanıtları — sayısal değer olarak oku
    const scaleAnswers = allScaleQs.map(q => {
      const raw = row[q._header];
      const num = raw !== undefined && raw !== '' ? parseInt(String(raw).trim()) : undefined;
      const val = (!isNaN(num) && num >= 0 && num <= q.scaleMax) ? num : undefined;
      return { questionId: q.id, selectedIds: [], numericValue: val, textValue: undefined };
    });

    return{
      id:uid('r'),
      googleResponseId:null,
      submittedAt:(()=>{const v=row['Zaman damgası'];if(!v)return nowISO();const d=new Date(v);return isNaN(d.getTime())?nowISO():d.toISOString();})(),
      respondentId:respondent?respondent.id:null,
      answers:[...socioAnswers,...scaleAnswers],
      edited:false,editedAt:null,editedFields:[],
      status:respondent?'valid':'pending'
    };
  });

  project.analysis={calculatedAt:null,relations:[],personMetrics:[],groupMetrics:null,unmatchedNames,pulseMetrics:null};
  project.importInfo={fileName,sheetName,importedAt:nowISO(),rowCount:rows.length,participantHeaders,questionHeaders,scaleHeaders};
  project.updatedAt=nowISO();updateProject(project);
  return{rowCount:rows.length,questionCount:project.questions.length,participantCount:project.participants.length,unmatchedNames,scaleCount:allScaleQs.length};
}

function renderResponsesPage(project) {
  const responses = project.responses || [];
  const pending = responses.filter(r => !r.respondentId || r.status === 'pending');

  const pulseQs = project.questions.filter(q => PULSE_CATS.includes(q.category));
  const socioQs = project.questions.filter(q => !PULSE_CATS.includes(q.category));
  const hasPulse = pulseQs.length > 0;

  return `
    <div class="page-header">
      <div><h2 class="page-title">Yanıtlar</h2>
      <p class="page-subtitle">${responses.length} yanıt · ${pending.length} eşleşmemiş · ${socioQs.length} sosyo soru${hasPulse ? ` · ${pulseQs.length} pulse soru` : ''}</p></div>
    </div>
    ${renderMessages()}
    ${pending.length
      ? `<div class="notice" style="margin-bottom:16px;">⚠ ${pending.length} yanıt eşleşmemiş.</div>`
      : '<div class="success" style="margin-bottom:16px;">✓ Tüm yanıtlar eşleşmiş.</div>'}
    <div class="table-wrap"><table>
      <thead><tr>
        <th>#</th><th>Yanıtlayan</th><th>Tarih</th><th>Durum</th>
        <th>Sosyo Seçim</th>
        ${hasPulse ? `<th style="color:var(--pulse);">💜 Pulse</th>` : ''}
        <th>İşlem</th>
      </tr></thead>
      <tbody>
      ${responses.map((r,i) => {
        const p = project.participants.find(x => x.id === r.respondentId);
        const totalSocio = r.answers
          .filter(a => socioQs.some(q => q.id === a.questionId))
          .reduce((s,a) => s + (a.selectedIds||[]).length, 0);
        const pulseAnswered = pulseQs.filter(q => {
          const ans = (r.answers||[]).find(a => a.questionId === q.id);
          return ans && (ans.numericValue !== undefined && ans.numericValue !== null || ans.textValue);
        }).length;

        return `<tr>
          <td class="small muted">${i+1}</td>
          <td>${p ? esc(p.values.fullName||'') : '<span style="color:var(--danger)">Eşleşmedi</span>'}</td>
          <td class="small muted">${formatDate(r.submittedAt)}</td>
          <td><span class="badge ${r.status==='valid'?'badge-ok':r.status==='excluded'?'badge-danger':'badge-soft'}">${r.status==='valid'?'Geçerli':r.status==='excluded'?'Dışlandı':'Beklemede'}</span></td>
          <td class="small">${totalSocio} seçim</td>
          ${hasPulse ? `<td class="small">
            ${pulseAnswered > 0
              ? `<span style="color:var(--pulse);font-weight:700;">${pulseAnswered}/${pulseQs.length}</span>`
              : `<span style="color:var(--muted);">—</span>`}
          </td>` : ''}
          <td><div class="row">
            <select class="select" style="font-size:12px;padding:4px 8px;" data-assign-response="${r.id}">
              <option value="">-- Kişi Ata --</option>
              ${project.participants.filter(p=>p.active).map(p=>`<option value="${p.id}" ${r.respondentId===p.id?'selected':''}>${esc(p.values.fullName||p.id)}</option>`).join('')}
            </select>
            <button class="btn btn-soft" style="font-size:12px;padding:4px 8px;" data-toggle-exclude="${r.id}">${r.status==='excluded'?'Dahil Et':'Dışla'}</button>
            <button class="btn btn-danger" style="font-size:12px;padding:4px 8px;" data-delete-response="${r.id}">Sil</button>
          </div></td>
        </tr>`;
      }).join('')}
      </tbody>
    </table></div>`;
}
function bindResponsesPage(project) {
  document.querySelectorAll('[data-assign-response]').forEach(sel=>{sel.onchange=()=>{const r=project.responses.find(x=>x.id===sel.dataset.assignResponse);if(r){r.respondentId=sel.value||null;r.status=sel.value?'valid':'pending';}project.updatedAt=nowISO();updateProject(project);render();};});
  document.querySelectorAll('[data-toggle-exclude]').forEach(btn=>{btn.onclick=()=>{const r=project.responses.find(x=>x.id===btn.dataset.toggleExclude);if(r)r.status=r.status==='excluded'?'valid':'excluded';project.updatedAt=nowISO();updateProject(project);render();};});
  document.querySelectorAll('[data-delete-response]').forEach(btn=>{btn.onclick=()=>{if(!confirm('Bu yanıtı silmek istediğine emin misin?'))return;project.responses=project.responses.filter(x=>x.id!==btn.dataset.deleteResponse);project.updatedAt=nowISO();updateProject(project);render();};});
}

function renderSosyoTab(project, gm, metrics) {
  // Orijinal analiz içeriği — hiçbir şey değişmedi
  return `
    <div class="notice">Son hesaplama: ${esc(formatDate(project.analysis.calculatedAt))}</div>
    <div class="stats">
      <div class="card"><div class="muted" style="font-size:12px;">🎯 Katılım Oranı</div><div class="stat-value" style="color:var(--accent)">${gm?Math.round(gm.participationRate*100):0}%</div><div class="small muted">${gm?gm.totalRespondents+'/'+gm.totalParticipants+' kişi':''}</div></div>
      <div class="card"><div class="muted" style="font-size:12px;">🕸 Ağ Yoğunluğu</div><div class="stat-value">${gm?gm.networkDensity:0}%</div></div>
      <div class="card"><div class="muted" style="font-size:12px;">🔄 Karş. Seçim</div><div class="stat-value" style="color:var(--ok)">${gm?gm.mutualRate:0}%</div></div>
      <div class="card"><div class="muted" style="font-size:12px;">⭐ Yıldız</div><div class="stat-value" style="color:var(--ok)">${gm?(gm.stars?.length||0):0}</div></div>
      <div class="card"><div class="muted" style="font-size:12px;">🔴 Tam İzole</div><div class="stat-value" style="color:var(--warning)">${gm?(gm.fullyIsolated?.length||0):0}</div></div>
      <div class="card"><div class="muted" style="font-size:12px;">🟡 Tek Yönlü</div><div class="stat-value" style="color:var(--warning)">${gm?(gm.oneWayIsolated?.length||0):0}</div></div>
    </div>
    ${gm?.genderStats&&Object.keys(gm.genderStats).length?`<div class="grid-3" style="margin-bottom:20px;"><div class="card"><div class="section-title" style="margin-top:0;">Cinsiyet Bazlı Seçimler</div>${Object.entries(gm.genderStats).map(([k,v])=>`<div class="split" style="padding:5px 0;border-bottom:1px solid #edf2f7;"><span>${esc(k)}</span><span class="badge badge-soft">${v}</span></div>`).join('')}</div><div class="card"><div class="section-title" style="margin-top:0;">Alt Gruplar</div>${gm.cliques?.length?gm.cliques.map((g,i)=>`<div style="padding:5px 0;border-bottom:1px solid #edf2f7;"><span class="badge badge-soft">Grup ${i+1}</span><div class="small">${g.map(id=>esc(participantName(project,id))).join(' · ')}</div></div>`).join(''):'<div class="muted small">Yok</div>'}</div><div class="card"><div class="section-title" style="margin-top:0;">Katılmayanlar</div>${gm.nonRespondents?.length?gm.nonRespondents.map(id=>`<div style="padding:5px 0;border-bottom:1px solid #edf2f7;font-size:13px;">${esc(participantName(project,id))}</div>`).join(''):'<div class="small" style="color:var(--ok)">✓ Herkes katıldı</div>'}</div></div>`:''}
    <div class="grid-3" style="margin-bottom:20px;">
      <div class="card"><div class="section-title" style="margin-top:0;">En Çok Seçilen</div>${gm&&gm.mostChosen.length?gm.mostChosen.map(id=>`<div class="split" style="padding:6px 0;border-bottom:1px solid #edf2f7;"><span>${esc(participantName(project,id))}</span><span class="badge badge-ok">${metrics.find(x=>x.participantId===id)?.receivedChoices||0}</span></div>`).join(''):'<div class="muted">Veri yok</div>'}</div>
      <div class="card"><div class="section-title" style="margin-top:0;">En Çok İtilen</div>${gm&&gm.mostRejected.length?gm.mostRejected.map(id=>`<div class="split" style="padding:6px 0;border-bottom:1px solid #edf2f7;"><span>${esc(participantName(project,id))}</span><span class="badge badge-danger">${metrics.find(x=>x.participantId===id)?.receivedRejections||0}</span></div>`).join(''):'<div class="muted">Veri yok</div>'}</div>
      <div class="card"><div class="section-title" style="margin-top:0;">Karşılıklı Seçimler</div>${gm&&gm.mutualChoicePairs.length?gm.mutualChoicePairs.map(pair=>`<div style="padding:6px 0;border-bottom:1px solid #edf2f7;">${esc(participantName(project,pair[0]))} ↔ ${esc(participantName(project,pair[1]))}</div>`).join(''):'<div class="muted">Yok</div>'}</div>
    </div>
    ${gm?.autoSummary?.length?`<div class="card" style="margin-bottom:20px;background:var(--accent-soft);border-color:var(--accent);"><div class="section-title" style="margin-top:0;color:var(--accent);">OTOMATİK ÖZET</div>${gm.autoSummary.map(s=>'<div style="font-size:14px;padding:3px 0;border-bottom:1px solid var(--border);">• '+esc(s)+'</div>').join('')}</div>`:''}
    <div class="table-wrap"><table><thead><tr><th>Kişi</th><th>Seçildi</th><th>İtildi</th><th>Seçti</th><th>İtti</th><th>Karş.Seçim</th><th>Net</th><th>SSS</th><th title="Kişinin seçileceğini düşündüğü kişi sayısı / gerçekte seçildiği kişi sayısı. Yüksek = Sosyal konumunu doğru algılıyor.">Alg.Doğr.%</th><th>Durum</th></tr></thead><tbody>
    ${[...metrics].sort((a,b)=>b.receivedChoices-a.receivedChoices).map(m=>{
      const accColor=m.perceptualAccuracy>=70?'var(--ok)':m.perceptualAccuracy>=40?'var(--warning)':'var(--danger)';
      const hasPercData=(m.perceivedChoices||0)>0||(m.receivedChoices||0)>0;
      return `<tr><td><strong>${esc(participantName(project,m.participantId))}</strong></td><td style="color:var(--ok);font-weight:700;">${m.receivedChoices}</td><td style="color:var(--danger);font-weight:700;">${m.receivedRejections}</td><td>${m.sentChoices}</td><td>${m.sentRejections}</td><td>${m.mutualChoices}</td><td style="font-weight:700;color:${(m.netScore||0)>=0?'var(--ok)':'var(--danger)'}">${(m.netScore||0)>0?'+':''}${m.netScore||0}</td><td style="font-weight:700;color:${(m.sss||0)>=0?'var(--ok)':'var(--danger)'}">${(m.sss||0)>0?'+':''}${m.sss||0}</td><td style="font-weight:700;color:${accColor};">${hasPercData?m.perceptualAccuracy+'%':'—'}</td><td><span style="font-size:11px;background:${m.isolationType==='tam'?'var(--warning-soft)':m.isolationType==='tek-yonlu'?'var(--warning-soft)':(m.sss||0)>=0.3&&(m.receivedRejections||0)<=1?'var(--ok-soft)':'var(--surface2)'};color:${m.isolationType==='tam'?'var(--warning)':m.isolationType==='tek-yonlu'?'var(--warning)':(m.sss||0)>=0.3&&(m.receivedRejections||0)<=1?'var(--ok)':'var(--muted)'};padding:2px 7px;border-radius:99px;">${m.isolationType==='tam'?'Tam İzole':m.isolationType==='tek-yonlu'?'Tek Yönlü':(m.sss||0)>=0.3&&(m.receivedRejections||0)<=1?'⭐ Yıldız':''}</span></td></tr>`;
    }).join('')}
    </tbody></table></div>`;
}


function renderScaleTab(project, pm) {
  const scaleQs = project.questions.filter(q => q.category === 'scale-item');
  if (!scaleQs.length) {
    return `<div class="empty"><div class="empty-icon">📋</div><div class="empty-title">Klinik ölçek yok</div><div class="empty-desc">Ölçek sayfasından "📋 Hazır Ölçek" butonuyla BDI veya CDI ekleyebilirsin.</div></div>`;
  }

  const active = project.participants.filter(p => p.active);
  const validResps = project.responses.filter(r => r.respondentId && r.status !== 'excluded' && r.status !== 'invalid');
  const scaleGroups = {};
  scaleQs.forEach(q => { const sid = q.scaleId||'genel'; if(!scaleGroups[sid]) scaleGroups[sid]=[]; scaleGroups[sid].push(q); });

  const SCALE_COLORS = { bdi:'#7c3aed', cdi:'#0369a1' };
  const SCALE_CUTOFFS = {
    bdi: [{max:13,label:'Minimal',color:'#0e7c5b'},{max:19,label:'Hafif',color:'#b45309'},{max:28,label:'Orta',color:'#d97706'},{max:999,label:'Şiddetli',color:'#c0392b'}],
    cdi: [{max:19,label:'Normal',color:'#0e7c5b'},{max:29,label:'Hafif',color:'#b45309'},{max:39,label:'Orta',color:'#d97706'},{max:999,label:'Şiddetli',color:'#c0392b'}],
  };

  function getCategory(sid, total) {
    const cuts = SCALE_CUTOFFS[sid] || [{max:999,label:'—',color:'#888'}];
    return cuts.find(c => total <= c.max) || cuts[cuts.length-1];
  }

  // Kişi bazlı puanlar
  const personScores = {};
  for (const p of active) {
    personScores[p.id] = {};
    const resp = validResps.find(r => r.respondentId === p.id);
    for (const [sid, qs] of Object.entries(scaleGroups)) {
      if (!resp) { personScores[p.id][sid] = null; continue; }
      let total = 0, answered = 0;
      for (const q of qs) {
        const ans = (resp.answers||[]).find(a => a.questionId === q.id);
        if (ans?.numericValue !== undefined && ans.numericValue !== null) { total += ans.numericValue; answered++; }
      }
      personScores[p.id][sid] = answered > 0 ? { total, answered, maxPossible: qs.length * (qs[0]?.scaleMax||3) } : null;
    }
  }

  // Sosyometrik metrikler
  const metrics = project.analysis.personMetrics || [];

  let html = '';
  for (const [sid, qs] of Object.entries(scaleGroups)) {
    const scaleName = qs[0]?.scaleName || sid.toUpperCase();
    const scaleColor = SCALE_COLORS[sid] || '#059669';
    const maxScore = qs.length * (qs[0]?.scaleMax||3);

    // Grup istatistikleri
    const allScores = active.map(p => personScores[p.id][sid]).filter(s => s !== null);
    const avgTotal = allScores.length ? Math.round(allScores.reduce((s,v)=>s+v.total,0)/allScores.length*10)/10 : null;
    const catCounts = {};
    allScores.forEach(s => {
      const cat = getCategory(sid, s.total);
      catCounts[cat.label] = (catCounts[cat.label]||0) + 1;
    });

    html += `
    <div class="card" style="margin-bottom:24px;border-left:4px solid ${scaleColor};">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;flex-wrap:wrap;gap:10px;">
        <div>
          <div style="font-size:15px;font-weight:800;color:${scaleColor};">${esc(scaleName)}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:3px;">${qs.length} soru · Max ${maxScore} puan · ${allScores.length} yanıt</div>
        </div>
        ${avgTotal !== null ? `<div style="text-align:right;">
          <div style="font-size:28px;font-weight:900;color:${getCategory(sid,avgTotal).color};">${avgTotal}</div>
          <div style="font-size:11px;color:var(--muted);">Grup ort. · ${getCategory(sid,avgTotal).label}</div>
        </div>` : ''}
      </div>

      <!-- Dağılım -->
      ${Object.keys(catCounts).length ? `
      <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;">
        ${Object.entries(catCounts).map(([label, count]) => {
          const cat = (SCALE_CUTOFFS[sid]||[]).find(c=>c.label===label);
          return `<div style="background:${cat?.color||'#888'}22;border:1px solid ${cat?.color||'#888'}44;border-radius:8px;padding:8px 14px;text-align:center;">
            <div style="font-size:20px;font-weight:800;color:${cat?.color||'#888'};">${count}</div>
            <div style="font-size:11px;color:var(--muted);">${esc(label)}</div>
          </div>`;
        }).join('')}
      </div>` : ''}

      <!-- Kişi tablosu — sadece yetkili görür -->
      <div style="background:var(--warning-soft);border:1px solid var(--warning);border-radius:8px;padding:8px 12px;margin-bottom:12px;font-size:12px;color:var(--warning);font-weight:600;">
        🔒 Bu tablo yalnızca yetkili PDR/uzman içindir. Katılımcılarla paylaşmayın.
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Katılımcı</th>
            <th>Toplam Puan</th>
            <th>Kategori</th>
            <th>Sosyo SSS</th>
            <th>Sosyo Durum</th>
            <th>Risk Notu</th>
          </tr></thead>
          <tbody>
            ${[...active].sort((a,b) => {
              const sa = personScores[a.id][sid];
              const sb = personScores[b.id][sid];
              return (sb?.total??-1) - (sa?.total??-1);
            }).map(p => {
              const s = personScores[p.id][sid];
              const m = metrics.find(x => x.participantId === p.id);
              const sss = m?.sss ?? '—';
              const isoLabel = m?.isolationType === 'tam' ? '🔴 Tam İzole' : m?.isolationType === 'tek-yonlu' ? '🟡 Tek Yönlü' : (m?.sss||0)>=0.3&&(m?.receivedRejections||0)<=1 ? '⭐ Yıldız' : '—';
              if (!s) return `<tr>
                <td><strong>${esc(p.values.fullName||'—')}</strong></td>
                <td colspan="5" style="color:var(--muted);font-size:12px;">Yanıt yok</td>
              </tr>`;
              const cat = getCategory(sid, s.total);
              // Risk notu: yüksek skor + izole veya çok itilen → özel dikkat
              let riskNote = '';
              if (s.total >= (sid==='bdi'?29:40)) {
                riskNote = '⚠️ Acil değerlendirme';
              } else if (s.total >= (sid==='bdi'?20:30) && (m?.isolationType || (m?.receivedRejections||0)>=2)) {
                riskNote = '🔶 Öncelikli görüşme';
              } else if (s.total >= (sid==='bdi'?14:20)) {
                riskNote = '🔷 Takipte tut';
              }
              return `<tr style="${s.total>=(sid==='bdi'?29:40)?'background:var(--danger-soft);':''}">
                <td><strong>${esc(p.values.fullName||'—')}</strong></td>
                <td><strong style="font-size:16px;color:${cat.color};">${s.total}</strong><span style="font-size:11px;color:var(--muted);"> / ${s.maxPossible}</span></td>
                <td><span style="background:${cat.color}22;color:${cat.color};padding:3px 10px;border-radius:99px;font-size:12px;font-weight:700;">${esc(cat.label)}</span></td>
                <td style="font-weight:700;color:${sss>=0?'var(--ok)':'var(--danger)'};">${typeof sss==='number'?(sss>0?'+':'')+sss:'—'}</td>
                <td>${esc(isoLabel)}</td>
                <td style="font-size:12px;font-weight:600;">${riskNote}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
  }

  return html;
}

function renderPulseTab(project, pm) {
  const PULSE_DIM_LABELS = {
    'psikolojik-guvenlik': 'Psikolojik Güvenlik',
    'motivasyon': 'Motivasyon',
    'is-yuku': 'İş Yükü',
    'takim-uyumu': 'Takım Uyumu',
    'yonetici-iliskisi': 'Yönetici İlişkisi',
    'genel': 'Genel'
  };
  const metrics = project.analysis.personMetrics || [];
  const active = project.participants.filter(p => p.active);
  const pulseQs = project.questions.filter(q =>
    q.category === 'pulse-scale' || q.category === 'pulse-yesno' || q.category === 'pulse-text'
  );

  if (!pulseQs.length) {
    return `<div class="empty"><div class="empty-icon">💜</div><div class="empty-title">Pulse sorusu yok</div><div class="empty-desc">Henüz pulse sorusu eklenmemiş. Ölçek sayfasından pulse sorusu ekleyebilirsin.</div></div>`;
  }

  // Soru bazlı istatistikler
  const validResps = project.responses.filter(r => r.respondentId && r.status !== 'excluded' && r.status !== 'invalid');

  const qStats = pulseQs.map(q => {
    const answers = validResps.map(r => {
      const ans = (r.answers || []).find(a => a.questionId === q.id);
      return ans?.numericValue ?? null;
    }).filter(v => v !== null);
    const avg = answers.length ? answers.reduce((s, v) => s + v, 0) / answers.length : null;
    const maxVal = q.pulseMax || 5;
    return { q, answers, avg, maxVal, pct: avg !== null ? Math.round((avg / maxVal) * 100) : null };
  });

  // Boyut ortalamaları
  const dimMap = {};
  for (const { q, avg, maxVal } of qStats) {
    if (avg === null || q.category !== 'pulse-scale') continue;
    const dim = q.pulseDimension || 'genel';
    if (!dimMap[dim]) dimMap[dim] = [];
    dimMap[dim].push(Math.round((avg / maxVal) * 100));
  }
  const dimAvgs = Object.entries(dimMap).map(([dim, vals]) => ({
    dim,
    label: PULSE_DIM_LABELS[dim] || dim,
    avg: Math.round(vals.reduce((s, v) => s + v, 0) / vals.length)
  })).sort((a, b) => a.avg - b.avg);

  // Kişi bazlı pulse skorları
  const personScores = active.map(p => {
    const resp = validResps.find(r => r.respondentId === p.id);
    if (!resp) return { p, score: null };
    const scores = [];
    for (const q of pulseQs.filter(q => q.category === 'pulse-scale')) {
      const ans = (resp.answers || []).find(a => a.questionId === q.id);
      if (ans?.numericValue !== undefined) scores.push(Math.round((ans.numericValue / (q.pulseMax || 5)) * 100));
    }
    return { p, score: scores.length ? Math.round(scores.reduce((s, v) => s + v, 0) / scores.length) : null };
  });

  // Sosyo-Pulse 2x2 matrisi
  const quadData = metrics.map(m => {
    const ps = personScores.find(x => x.p.id === m.participantId);
    return { m, score: ps?.score ?? null };
  }).filter(d => d.score !== null);

  const q1 = quadData.filter(d => d.m.sss >= 0 && d.score >= 60);   // Yıldız + İyi
  const q2 = quadData.filter(d => d.m.sss >= 0 && d.score < 60);    // Yıldız + Düşük
  const q3 = quadData.filter(d => d.m.sss < 0 && d.score >= 60);    // İzole + İyi
  const q4 = quadData.filter(d => d.m.sss < 0 && d.score < 60);     // İzole + Düşük

  function quadCard(title, desc, color, bg, people) {
    return `<div style="background:${bg};border-radius:12px;padding:14px;border:1px solid ${color}44;">
      <div style="font-weight:800;font-size:13px;color:${color};margin-bottom:4px;">${title}</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:10px;">${desc}</div>
      ${people.length
        ? people.map(d => `<div style="font-size:12px;padding:3px 0;border-bottom:1px solid ${color}22;">${esc(participantName(project, d.m.participantId))} <span style="color:${color};font-size:11px;">SSS:${d.m.sss > 0 ? '+' : ''}${d.m.sss} · Pulse:${d.score}</span></div>`).join('')
        : `<div style="font-size:12px;color:var(--muted);">Bu kademede kimse yok</div>`}
    </div>`;
  }

  return `
    <!-- Pulse özet kutusu -->
    ${dimAvgs.length ? `
    <div class="card" style="margin-bottom:20px;border-left:4px solid var(--pulse);">
      <div style="font-size:13px;font-weight:800;color:var(--pulse);margin-bottom:14px;">💜 BOYUT BAZLI ORTALAMALAR</div>
      ${dimAvgs.map(({ label, avg }) => {
        const color = avg >= 75 ? 'var(--ok)' : avg >= 50 ? 'var(--warning)' : 'var(--danger)';
        return `<div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border);">
          <div style="width:170px;font-size:13px;font-weight:600;flex-shrink:0;">${esc(label)}</div>
          <div style="flex:1;height:8px;background:var(--surface2);border-radius:99px;">
            <div style="width:${avg}%;height:100%;border-radius:99px;background:${color};transition:width .4s;"></div>
          </div>
          <div style="width:40px;text-align:right;font-size:13px;font-weight:800;color:${color};">${avg}%</div>
        </div>`;
      }).join('')}
    </div>` : ''}

    <!-- Soru bazlı sonuçlar -->
    <div class="section-title">SORU BAZLI SONUÇLAR</div>
    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:24px;">
      ${qStats.map(({ q, answers, avg, maxVal, pct }) => {
        const color = pct === null ? 'var(--muted)' : pct >= 75 ? 'var(--ok)' : pct >= 50 ? 'var(--warning)' : 'var(--danger)';
        const dimLabel = PULSE_DIM_LABELS[q.pulseDimension] || '';
        return `<div class="card" style="padding:14px;">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:12px;flex-wrap:wrap;">
            <div>
              <strong style="font-size:14px;">${esc(q.title)}</strong>
              ${dimLabel ? `<span style="background:var(--pulse-soft);color:var(--pulse);padding:2px 8px;border-radius:99px;font-size:11px;font-weight:700;margin-left:8px;">${esc(dimLabel)}</span>` : ''}
            </div>
            ${avg !== null
              ? `<div style="font-size:22px;font-weight:800;color:${color};">${avg.toFixed(1)}<span style="font-size:13px;color:var(--muted);"> / ${maxVal}</span></div>`
              : '<div class="muted small">Veri yok</div>'}
          </div>
          ${pct !== null ? `
          <div style="height:6px;background:var(--surface2);border-radius:99px;margin-bottom:6px;">
            <div style="width:${pct}%;height:100%;border-radius:99px;background:${color};"></div>
          </div>
          <div style="display:flex;gap:16px;font-size:12px;color:var(--muted);">
            <span>Yanıt: ${answers.length}</span>
            <span>Min: ${Math.min(...answers)}</span>
            <span>Max: ${Math.max(...answers)}</span>
          </div>` : ''}
          ${q.category === 'pulse-yesno' && answers.length
            ? `<div style="margin-top:6px;font-size:13px;">✓ Evet: ${answers.filter(v => v === 1).length} &nbsp; ✗ Hayır: ${answers.filter(v => v === 0).length}</div>`
            : ''}
        </div>`;
      }).join('')}
    </div>

    <!-- Kişi bazlı skorlar -->
    <div class="section-title">KİŞİ BAZLI PULSE SKORLARI</div>
    <div class="table-wrap" style="margin-bottom:24px;">
      <table>
        <thead><tr><th>Kişi</th><th>Pulse Skoru (0-100)</th><th>Durum</th><th>Sosyo SSS</th></tr></thead>
        <tbody>
          ${personScores.sort((a, b) => (b.score ?? -1) - (a.score ?? -1)).map(({ p, score }) => {
            const color = score === null ? 'var(--muted)' : score >= 75 ? 'var(--ok)' : score >= 50 ? 'var(--warning)' : 'var(--danger)';
            const label = score === null ? '—' : score >= 75 ? 'İyi' : score >= 50 ? 'Orta' : 'Düşük';
            const m = metrics.find(x => x.participantId === p.id);
            const sss = m?.sss ?? '—';
            return `<tr>
              <td><strong>${esc(p.values.fullName || '—')}</strong></td>
              <td>
                ${score !== null
                  ? `<div style="display:flex;align-items:center;gap:10px;">
                      <div style="flex:1;height:6px;background:var(--surface2);border-radius:99px;">
                        <div style="width:${score}%;height:100%;border-radius:99px;background:${color};"></div>
                      </div>
                      <strong style="color:${color};width:32px;">${score}</strong>
                    </div>`
                  : '<span class="muted small">Yanıt yok</span>'}
              </td>
              <td><span style="background:${score===null?'var(--surface2)':score>=75?'var(--ok-soft)':score>=50?'var(--warning-soft)':'var(--danger-soft)'};color:${score===null?'var(--muted)':score>=75?'var(--ok)':score>=50?'var(--warning)':'var(--danger)'};padding:3px 10px;border-radius:99px;font-size:12px;font-weight:700;">${label}</span></td>
              <td style="font-weight:700;color:${sss>=0?'var(--ok)':'var(--danger)'};">${typeof sss==='number'?(sss>0?'+':'')+sss:'—'}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>

    <!-- Sosyo × Pulse 2x2 matrisi -->
    ${quadData.length ? `
    <div class="section-title">SOSYOMETRİ × PULSE MATRİSİ</div>
    <div class="notice" style="margin-bottom:12px;">Sosyometrik statü (SSS) ve pulse skoru birlikte değerlendiriliyor. Bu matris müdahale önceliğini belirler.</div>

      ${quadCard('⭐ Pozitif Statü + İyi Pulse', 'Güçlü merkezi kişiler. Mentor rolü için değerlendir.', '#0e7c5b', 'var(--ok-soft)', q1)}
      ${quadCard('⚡ Pozitif Statü + Düşük Pulse', 'Merkezi ama yorgun! Overload riski. Rol dağılımını gözden geçir.', '#b45309', 'var(--warning-soft)', q2)}
      ${quadCard('🔗 Negatif Statü + İyi Pulse', 'Motivasyonu var ama sosyal bağ kuramıyor. Köprü ilişkisi kur.', '#1a56a0', 'var(--accent-soft)', q3)}
      ${quadCard('🔴 Negatif Statü + Düşük Pulse', 'En yüksek risk grubu. Öncelikli müdahale gerekli.', '#c0392b', 'var(--danger-soft)', q4)}
    </div>` : ''}
  `;
}

function bindAnalysisPage(project) {

    const relations = buildRelations(project, useRankWeight);
    const personMetrics = buildPersonMetrics(project, relations);
    const groupMetrics = buildGroupMetrics(project, personMetrics, relations);

function importProjectFromFile(){const input=document.createElement('input');input.type='file';input.accept='.json';input.onchange=async()=>{try{const text=await input.files[0].text();const p=JSON.parse(text);if(!p.id||!p.name)throw new Error('Geçersiz proje dosyası.');p.id=uid('proj');updateProject(p);showMessage('success',`"${p.name}" projesi içe aktarıldı.`);render();}catch(e){showMessage('error','Dosya okunamadı: '+e.message);}};input.click();}

function exportExcelReport(project) {
  const wb = XLSX.utils.book_new();
  const PULSE_CATS = ['pulse-scale','pulse-yesno','pulse-text','scale-item'];
  const pm = project.analysis.pulseMetrics;

  // Katılımcılar
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(project.participants.filter(p=>p.active).map(p=>p.values)), 'Kisiler');
  // Sorular
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(project.questions.map(q=>({baslik:q.title,kategori:q.category,min:q.min,max:q.max}))), 'Sorular');
  // İlişkiler
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(project.analysis.relations.map(r=>({from:participantName(project,r.from),to:participantName(project,r.to),soru:project.questions.find(q=>q.id===r.questionId)?.title||r.questionId,tip:r.type}))), 'Iliskiler');
  // Sosyo metrikler
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(project.analysis.personMetrics.map(m=>({kisi:participantName(project,m.participantId),aldigi_secim:m.receivedChoices,aldigi_itme:m.receivedRejections,net:m.netScore||0,sss:m.sss||0,izolasyon:m.isolationType||'—'}))), 'Sosyo_Metrikler');

  // Pulse metrikler (varsa)
  if (pm) {
    // Kişi bazlı pulse skorları
    const pulseRows = project.participants.filter(p=>p.active).map(p => {
      const score = pm.personPulseScores[p.id];
      const pss = pm.personScaleScores?.[p.id] ?? null;
      const risk = calcRiskScore(project.analysis.personMetrics.find(m=>m.participantId===p.id), score, pss);
      return { kisi: p.values.fullName||'—', pulse_skoru: score??'—', risk_skoru: risk };
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(pulseRows), 'Pulse_Kisiler');

    // Boyut ortalamaları
    const PULSE_DIM_LABELS = {'psikolojik-guvenlik':'Psikolojik Güvenlik','motivasyon':'Motivasyon','is-yuku':'İş Yükü','takim-uyumu':'Takım Uyumu','yonetici-iliskisi':'Yönetici İlişkisi','genel':'Genel'};
    const dimRows = Object.entries(pm.dimensionAverages).map(([dim,avg]) => ({boyut:PULSE_DIM_LABELS[dim]||dim,ortalama_pct:avg}));
    if (dimRows.length) XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(dimRows), 'Pulse_Boyutlar');
  }

  XLSX.writeFile(wb, `${project.name}_rapor.xlsx`);
}

function buildReportHtml(project,secs,sociogramPng,opts){secs=secs||{};opts=opts||{};const useCodes=opts.useCodes||false;const author=opts.author||'';const analysis=project.analysis;const gm=analysis.groupMetrics||{};const metrics=analysis.personMetrics||[];const active=project.participants.filter(p=>p.active);function pName(id){const p=project.participants.find(x=>x.id===id);if(!p)return id;if(useCodes&&p.values.code)return p.values.code;return p.values.fullName||'—';}
const css=`body{font-family:Arial,sans-serif;padding:30px;color:#111;font-size:13px;}h1{font-size:22px;margin:0 0 4px;}h2{font-size:17px;margin:28px 0 10px;border-bottom:2px solid #2563eb;padding-bottom:6px;color:#1e3a8a;}table{width:100%;border-collapse:collapse;margin-top:10px;margin-bottom:16px;}th,td{border:1px solid #d1d5db;padding:7px 10px;font-size:12px;}th{background:#eff6ff;color:#1e3a8a;font-weight:700;}tr:nth-child(even){background:#f9fafb;}.ok{background:#dcfce7;color:#166534;}.danger{background:#fee2e2;color:#991b1b;}.badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:700;}`;

if(secs.grupOzeti){html+=`<h2>Grup Özeti</h2><table><tbody><tr><th>Katılım</th><td>${Math.round((gm.participationRate||0)*100)}%</td><th>Ağ Yoğunluğu</th><td>${gm.networkDensity||0}%</td></tr><tr><th>Yıldız</th><td>${(gm.stars||[]).length}</td><th>İzole</th><td>${(gm.fullyIsolated||[]).length}</td></tr></tbody></table>`;if(gm.autoSummary)gm.autoSummary.forEach(s=>{html+=`<p>• ${esc(s)}</p>`;});}
if(secs.katilimciListesi){html+=`<h2>Katılımcı Listesi</h2><table><thead><tr><th>Ad Soyad</th><th>Cinsiyet</th><th>Kod</th></tr></thead><tbody>`;active.forEach(p=>{html+=`<tr><td>${esc(pName(p.id))}</td><td>${esc(p.values.gender||'—')}</td><td>${esc(p.values.code||'—')}</td></tr>`;});html+=`</tbody></table>`;}
if(secs.soruListesi){html+=`<h2>Soru Listesi</h2><table><thead><tr><th>Soru</th><th>Kategori</th><th>Min</th><th>Max</th></tr></thead><tbody>`;project.questions.forEach(q=>{html+=`<tr><td>${esc(q.title)}</td><td>${esc(q.category)}</td><td>${q.min}</td><td>${q.max}</td></tr>`;});html+=`</tbody></table>`;}
if(secs.kisiMetrikleri){html+=`<h2>Kişi Bazlı Metrikler</h2><table><thead><tr><th>Kişi</th><th>Seçildi</th><th>İtildi</th><th>Net</th><th>SSS</th><th>Durum</th></tr></thead><tbody>`;[...metrics].sort((a,b)=>b.receivedChoices-a.receivedChoices).forEach(m=>{const status=m.isolationType==='tam'?'Tam İzole':m.isolationType==='tek-yonlu'?'Tek Yönlü':(m.sss||0)>=0.3&&(m.receivedRejections||0)<=1?'⭐ Yıldız':'—';html+=`<tr><td><strong>${esc(pName(m.participantId))}</strong></td><td>${m.receivedChoices}</td><td>${m.receivedRejections}</td><td style="font-weight:700;color:${(m.netScore||0)>=0?'#166534':'#991b1b'}">${(m.netScore||0)>0?'+':''}${m.netScore||0}</td><td>${m.sss||0}</td><td>${esc(status)}</td></tr>`;});html+=`</tbody></table>`;}
if(secs.sosyometrikMatris){
  html+=`<h2>Sosyometrik Matris</h2>`;
  html+=`<p style="font-size:11px;color:#6b7280;margin-bottom:8px;">✓ = Seçim &nbsp; ✗ = İtme &nbsp; ◎ = Algılanan Seçim &nbsp; ⊗ = Algılanan İtme</p>`;

}
if(secs.yildizKisiler&&gm.stars&&gm.stars.length){html+=`<h2>Yıldız Kişiler</h2><table><thead><tr><th>Kişi</th><th>Seçildi</th><th>SSS</th></tr></thead><tbody>`;gm.stars.forEach(id=>{const m=metrics.find(x=>x.participantId===id);html+=`<tr><td><strong>${esc(pName(id))}</strong></td><td>${m?.receivedChoices||0}</td><td>${m?.sss||0}</td></tr>`;});html+=`</tbody></table>`;}
if(secs.altGruplar&&gm.cliques&&gm.cliques.length){html+=`<h2>Alt Gruplar / Kümeler</h2>`;gm.cliques.forEach((g,i)=>{html+=`<p><strong>Grup ${i+1}:</strong> ${g.map(id=>esc(pName(id))).join(' · ')}</p>`;});}
if(secs.izoleKisiler){const allIso=[...(gm.fullyIsolated||[]),...(gm.oneWayIsolated||[])];if(allIso.length){html+=`<h2>İzole Kişiler</h2><table><thead><tr><th>Kişi</th><th>İzolasyon Türü</th><th>SSS</th></tr></thead><tbody>`;allIso.forEach(id=>{const m=metrics.find(x=>x.participantId===id);html+=`<tr><td><strong>${esc(pName(id))}</strong></td><td>${m?.isolationType==='tam'?'Tam İzole':'Tek Yönlü'}</td><td>${m?.sss||0}</td></tr>`;});html+=`</tbody></table>`;}}
if(secs.karsilikliSecimler&&gm.mutualChoicePairs&&gm.mutualChoicePairs.length){html+=`<h2>Karşılıklı Seçimler</h2><table><thead><tr><th>#</th><th>Kişi 1</th><th>Kişi 2</th></tr></thead><tbody>`;gm.mutualChoicePairs.forEach(([a,b],i)=>{html+=`<tr><td>${i+1}</td><td>${esc(pName(a))}</td><td>${esc(pName(b))}</td></tr>`;});html+=`</tbody></table>`;}
if(sociogramPng)html+=`<h2>Sosyogram</h2><img src="${sociogramPng}" style="max-width:100%;border:1px solid #e5e7eb;border-radius:8px;"/>`;

// ── Pulse bölümleri ──
const pm = analysis.pulseMetrics;
const PDL = {'psikolojik-guvenlik':'Psikolojik Güvenlik','motivasyon':'Motivasyon','is-yuku':'İş Yükü','takim-uyumu':'Takım Uyumu','yonetici-iliskisi':'Yönetici İlişkisi','genel':'Genel'};

if(secs.pulseBoyutlar && pm && Object.keys(pm.dimensionAverages||{}).length){
  html+=`<h2 style="border-color:#7c3aed;color:#5b21b6;">💜 Pulse — Boyut Ortalamaları</h2>
  <table><thead><tr><th>Boyut</th><th>Ortalama (%)</th><th>Değerlendirme</th></tr></thead><tbody>`;
  Object.entries(pm.dimensionAverages).sort((a,b)=>a[1]-b[1]).forEach(([dim,avg])=>{
    const label=avg>=75?'İyi':avg>=50?'Orta':'Düşük';
    const cls=avg>=75?'ok':avg>=50?'':'danger';
    html+=`<tr><td>${esc(PDL[dim]||dim)}</td><td><strong>${avg}%</strong></td><td><span class="badge ${cls}">${label}</span></td></tr>`;
  });
  html+=`</tbody></table>`;
}

if(secs.pulseKisiler && pm){
  html+=`<h2 style="border-color:#7c3aed;color:#5b21b6;">💜 Pulse — Kişi Bazlı Skorlar</h2>
  <table><thead><tr><th>Kişi</th><th>Pulse Skoru</th><th>SSS</th><th>Durum</th></tr></thead><tbody>`;
  active.forEach(p=>{
    const score = pm.personPulseScores[p.id];
    const m = metrics.find(x=>x.participantId===p.id);
    const label = score===null?'Yanıt yok':score>=75?'İyi':score>=50?'Orta':'Düşük';
    const cls = score===null?'':score>=75?'ok':score>=50?'':'danger';
    html+=`<tr><td><strong>${esc(pName(p.id))}</strong></td><td>${score??'—'}</td><td style="color:${(m?.sss||0)>=0?'#166534':'#991b1b'}">${(m?.sss||0)>0?'+':''}${m?.sss||0}</td><td><span class="badge ${cls}">${label}</span></td></tr>`;
  });
  html+=`</tbody></table>`;
}

if(secs.pulseMudahale && pm){
  html+=`<h2 style="border-color:#7c3aed;color:#5b21b6;">💜 Pulse — Müdahale Risk Tablosu</h2>
  <table><thead><tr><th>Kişi</th><th>Risk</th><th>Öncelik</th><th>Önerilen Müdahale</th><th>Klinik Ölçek</th></tr></thead><tbody>`;
  [...metrics].sort((a,b)=>{
    const ra=calcRiskScore(a, pm.personPulseScores[a.participantId], pm.personScaleScores?.[a.participantId]);
    const rb=calcRiskScore(b, pm.personPulseScores[b.participantId], pm.personScaleScores?.[b.participantId]);
    return rb-ra;
  }).forEach(m=>{
    const ps = pm.personPulseScores[m.participantId];
    const pss2 = pm.personScaleScores?.[m.participantId] ?? null;
    const risk = calcRiskScore(m, ps, pss2);
    const iv = getRuleBasedIntervention(m, ps, pss2);
    const cls = risk>=70?'danger':risk>=40?'':'ok';
    const scaleLabel2 = pss2 ? Object.entries(pss2).filter(([,s])=>s).map(([sid,s])=>sid.toUpperCase()+': '+s.total+' ('+s.label+')').join(', ') : '—';
    html+=`<tr><td><strong>${esc(pName(m.participantId))}</strong></td><td><span class="badge ${cls}">${risk}/100</span></td><td>${esc(iv.oncelik)}</td><td style="font-size:11px;">${esc(iv.eylem)}</td><td style="font-size:11px;">${esc(scaleLabel2)}</td></tr>`;
  });
  html+=`</tbody></table>`;
}

html+=`<div style="margin-top:40px;border-top:1px solid #e5e7eb;padding-top:16px;font-size:12px;color:#6b7280;">${author?`<strong>Hazırlayan:</strong> ${esc(author)} &nbsp;|&nbsp; `:''}<strong>Tarih:</strong> ${new Date().toLocaleDateString('tr-TR')} &nbsp;|&nbsp; Sosyal Pusula</div></body></html>`;
return html;}
