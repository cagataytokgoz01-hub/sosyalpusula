<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sosyometri Analiz Aracı</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <meta name="theme-color" content="#2563eb" />
  <script src="./vendor/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg: #f5f7fb;
      --surface: #ffffff;
      --surface2: #f8fafc;
      --border: #d9e2ef;
      --text: #18212f;
      --muted: #64748b;
      --accent: #2563eb;
      --accent-soft: #dbeafe;
      --danger: #dc2626;
      --danger-soft: #fee2e2;
      --ok: #16a34a;
      --ok-soft: #dcfce7;
      --warning: #b45309;
      --warning-soft: #ffedd5;
      --radius: 18px;
      --radius-sm: 10px;
      --shadow: 0 12px 32px rgba(15, 23, 42, .08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
      color: var(--text);
    }
    .app {
      max-width: 1320px;
      margin: 0 auto;
      padding: 24px;
    }
    .shell {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 20px;
      min-height: calc(100vh - 48px);
    }
    .sidebar, .panel, .card, .table-wrap, .empty {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .sidebar {
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      position: sticky;
      top: 24px;
      height: fit-content;
    }
    .brand {
      padding: 10px 12px 14px;
      border-bottom: 1px solid var(--border);
    }
    .brand h1 {
      margin: 0 0 6px;
      font-size: 20px;
    }
    .brand p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }
    .project-head {
      padding: 12px;
      border-radius: 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
    }
    .project-head strong { display: block; margin-bottom: 4px; }
    .project-head span { color: var(--muted); font-size: 12px; }
    .nav { display: flex; flex-direction: column; gap: 8px; }
    .nav button {
      width: 100%; text-align: left;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text);
      padding: 12px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }
    .nav button.active { background: var(--accent-soft); color: var(--accent); border-color: #bfdbfe; }
    .nav button:hover { background: var(--surface2); }
    .content { min-width: 0; }
    .panel { padding: 22px; }
    .page-header { display: flex; justify-content: space-between; gap: 18px; align-items: flex-start; margin-bottom: 20px; }
    .page-title { margin: 0 0 6px; font-size: 28px; }
    .page-subtitle { margin: 0; color: var(--muted); font-size: 14px; line-height: 1.6; }
    .btn {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      display: inline-flex;
      gap: 8px;
      align-items: center;
      justify-content: center;
      text-decoration: none;
    }
    .btn:hover { filter: brightness(.99); }
    .btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
    .btn-danger { background: var(--danger); color: white; border-color: var(--danger); }
    .btn-soft { background: var(--surface2); }
    .btn:disabled { opacity: .55; cursor: not-allowed; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; }
    .field { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
    .field label { font-size: 13px; color: var(--muted); font-weight: 600; }
    .input, .select, .textarea {
      width: 100%;
      border: 1px solid var(--border);
      background: white;
      border-radius: 12px;
      padding: 11px 12px;
      font: inherit;
      color: var(--text);
    }
    .textarea { min-height: 120px; resize: vertical; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; }
    .card { padding: 18px; }
    .stats { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; margin-bottom: 24px; }
    .stat-value { font-size: 30px; font-weight: 800; margin-top: 6px; }
    .table-wrap { overflow: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 760px; }
    th, td { text-align: left; padding: 12px 14px; border-bottom: 1px solid #e8eef7; vertical-align: top; font-size: 14px; }
    th { font-size: 12px; letter-spacing: .04em; color: var(--muted); text-transform: uppercase; background: #fbfdff; position: sticky; top: 0; }
    .badge-ok { background:var(--ok-soft);color:var(--ok); }
.badge-warn { background:var(--warning-soft);color:var(--warning); }
.badge {
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: 999px; padding: 4px 10px; font-size: 12px; font-weight: 700;
      border: 1px solid transparent;
    }
    .badge-ok { background: var(--ok-soft); color: var(--ok); }
    .badge-danger { background: var(--danger-soft); color: var(--danger); }
    .badge-soft { background: var(--surface2); color: var(--muted); border-color: var(--border); }
    .empty { padding: 36px 24px; text-align: center; color: var(--muted); }
    .notice, .error, .success {
      padding: 12px 14px; border-radius: 12px; margin-bottom: 14px; font-size: 14px;
      border: 1px solid transparent;
    }
    .notice { background: var(--surface2); border-color: var(--border); color: var(--muted); }
    .error { background: var(--danger-soft); border-color: #fecaca; color: var(--danger); }
    .success { background: var(--ok-soft); border-color: #bbf7d0; color: var(--ok); }
    .warning { background: var(--warning-soft); border-color: #fed7aa; color: var(--warning); }
    .section-title { font-size: 13px; font-weight: 800; color: var(--muted); letter-spacing: .06em; margin: 18px 0 10px; }
    .question-card { border: 1px solid var(--border); border-radius: 16px; padding: 16px; background: white; }
    .question-card h4 { margin: 0 0 8px; font-size: 16px; }
    .question-card p { margin: 0 0 12px; color: var(--muted); line-height: 1.6; font-size: 14px; }
    .sociogram-wrap {
      background: white; border: 1px solid var(--border); border-radius: 18px; overflow: hidden;
    }
    svg { display: block; width: 100%; height: auto; background: radial-gradient(circle at center, #f8fbff 0%, #eef4fb 100%); }
    .legend { display: flex; flex-wrap: wrap; gap: 12px; font-size: 13px; color: var(--muted); margin: 12px 0 0; }
    .legend span { display: inline-flex; align-items: center; gap: 6px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .projects-list { display: flex; flex-direction: column; gap: 12px; }
    .project-item { border: 1px solid var(--border); border-radius: 16px; padding: 16px; background: white; }
    .project-item h3 { margin: 0 0 8px; }
    .project-item p { margin: 0; color: var(--muted); font-size: 13px; }
    .split { display: flex; justify-content: space-between; gap: 12px; align-items: center; flex-wrap: wrap; }
    .muted { color: var(--muted); }
    .small { font-size: 12px; }
    .match-list { margin: 0; padding-left: 18px; }
    @media (max-width: 980px) {
      .shell { grid-template-columns: 1fr; }
      .sidebar { position: static; }
      .grid-2, .grid-3, .stats { grid-template-columns: 1fr; }
    }
  
.detail-panel{position:fixed;right:0;top:0;height:100vh;width:320px;background:var(--surface);border-left:1px solid var(--border);box-shadow:0 4px 18px rgba(0,0,0,.12);padding:24px;overflow-y:auto;z-index:100;transform:translateX(100%);transition:transform .25s}
.detail-panel.open{transform:translateX(0)}
.detail-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;line-height:1}
.detail-name{font-size:22px;font-weight:700;margin-bottom:4px;padding-right:24px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:14px 0}
.detail-metric{background:var(--surface2);border-radius:10px;padding:10px 12px}
.detail-metric-label{font-size:11px;color:var(--muted)}
.detail-metric-val{font-size:22px;font-weight:700}
.divider{height:1px;background:var(--border);margin:16px 0}


    .install-fab {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 110;
      box-shadow: 0 14px 32px rgba(37,99,235,.28);
    }
    .install-fab.hidden { display: none; }

</style>

<body>
  <div class="app">
    <div class="shell">
      <aside class="sidebar" id="sidebar"></aside>
      <main class="content">
        <div class="panel" id="view"></div>
      </main>
    </div>
  </div>


  <button class="btn btn-primary install-fab hidden" id="install-app-btn">Uygulamayı Yükle</button>

<script>
const STORAGE_KEY = 'sosyometri_local_projects_v2';
const ui = { currentProjectId: null, currentPage: 'projects', messages: [] };

function nowISO() { return new Date().toISOString(); }
function uid(prefix='id') { return prefix + '_' + Math.random().toString(36).slice(2, 10); }
function esc(str) {
  return String(str ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function formatDate(v) {
  if (!v) return '—';
  const d = new Date(v);
  if (Number.isNaN(d.getTime())) return String(v);
  return d.toLocaleString('tr-TR');
}
function loadProjects() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
  catch { return []; }
}
function saveProjects(projects) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(projects));
}
function getProjects() { return loadProjects(); }
function getProject() {
  return getProjects().find(p => p.id === ui.currentProjectId) || null;
}
function updateProject(project) {
  const projects = getProjects();
  const idx = projects.findIndex(p => p.id === project.id);
  if (idx >= 0) projects[idx] = project;
  else projects.push(project);
  saveProjects(projects);
}
function deleteProject(id) {
  saveProjects(getProjects().filter(p => p.id !== id));
  if (ui.currentProjectId === id) {
    ui.currentProjectId = null;
    ui.currentPage = 'projects';
  }
}
function projectTemplate(name='Yeni Proje') {
  return {
    id: uid('proj'),
    name,
    createdAt: nowISO(),
    updatedAt: nowISO(),
    institution: { name:'', type:'', unit:'', city:'', notes:'' },
    schema: {
      requiredFields: [
        { key:'fullName', label:'Ad Soyad', type:'text', required:true },
        { key:'gender', label:'Cinsiyet', type:'select', required:false, options:['Kadın','Erkek'] }
      ],
      customFields: []
    },
    participants: [],
    questions: [],
    responses: [],
    analysis: { calculatedAt:null, relations:[], personMetrics:[], groupMetrics:null, unmatchedNames:[] },
    importInfo: null
  };
}
function normalizeTR(s) {
  return String(s ?? '')
    .normalize('NFKD')
    .replace(/[\u0300-\u036f]/g, '')
    .replace(/İ/g, 'I').replace(/ı/g, 'i')
    .replace(/Ö/g, 'O').replace(/ö/g, 'o')
    .replace(/Ü/g, 'U').replace(/ü/g, 'u')
    .replace(/Ş/g, 'S').replace(/ş/g, 's')
    .replace(/Ğ/g, 'G').replace(/ğ/g, 'g')
    .replace(/Ç/g, 'C').replace(/ç/g, 'c')
    .toUpperCase()
    .replace(/[^A-Z0-9 ]+/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}
function splitNames(value) {
  if (!value) return [];
  return String(value)
    .replace(/\r/g, '\n')
    .replace(/\u2022/g, '\n')
    .replace(/\s+-\s+/g, '\n')
    .replace(/\d+\)/g, '\n')
    .replace(/\d+\./g, '\n')
    .split(/[\n,;\/]+/)
    .map(s => s.trim())
    .filter(Boolean);
}
function inferQuestionCategory(title) {
  const n = normalizeTR(title);
  if (/ISTEMEZ|UYGUN GORMEZ|DISLAR|UZAK|REDD|OLMASIN/.test(n) && /SENI|SIZI|LISTESINE|TAHMIN|SANIYORSUN/.test(n)) return 'algılanan-itme';
  if (/LISTESINE|TAHMIN|SANIYORSUN|KIM ALIR|SENI SECEN|ALACAGINI/.test(n)) return 'algılanan-seçim';
  if (/ISTEMEZ|UYGUN GORMEZ|DISLAR|IT|UZAK|REDD|OLMASIN/.test(n)) return 'itme';
  return 'seçim';
}
function inferFieldKey(header) {
  const n = normalizeTR(header);
  if (/AD.*SOYAD/.test(n)) return 'fullName';
  if (/CINSIYET/.test(n)) return 'gender';
  if (/YAS/.test(n)) return 'yas';
  if (/EGITIM/.test(n)) return 'egitimDurumu';
  if (/LISANS/.test(n)) return 'lisansDurumu';
  if (/ANTRENORLUK SURENIZ/.test(n)) return 'antrenorlukSuresi';
  if (/KULUPTE GECIRILEN/.test(n)) return 'kulupSuresi';
  return n.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_+|_+$/g, '') || uid('alan');
}
function questionLike(header) {
  const n = normalizeTR(header);
  if (/ZAMAN/.test(n)) return false;
  if (/BEKLENT/.test(n)) return false;
  if (/HANGI|KIM|LISTESINE|OTURMAK|KATILMAK/.test(n)) return true;
  if (header.includes('?')) return true;
  return false;
}
function buildRelations(project, useRankWeight) {
  const questionMap = new Map(project.questions.map(q => [q.id, q.category]));
  const rels = [];
  for (const response of project.responses) {
    if (!response.respondentId || response.status === 'invalid' || response.status === 'excluded') continue;
    for (const answer of response.answers) {
      const type = questionMap.get(answer.questionId);
      if (!type) continue;
      // algılanan kategoriler ters yön: yanıtlayan kişi hedef, seçilen kişi kaynak
      const isAlgi = type === 'algılanan-seçim' || type === 'algılanan-itme';
      const effectiveType = isAlgi ? (type === 'algılanan-seçim' ? 'seçim' : 'itme') : type;
      for (let i = 0; i < answer.selectedIds.length; i++) {
        const targetId = answer.selectedIds[i];
        if (!targetId || targetId === response.respondentId) continue;
        const weight = useRankWeight ? Math.max(1, answer.selectedIds.length - i) : 1;
        if (isAlgi) {
          // algı: targetId → response.respondentId
          rels.push({ from: targetId, to: response.respondentId, questionId: answer.questionId, type: effectiveType, weight, isAlgi: true });
        } else {
          rels.push({ from: response.respondentId, to: targetId, questionId: answer.questionId, type: effectiveType, weight, isAlgi: false });
        }
      }
    }
  }
  return rels;
}
function buildPersonMetrics(project, relations) {
  const active = project.participants.filter(p => p.active);
  const N = active.length;
  return active.map(p => {
    const pid = p.id;
    const byQuestion = {};
    for (const q of project.questions) {
      const qrels = relations.filter(r => r.questionId === q.id);
      byQuestion[q.id] = {
        receivedChoices: qrels.filter(r => r.to === pid && r.type === 'seçim').length,
        receivedRejections: qrels.filter(r => r.to === pid && r.type === 'itme').length,
        sentChoices: qrels.filter(r => r.from === pid && r.type === 'seçim').length,
        sentRejections: qrels.filter(r => r.from === pid && r.type === 'itme').length,
      };
    }
    const rc = relations.filter(r => r.to === pid && r.type === 'seçim').length;
    const rr = relations.filter(r => r.to === pid && r.type === 'itme').length;
    const sc = relations.filter(r => r.from === pid && r.type === 'seçim').length;
    const sr = relations.filter(r => r.from === pid && r.type === 'itme').length;
    const mc = relations.filter(r => r.from === pid && r.type === 'seçim' && relations.some(r2 => r2.from === r.to && r2.to === pid && r2.type === 'seçim')).length;
    const mr = relations.filter(r => r.from === pid && r.type === 'itme' && relations.some(r2 => r2.from === r.to && r2.to === pid && r2.type === 'itme')).length;
    // SSS = normalize edilmiş statü skoru [-1, +1]
    const sss = N > 1 ? (rc - rr) / (N - 1) : 0;
    // Algısal doğruluk: algılanan seçimler ile gerçek seçimler karşılaştırması
    const perceivedChoices = relations.filter(r => r.to === pid && r.type === 'seçim' && r.isAlgi).length;
    const actualChoices = rc;
    const perceptualAccuracy = actualChoices > 0 ? Math.min(perceivedChoices, actualChoices) / Math.max(perceivedChoices, actualChoices) : (perceivedChoices === 0 ? 1 : 0);
    return {
      participantId: pid,
      receivedChoices: rc,
      receivedRejections: rr,
      sentChoices: sc,
      sentRejections: sr,
      mutualChoices: mc,
      mutualRejections: mr,
      netScore: rc - rr,
      sss: Math.round(sss * 100) / 100,
      perceivedChoices,
      perceptualAccuracy: Math.round(perceptualAccuracy * 100),
      byQuestion
    };
  });
}
function buildGroupMetrics(project, personMetrics, relations) {
  const active = project.participants.filter(p => p.active);
  const respondentIds = new Set(project.responses.filter(r => r.respondentId && r.status !== 'invalid' && r.status !== 'excluded').map(r => r.respondentId));
  const mostChosen = [...personMetrics].sort((a,b) => b.receivedChoices - a.receivedChoices).slice(0,3).filter(x => x.receivedChoices > 0).map(x => x.participantId);
  const mostRejected = [...personMetrics].sort((a,b) => b.receivedRejections - a.receivedRejections).slice(0,3).filter(x => x.receivedRejections > 0).map(x => x.participantId);
  const isolated = personMetrics.filter(m => m.receivedChoices === 0 && m.sentChoices === 0 && m.receivedRejections === 0 && m.sentRejections === 0).map(m => m.participantId);
  const seen = new Set();
  const mutualChoicePairs = [];
  const mutualRejectionPairs = [];
  for (const r of relations) {
    const key = [r.from, r.to, r.type].sort().join('_');
    if (seen.has(key)) continue;
    const m = relations.find(r2 => r2.from === r.to && r2.to === r.from && r2.type === r.type);
    if (m) {
      seen.add(key);
      if (r.type === 'seçim') mutualChoicePairs.push([r.from, r.to]);
      else mutualRejectionPairs.push([r.from, r.to]);
    }
  }
  // Katılmayanlar
  const nonRespondents = active.filter(p => !respondentIds.has(p.id)).map(p => p.id);

  // Cinsiyet bazlı seçim oranları
  const genderStats = {};
  for (const r of relations.filter(r => r.type === 'seçim')) {
    const fromP = active.find(p => p.id === r.from);
    const toP = active.find(p => p.id === r.to);
    if (!fromP || !toP) continue;
    const fg = (fromP.values.gender || 'bilinmiyor').toLowerCase().includes('erkek') ? 'E' : 'K';
    const tg = (toP.values.gender || 'bilinmiyor').toLowerCase().includes('erkek') ? 'E' : 'K';
    const key = fg + '→' + tg;
    genderStats[key] = (genderStats[key] || 0) + 1;
  }

  // Basit clique tespiti: karşılıklı seçim ağından bağlı bileşenler
  const adjMap = new Map(active.map(p => [p.id, new Set()]));
  for (const [a, b] of mutualChoicePairs) {
    adjMap.get(a)?.add(b); adjMap.get(b)?.add(a);
  }
  const visited = new Set();
  const cliques = [];
  for (const p of active) {
    if (visited.has(p.id)) continue;
    const group = [];
    const stack = [p.id];
    while (stack.length) {
      const curr = stack.pop();
      if (visited.has(curr)) continue;
      visited.add(curr); group.push(curr);
      adjMap.get(curr)?.forEach(n => { if (!visited.has(n)) stack.push(n); });
    }
    if (group.length > 1) cliques.push(group);
  }

  return {
    totalParticipants: active.length,
    totalRespondents: respondentIds.size,
    participationRate: active.length ? respondentIds.size / active.length : 0,
    mostChosen,
    mostRejected,
    isolated,
    mutualChoicePairs,
    mutualRejectionPairs,
    nonRespondents,
    genderStats,
    cliques
  };
}
function runAnalysis(project) {
  const relations = buildRelations(project);
  const personMetrics = buildPersonMetrics(project, relations);
  const groupMetrics = buildGroupMetrics(project, personMetrics, relations);
  project.analysis = {
    ...(project.analysis || {}),
    calculatedAt: nowISO(),
    relations,
    personMetrics,
    groupMetrics,
    unmatchedNames: project.analysis?.unmatchedNames || []
  };
  project.updatedAt = nowISO();
  updateProject(project);
  return project.analysis;
}
function participantName(project, participantId) {
  const p = project.participants.find(x => x.id === participantId);
  return p ? String(p.values.fullName || '—') : participantId;
}
function showMessage(type, text) {
  ui.messages = [{ type, text }];
  render();
}
function renderMessages() {
  return ui.messages.map(m => `<div class="${m.type}">${esc(m.text)}</div>`).join('');
}
function openProject(id) {
  ui.currentProjectId = id;
  ui.currentPage = 'institution';
  ui.messages = [];
  render();
}
function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  const project = getProject();
  if (!project) {
    sidebar.innerHTML = `
      <div class="brand">
        <h1>Sosyometri</h1>
        <p>from Çağatay TOKGÖZ</p>
      </div>
      <div class="notice">Projeler tarayıcı içinde saklanır. Aynı bilgisayarda tekrar açınca devam eder.</div>
      <div class="nav">
        <button class="active">Projeler</button>
      </div>
    `;
    return;
  }
  const items = [
    ['institution','Kurum Bilgileri'],
    ['participants','Kişiler'],
    ['questions','Sorular'],
    ['excel','Excel Yükleme'],
    ['googleform','Google Form'],
    ['responses','Yanıt Düzenleme'],

function matchParticipantByName(participants, rawName) {
  const norm = normalizeTR(rawName);
  if (!norm) return null;
  let exact = participants.find(p => normalizeTR(p.values.fullName) === norm);
  if (exact) return exact;
  let includes = participants.find(p => normalizeTR(p.values.fullName).includes(norm) || norm.includes(normalizeTR(p.values.fullName)));
  if (includes) return includes;
  const targetTokens = norm.split(' ').filter(Boolean);
  let best = null;
  let bestScore = 0;
  for (const p of participants) {
    const pn = normalizeTR(p.values.fullName);
    const tokens = pn.split(' ').filter(Boolean);
    let score = 0;
    for (const t of targetTokens) if (tokens.includes(t)) score++;
    if (score > bestScore) { bestScore = score; best = p; }
  }
  return bestScore >= Math.min(2, targetTokens.length) ? best : null;
}
function importWorkbookIntoProject(project, fileName, workbook) {
  const sheetName = workbook.SheetNames[0];
  const sheet = workbook.Sheets[sheetName];
  const rows = XLSX.utils.sheet_to_json(sheet, { defval:'', raw:false });
  if (!rows.length) throw new Error('Excel içinde veri bulunamadı.');
  const headers = Object.keys(rows[0]);
  const participantHeaders = headers.filter(h => !questionLike(h) && !/Zaman damgası/i.test(h) && !/beklent/i.test(h));
  const questionHeaders = headers.filter(h => questionLike(h));
  if (!participantHeaders.some(h => /ad/i.test(h) && /soyad/i.test(h))) throw new Error('Ad Soyad sütunu bulunamadı.');
  if (!questionHeaders.length) throw new Error('Sosyometrik soru sütunu bulunamadı.');

  const fields = [];
  const seenFieldKeys = new Set();
  for (const h of participantHeaders) {
    const key = inferFieldKey(h);
    if (seenFieldKeys.has(key)) continue;
    seenFieldKeys.add(key);
    if (key === 'fullName') continue;
    fields.push({ key, label: h, type: 'text', required: false });
  }
  project.schema.requiredFields = [
    { key:'fullName', label:'Ad Soyad', type:'text', required:true },
    { key:'gender', label:'Cinsiyet', type:'select', required:false, options:['Kadın','Erkek'] }
  ];
  project.schema.customFields = fields;

  project.participants = rows.map((row, idx) => {
    const values = { fullName:'', gender:'' };
    for (const h of participantHeaders) {
      const key = inferFieldKey(h);
      values[key] = String(row[h] ?? '').trim();
      if (key === 'fullName') values.fullName = String(row[h] ?? '').trim();
    }
    return { id: uid('p'), values, active: true, createdAt: nowISO(), _rowIndex: idx };
  }).filter(p => p.values.fullName);

  project.questions = questionHeaders.map((h, idx) => {
    const sampleSelections = rows
      .map(r => splitNames(r[h]))
      .find(list => list.length);
    const max = Math.max(1, ...rows.map(r => splitNames(r[h]).length), 3);
    return {
      id: uid('q'),
      category: inferQuestionCategory(h),
      title: h,
      description: sampleSelections?.length ? `Excel'den otomatik alındı · örnek seçim sayısı: ${sampleSelections.length}` : `Excel'den otomatik alındı`,
      min: 0,
      max,
      required: false,
      order: idx + 1,
      createdAt: nowISO()
    };
  });

  const unmatchedNames = [];
  project.responses = rows.map((row, rowIndex) => {
    const respondentNameHeader = participantHeaders.find(h => /ad/i.test(h) && /soyad/i.test(h));
    const respondentName = String(row[respondentNameHeader] ?? '').trim();
    const respondent = matchParticipantByName(project.participants, respondentName);
    const answers = project.questions.map((q, i) => {
      const header = questionHeaders[i];
      const rawSelections = splitNames(row[header]);
      const selectedIds = [];
      for (const rawName of rawSelections) {
        const target = matchParticipantByName(project.participants, rawName);
        if (target) selectedIds.push(target.id);
        else unmatchedNames.push({ respondent: respondentName, question: q.title, rawName });
      }
      return { questionId: q.id, selectedIds: [...new Set(selectedIds)] };
    });
    return {
      id: uid('r'),
      googleResponseId: null,
      submittedAt: row['Zaman damgası'] ? new Date(row['Zaman damgası']).toISOString?.() || nowISO() : nowISO(),
      respondentId: respondent ? respondent.id : null,
      answers,
      edited: false,
      editedAt: null,
      editedFields: [],
      status: respondent ? 'valid' : 'pending'
    };
  });
  project.analysis = { calculatedAt:null, relations:[], personMetrics:[], groupMetrics:null, unmatchedNames };
  project.importInfo = { fileName, sheetName, importedAt: nowISO(), rowCount: rows.length, participantHeaders, questionHeaders };
  project.updatedAt = nowISO();
  updateProject(project);
  return { rowCount: rows.length, questionCount: project.questions.length, participantCount: project.participants.length, unmatchedNames };
}

function sortAndRenderMetricsTable(project, metrics) {
  const sort = document.getElementById('metrics-sort')?.value || 'rc';
  const sorted = [...metrics].sort((a,b) => {
    if (sort === 'rc') return b.receivedChoices - a.receivedChoices;
    if (sort === 'rr') return b.receivedRejections - a.receivedRejections;
    if (sort === 'sss') return (b.sss||0) - (a.sss||0);
    if (sort === 'net') return (b.netScore||0) - (a.netScore||0);
    if (sort === 'name') return participantName(project,a.participantId).localeCompare(participantName(project,b.participantId),'tr');
    return 0;
  });
  const tbody = document.getElementById('metrics-tbody');
  if (!tbody) return;
  tbody.innerHTML = sorted.map(m => `
    <tr data-person-row="${m.participantId}" style="cursor:pointer;">
      <td><strong>${esc(participantName(project,m.participantId))}</strong></td>

let SOCIO_NODES = [], SOCIO_EDGES = [], SOCIO_ANIM = null, SOCIO_DRAG = null, SOCIO_DRAG_OFF = {x:0,y:0};
const SOCIO_W = 900, SOCIO_H = 620;

function closeSocioDetail(){
  const panel = document.getElementById('detail-panel');
  if(panel) panel.classList.remove('open');
}

function bindSociogramPage(project) {
  const svg = document.getElementById('socio-svg');
  if (!svg) return;

  const active = project.participants.filter(p => p.active);
  const ZERO_METRICS = {receivedChoices:0,receivedRejections:0,sentChoices:0,sentRejections:0,mutualChoices:0,mutualRejections:0,netChoiceScore:0};
  let currentFilter = 'all';

  function getFilteredRelations(qid){
    return (qid && qid !== 'all')
      ? project.analysis.relations.filter(r => r.questionId === qid)
      : project.analysis.relations;
  }

  function buildMetricsMapFromRelations(rels){
    const map = new Map(active.map(p => [p.id, {...ZERO_METRICS}]));
    for(const r of rels){
      const from = map.get(r.from) || {...ZERO_METRICS};
      const to = map.get(r.to) || {...ZERO_METRICS};
      if(r.type === 'seçim'){
        from.sentChoices++;
        to.receivedChoices++;
      } else if(r.type === 'itme'){
        from.sentRejections++;
        to.receivedRejections++;
      }
      map.set(r.from, from);
      map.set(r.to, to);
    }
    for(const [pid, m] of map.entries()){
      m.mutualChoices = rels.filter(r => r.from === pid && r.type === 'seçim' && rels.some(r2 => r2.from === r.to && r2.to === pid && r2.type === 'seçim')).length;
      m.mutualRejections = rels.filter(r => r.from === pid && r.type === 'itme' && rels.some(r2 => r2.from === r.to && r2.to === pid && r2.type === 'itme')).length;
      m.netChoiceScore = (m.receivedChoices || 0) - (m.receivedRejections || 0);
    }
    return map;
  }

  function getCurrentMetricsMap(){
    return buildMetricsMapFromRelations(getFilteredRelations(currentFilter));
  }

  function initNodes(){
    const metricsMap = getCurrentMetricsMap();
    SOCIO_NODES = active.map((p,i)=>{
      const angle = 2*Math.PI*i/Math.max(active.length,1);
      const radius = Math.min(220, Math.max(120, active.length*16));
      return {
        id: p.id,
        label: participantName(project, p.id),
        gender: (p.values.gender || '').toLowerCase(),
        x: SOCIO_W/2 + radius*Math.cos(angle),
        y: SOCIO_H/2 + radius*Math.sin(angle),
        vx: 0,
        vy: 0,
        m: metricsMap.get(p.id) || {...ZERO_METRICS}
      };
    });
  }

  function refreshNodeMetrics(){
    const metricsMap = getCurrentMetricsMap();
    SOCIO_NODES = SOCIO_NODES.map(n => ({
      ...n,
      m: metricsMap.get(n.id) || {...ZERO_METRICS}
    }));
  }

  function nodeSize(m){ return Math.max(16, Math.min(34, 16 + (m.receivedChoices||0)*2.5)); }

  function buildEdgesForFilter(qid){
    const rels = getFilteredRelations(qid);
    const seen = new Set();
    SOCIO_EDGES = [];
    for(const r of rels){
      const mutual = rels.some(r2 => r2.from === r.to && r2.to === r.from && r2.type === r.type);
      if(mutual){
        const pairKey = [r.from, r.to].sort().join('_') + '_' + r.type + '_mutual';
        if(seen.has(pairKey)) continue;
        seen.add(pairKey);
        const [a,b] = [r.from, r.to].sort();
        SOCIO_EDGES.push({from:a,to:b,type:r.type,mutual:true});
      } else {
        const key = r.from + '_' + r.to + '_' + r.type;
        if(seen.has(key)) continue;
        seen.add(key);
        SOCIO_EDGES.push({from:r.from,to:r.to,type:r.type,mutual:false});
      }
    }
  }

  function showPersonDetail(pid){
    const p = active.find(x => x.id === pid);
    const m = getCurrentMetricsMap().get(pid) || {...ZERO_METRICS};
    if(!p) return;
    const rels = getFilteredRelations(currentFilter);
    const byQuestion = {};
    for(const q of project.questions){
      byQuestion[q.id] = { title:q.title, choosers:[], rejecters:[] };
    }
    for(const r of rels){
      if(r.to !== pid) continue;
      if(r.type === 'seçim') byQuestion[r.questionId]?.choosers.push(r.from);
      if(r.type === 'itme') byQuestion[r.questionId]?.rejecters.push(r.from);
    }
    let detailHTML = `
      <div class="detail-name">${esc(participantName(project,pid))}</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:14px">
        ${(p.values.lisans || '')}${p.values.yas ? ` · ${esc(String(p.values.yas))} yaş` : ''}
      </div>
      <div class="detail-grid">
        <div class="detail-metric"><div class="detail-metric-label">Aldığı Seçim</div><div class="detail-metric-val" style="color:#2d6a4f">${m.receivedChoices||0}</div></div>
        <div class="detail-metric"><div class="detail-metric-label">Aldığı İtme</div><div class="detail-metric-val" style="color:#c0392b">${m.receivedRejections||0}</div></div>
        <div class="detail-metric"><div class="detail-metric-label">Yaptığı Seçim</div><div class="detail-metric-val">${m.sentChoices||0}</div></div>
        <div class="detail-metric"><div class="detail-metric-label">Karş. Seçim</div><div class="detail-metric-val" style="color:#2d6a4f">${m.mutualChoices||0}</div></div>
        <div class="detail-metric" style="grid-column:span 2"><div class="detail-metric-label">Net Skor</div><div class="detail-metric-val" style="color:${(m.netChoiceScore||0)>=0 ? '#2d6a4f' : '#c0392b'}">${(m.netChoiceScore||0)>0?'+':''}${m.netChoiceScore||0}</div></div>
      </div>
      <div class="divider"></div>
    `;
    for(const q of project.questions){
      const data = byQuestion[q.id];
      if(!data || (!data.choosers.length && !data.rejecters.length)) continue;
      detailHTML += `<div style="margin-bottom:12px"><div style="font-weight:600;font-size:13px;margin-bottom:6px">${esc(q.title)}</div>`;
      if(data.choosers.length){
        detailHTML += `<div style="font-size:12px;color:var(--muted);margin-bottom:4px">Seçenler</div>${data.choosers.map(id=>`<div style="font-size:13px;color:#2d6a4f">↗ ${esc(participantName(project,id))}</div>`).join('')}`;
      }
      if(data.rejecters.length){
        detailHTML += `<div style="font-size:12px;color:var(--muted);margin-top:6px;margin-bottom:4px">İtenler</div>${data.rejecters.map(id=>`<div style="font-size:13px;color:#c0392b">✗ ${esc(participantName(project,id))}</div>`).join('')}`;
      }
      detailHTML += `</div>`;
    }
    document.getElementById('detail-content').innerHTML = detailHTML;
    document.getElementById('detail-panel').classList.add('open');
  }
  window.closeSocioDetail = closeSocioDetail;

  const socioFilter = document.getElementById('socio-filter');
  if (socioFilter) {
    socioFilter.value = currentFilter;
    socioFilter.onchange = (e) => {
      currentFilter = e.target.value;
      buildEdgesForFilter(currentFilter);
      refreshNodeMetrics();
      drawSVG();
      closeSocioDetail();
    };
  }

  function drawSVG(){
    const nmap = new Map(SOCIO_NODES.map(n => [n.id, n]));
    let html = `<defs>
      <marker id="ac" markerWidth="7" markerHeight="7" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L7,3z" fill="#2d6a4f"/></marker>
      <marker id="ac-start" markerWidth="7" markerHeight="7" refX="0" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M7,0 L7,6 L0,3z" fill="#2d6a4f"/></marker>
      <marker id="ar" markerWidth="7" markerHeight="7" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L7,3z" fill="#c0392b"/></marker>
      <marker id="ar-start" markerWidth="7" markerHeight="7" refX="0" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M7,0 L7,6 L0,3z" fill="#c0392b"/></marker>
    </defs>`;

    for(const e of SOCIO_EDGES){
      const a = nmap.get(e.from), b = nmap.get(e.to);
      if(!a || !b) continue;
      const dx = b.x - a.x, dy = b.y - a.y;
      const d = Math.sqrt(dx*dx + dy*dy) || 1;
      const ux = dx / d, uy = dy / d;
      const aPad = nodeSize(a.m) + 6, bPad = nodeSize(b.m) + 6;
      const sx = a.x + ux*aPad, sy = a.y + uy*aPad;
      const ex = b.x - ux*bPad, ey = b.y - uy*bPad;
      const col = e.type === 'seçim' ? '#2d6a4f' : '#c0392b';
      const dash = e.type === 'itme' ? 'stroke-dasharray="5,4"' : '';
      const w = e.mutual ? 2.5 : 1.5;
      if(e.mutual){
        const off = 24, px = -uy, py = ux;
        const cx = (sx+ex)/2 + px*off, cy = (sy+ey)/2 + py*off;
        const pathD = `M${sx},${sy} Q${cx},${cy} ${ex},${ey}`;
        html += `<path d="${pathD}" stroke="${col}" stroke-width="${w}" ${dash} fill="none" opacity=".75" marker-start="url(#${e.type === 'seçim' ? 'ac-start' : 'ar-start'})" marker-end="url(#${e.type === 'seçim' ? 'ac' : 'ar'})" />`;
        const t1=0.46,t2=0.54; const qx1=(1-t1)*(1-t1)*sx+2*(1-t1)*t1*cx+t1*t1*ex; const qy1=(1-t1)*(1-t1)*sy+2*(1-t1)*t1*cy+t1*t1*ey; const qx2=(1-t2)*(1-t2)*sx+2*(1-t2)*t2*cx+t2*t2*ex; const qy2=(1-t2)*(1-t2)*sy+2*(1-t2)*t2*cy+t2*t2*ey; const lineLen=10;
        html += `<line x1="${qx1 - px*lineLen/2}" y1="${qy1 - py*lineLen/2}" x2="${qx1 + px*lineLen/2}" y2="${qy1 + py*lineLen/2}" stroke="${col}" stroke-width="2" opacity=".9" /><line x1="${qx2 - px*lineLen/2}" y1="${qy2 - py*lineLen/2}" x2="${qx2 + px*lineLen/2}" y2="${qy2 + py*lineLen/2}" stroke="${col}" stroke-width="2" opacity=".9" />`;
      } else {
        html += `<path d="M${sx},${sy} L${ex},${ey}" stroke="${col}" stroke-width="${w}" ${dash} fill="none" opacity=".65" marker-end="url(#${e.type === 'seçim' ? 'ac' : 'ar'})" />`;
      }
    }

    for(const n of SOCIO_NODES){
      const sz = nodeSize(n.m);
      // Renk: seçilme yeşil tonu, itilme kırmızı tonu, nötr gri
      const net = (n.m.receivedChoices||0) - (n.m.receivedRejections||0);
      const fill = net > 0
        ? `hsl(140,${35+net*5}%,${72-net*3}%)`
        : net < 0
          ? `hsl(0,${35+Math.abs(net)*5}%,${78-Math.abs(net)*2}%)`
          : '#e8e6e0';
      const label = esc(n.label.split(' ')[0]);
      const isFemale = n.gender.includes('kad');
      html += `<g transform="translate(${n.x},${n.y})" data-id="${n.id}" class="snode" style="cursor:grab">`;
      if(isFemale){
        html += `<circle cx="0" cy="0" r="${sz}" fill="${fill}" stroke="#888" stroke-width="1.5"></circle>`;
      } else {
        // Üçgen: yukarı bakan eşkenar üçgen
        const tp = `0,${-sz} ${sz*0.866},${sz*0.5} ${-sz*0.866},${sz*0.5}`;
        html += `<polygon points="${tp}" fill="${fill}" stroke="#888" stroke-width="1.5"></polygon>`;
      }
      // Metin merkezi: daire için 0, üçgen için ağırlık merkezi (üçgende cm = taban/3 = sz*0.5/3 ≈ sz/6 yukarı)
      const textDy = isFemale ? '4' : String(Math.round(sz * 0.17));
      if((n.m.receivedChoices||0) > 0) html += `<text text-anchor="middle" dy="${textDy}" font-size="11" font-weight="bold" fill="white" pointer-events="none">${n.m.receivedChoices||0}</text>`;
      html += `<text text-anchor="middle" dy="${sz+13}" font-size="10" fill="#555" pointer-events="none">${label}</text></g>`;
    }
    svg.innerHTML = html;
    svg.querySelectorAll('.snode').forEach(g => {
      g.addEventListener('mousedown', e => {
        const id = g.dataset.id;
        SOCIO_DRAG = id;
        const r = svg.getBoundingClientRect();
        const nd = SOCIO_NODES.find(n => n.id === id);
        const scaleX = SOCIO_W / r.width;
        const scaleY = SOCIO_H / r.height;
        SOCIO_DRAG_OFF = {
          x: (e.clientX - r.left) * scaleX - nd.x,
          y: (e.clientY - r.top) * scaleY - nd.y
        };
        if(SOCIO_ANIM) cancelAnimationFrame(SOCIO_ANIM);
        e.preventDefault();
      });
      g.addEventListener('click', e => {
        if(Math.abs(e.movementX)+Math.abs(e.movementY) < 3) showPersonDetail(g.dataset.id);
      });
    });
  }

  function runForce(){
    if(SOCIO_ANIM) cancelAnimationFrame(SOCIO_ANIM);
    let frame = 0;
    function tick(){
      if(frame++ > 150) return;
      const nmap = new Map(SOCIO_NODES.map(n => [n.id,n]));
      for(let i=0;i<SOCIO_NODES.length;i++){
        SOCIO_NODES[i].vx = 0; SOCIO_NODES[i].vy = 0;
        for(let j=0;j<SOCIO_NODES.length;j++){
          if(i===j) continue;
          const dx = SOCIO_NODES[i].x - SOCIO_NODES[j].x, dy = SOCIO_NODES[i].y - SOCIO_NODES[j].y;
          const d = Math.sqrt(dx*dx+dy*dy) || 1;
          const f = 3500/(d*d);
          SOCIO_NODES[i].vx += dx/d*f; SOCIO_NODES[i].vy += dy/d*f;
        }
      }
      for(const e of SOCIO_EDGES){
        const a=nmap.get(e.from), b=nmap.get(e.to); if(!a || !b) continue;
        const dx=b.x-a.x, dy=b.y-a.y, d=Math.sqrt(dx*dx+dy*dy)||1;
        const f=(d-110)*.02; a.vx += dx/d*f; a.vy += dy/d*f; b.vx -= dx/d*f; b.vy -= dy/d*f;
      }
      for(const n of SOCIO_NODES){
        n.vx += (SOCIO_W/2 - n.x)*.004; n.vy += (SOCIO_H/2 - n.y)*.004;
        n.x = Math.max(36, Math.min(SOCIO_W-36, n.x + n.vx*.5));
        n.y = Math.max(36, Math.min(SOCIO_H-36, n.y + n.vy*.5));
      }
      drawSVG();
      SOCIO_ANIM = requestAnimationFrame(tick);
    }
    SOCIO_ANIM = requestAnimationFrame(tick);
  }

  function redraw(){
    currentFilter = document.getElementById('socio-filter').value;
    refreshNodeMetrics();
    buildEdgesForFilter(currentFilter);
    runForce();
  }

  document.getElementById('socio-filter').onchange = redraw;
  document.getElementById('reset-socio-layout').onclick = () => { initNodes(); redraw(); closeSocioDetail(); };

  document.addEventListener('mousemove', e => {
    if(!SOCIO_DRAG) return;
    const r = svg.getBoundingClientRect();
    // SVG viewBox koordinatlarına dönüştür
    const scaleX = SOCIO_W / r.width;
    const scaleY = SOCIO_H / r.height;
    const x = (e.clientX - r.left) * scaleX - SOCIO_DRAG_OFF.x;
    const y = (e.clientY - r.top) * scaleY - SOCIO_DRAG_OFF.y;
    const n = SOCIO_NODES.find(n => n.id === SOCIO_DRAG);
    if(!n) return;
    n.x = Math.max(36, Math.min(SOCIO_W-36, x));
    n.y = Math.max(36, Math.min(SOCIO_H-36, y));
    drawSVG();
  });
  document.addEventListener('mouseup', ()=>{ SOCIO_DRAG = null; });

  initNodes();
  redraw();
}

    ${secs.katilimciListesi ? `
      <h2>Katılımcı Listesi</h2>
      <table><thead><tr><th>Ad Soyad</th><th>Cinsiyet</th></tr></thead><tbody>
        ${project.participants.filter(p=>p.active).map(p=>`<tr><td>${esc(p.values.fullName||'')}</td><td>${esc(p.values.gender||'')}</td></tr>`).join('')}

    ${secs.soruListesi ? `

        ${project.questions.map(q=>`<tr><td>${esc(q.title)}</td><td>${esc(q.category)}</td></tr>`).join('')}

    ${secs.grupOzeti ? `
      <h2>Grup Özeti</h2>

      <p>Toplam ilişki: ${analysis.relations.length}</p>

    ` : ''}
    ${secs.kisiMetrikleri ? `

      <table><thead><tr><th>Kişi</th><th>Aldığı Seçim</th><th>Aldığı İtme</th><th>Yaptığı Seçim</th><th>Yaptığı İtme</th><th>Karşılıklı Seçim</th><th>Karşılıklı İtme</th></tr></thead><tbody>${rows}</tbody></table>
    ` : ''}
    ${secs.hamIliskiler ? `
      <h2>Ham İlişkiler</h2>
      <table><thead><tr><th>Kaynak</th><th>Tür</th><th>Hedef</th></tr></thead><tbody>

function exportProject(project) {
  downloadBlob(`${project.name}_yedek.json`, JSON.stringify(project, null, 2), 'application/json');
}
function importProjectFromFile() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = async () => {
    try {
      const text = await input.files[0].text();
      const p = JSON.parse(text);
      if (!p.id || !p.name) throw new Error('Geçersiz proje dosyası.');
      p.id = uid('proj'); // yeni ID ver, çakışma olmasın
      updateProject(p);
      showMessage('success', `"${p.name}" projesi içe aktarıldı.`);
      render();
    } catch(e) { showMessage('error', 'Dosya okunamadı: ' + e.message); }
  };
  input.click();
}

function downloadBlob(filename, content, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1500);
}

}

const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxvafsREGBA3sZ2xYsKuf72NNqwZ82p5eWJgHyCFuh6HyI9ykmdzTA8lSeOzY5049NI/exec";

async function callScript(payload) {
  const res = await fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify(payload),
    headers: { 'Content-Type': 'text/plain' }
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}

    <div class="card">
      <div class="section-title" style="margin-top:0">2. Yanıtları Çek</div>
      ${g.lastSyncAt ? `<p style="font-size:13px;color:var(--muted);margin-bottom:12px">Son çekim: ${formatDate(g.lastSyncAt)}</p>` : ''}
      <button class="btn btn-primary" id="sync-btn" ${!g.formId ? 'disabled' : ''}>
        Yanıtları Çek
      </button>
      ${!g.formId ? '<p style="color:var(--muted);font-size:13px;margin-top:8px">Önce form oluştur.</p>' : ''}
      <div id="sync-status" style="margin-top:10px"></div>
      
      ${(project.responses||[]).length > 0 ? `
        <div class="section-title">Mevcut Yanıtlar</div>
        <div class="table-wrap"><table>
          <thead><tr><th>Yanıtlayan</th><th>Tarih</th><th>Durum</th></tr></thead>
          <tbody>
            ${project.responses.map(r => {
              const p = project.participants.find(x => x.id === r.respondentId);
              return `<tr>
                <td>${p ? esc(p.values.fullName||'') : '<span style="color:var(--danger)">Eşleşmedi</span>'}</td>
                <td style="font-size:12px;color:var(--muted)">${formatDate(r.submittedAt)}</td>
                <td><span class="badge ${r.respondentId ? 'badge-ok' : 'badge-warn'}">${r.respondentId ? 'Geçerli' : 'Beklemede'}</span></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table></div>
      ` : ''}
    </div>
  `;
}

function bindGoogleFormPage(project) {
  const createBtn = document.getElementById('create-form-btn');
  const syncBtn = document.getElementById('sync-btn');
  const createStatus = document.getElementById('create-form-status');
  const syncStatus = document.getElementById('sync-status');

  if (createBtn) {
    createBtn.onclick = async () => {
      createBtn.disabled = true;
      createBtn.textContent = 'Oluşturuluyor…';
      createStatus.innerHTML = '';
      try {
        const activeP = project.participants.filter(p => p.active);
        const formDesc = document.getElementById('form-description')?.value || '';
        if (project.googleForm) project.googleForm.description = formDesc;
        const result = await callScript({
          action: 'createForm',
          title: project.name,
          description: formDesc || ((project.institution?.name || '') + ' sosyometri formu'),
          participants: activeP.map(p => ({ id: p.id, name: p.values.fullName || p.id })),
          questions: project.questions.map(q => ({ id: q.id, title: q.title, description: q.description || '', required: q.required }))
        });
        project.googleForm = {
          formId: result.formId,
          formUrl: result.formUrl,
          sheetId: result.sheetId,
          questionMap: result.questionMap,
          createdAt: new Date().toISOString()
        };
        updateProject(project);
        createStatus.innerHTML = `<div style="color:var(--ok)">✅ Form oluşturuldu! <a href="${result.formUrl}" target="_blank">Aç →</a></div>`;
        render();
      } catch(e) {
        createStatus.innerHTML = `<div style="color:var(--danger)">Hata: ${esc(e.message)}</div>`;
        createBtn.disabled = false;
        createBtn.textContent = 'Form Oluştur';
      }
    };
  }

  if (syncBtn) {
    syncBtn.onclick = async () => {
      syncBtn.disabled = true;
      syncBtn.textContent = 'Çekiliyor…';
      syncStatus.innerHTML = '';
      try {
        const activeP = project.participants.filter(p => p.active);
        const result = await callScript({
          action: 'getResponses',
          formId: project.googleForm.formId,
          participants: activeP.map(p => ({ id: p.id, name: p.values.fullName || p.id })),
          questions: project.questions.map(q => ({ id: q.id, title: q.title }))
        });
        
        const existingIds = new Set((project.responses||[]).map(r => r.googleResponseId));
        const newResponses = result.responses
          .filter(r => !existingIds.has(r.googleResponseId))
          .map(r => ({
            id: 'r_' + Math.random().toString(36).slice(2,10),
            googleResponseId: r.googleResponseId,
            submittedAt: r.submittedAt,
            respondentId: r.respondentId,
            answers: r.answers,
            edited: false, editedAt: null, editedFields: [], status: r.respondentId ? 'valid' : 'pending'
          }));
        
        project.responses = [...(project.responses||[]), ...newResponses];
        project.googleForm.lastSyncAt = new Date().toISOString();
        updateProject(project);
        
        syncStatus.innerHTML = `<div style="color:var(--ok)">✅ ${newResponses.length} yeni yanıt eklendi. Toplam: ${project.responses.length}</div>`;
        render();
      } catch(e) {
        syncStatus.innerHTML = `<div style="color:var(--danger)">Hata: ${esc(e.message)}</div>`;
        syncBtn.disabled = false;
        syncBtn.textContent = 'Yanıtları Çek';
      }
    };
  }
}

function renderReportsPage(project) {
  const sections = [
    { id:'kurumBilgileri', label:'Kurum Bilgileri' },
    { id:'katilimciListesi', label:'Katılımcı Listesi' },
    { id:'soruListesi', label:'Soru Listesi' },
    { id:'grupOzeti', label:'Grup Özeti' },
    { id:'kisiMetrikleri', label:'Kişi Bazlı Metrikler' },
    { id:'hamIliskiler', label:'Ham İlişkiler' },
    { id:'karsilikliSecimler', label:'Karşılıklı Seçimler' },
    { id:'izoleKisiler', label:'İzole Kişiler' },
  ];
  return `
    <div class="page-header">
      <div>
        <h2 class="page-title">Rapor</h2>
        <p class="page-subtitle">Raporlara dahil edilecek bölümleri seç, ardından format seç.</p>
      </div>
    </div>
    ${renderMessages()}
    <div class="card" style="margin-bottom:18px;">
      <div class="section-title" style="margin-top:0;">Raporda Yer Alacak Bölümler</div>
      <div class="grid-2">
        ${sections.map(s => `
          <label style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:8px 0;">
            <input type="checkbox" id="sec-${s.id}" checked style="width:16px;height:16px;">
            <span style="font-size:14px;">${s.label}</span>
          </label>
        `).join('')}
      </div>
    </div>
    <div class="grid-3">
      <div class="card"><div class="section-title" style="margin-top:0;">PDF</div><p class="page-subtitle">Yazdır penceresi açılır. PDF olarak kaydedebilirsin.</p><button class="btn btn-primary" id="report-pdf">PDF Hazırla</button></div>
      <div class="card"><div class="section-title" style="margin-top:0;">Word</div><p class="page-subtitle">.doc uzantılı dosya oluşturur.</p><button class="btn btn-primary" id="report-word">Word İndir</button></div>
      <div class="card"><div class="section-title" style="margin-top:0;">Excel</div><p class="page-subtitle">Sekmeli Excel raporu oluşturur.</p><button class="btn btn-primary" id="report-excel">Excel İndir</button></div>
    </div>
  `;
}
function getSelectedSections() {
  const ids = ['kurumBilgileri','katilimciListesi','soruListesi','grupOzeti','kisiMetrikleri','hamIliskiler','karsilikliSecimler','izoleKisiler'];
  const result = {};
  ids.forEach(id => {
    const el = document.getElementById('sec-' + id);
    result[id] = el ? el.checked : true;
  });
  return result;
}

function bindReportsPage(project) {
  document.getElementById('report-word').onclick = () => {
    const secs = getSelectedSections();
    downloadBlob(`${project.name}_rapor.doc`, buildReportHtml(project, secs), 'application/msword');
  };
  document.getElementById('report-excel').onclick = () => {
    const secs = getSelectedSections();
    exportExcelReport(project, secs);
  };
  document.getElementById('report-pdf').onclick = () => {
    const secs = getSelectedSections();
    const w = window.open('', '_blank');
    w.document.open();
    w.document.write(buildReportHtml(project, secs));
    w.document.close();
    w.focus();
    setTimeout(() => w.print(), 300);
  };
}
function render() {
  renderSidebar();
  const view = document.getElementById('view');
  const project = getProject();
  if (!project) {
    view.innerHTML = renderProjectsPage();
    bindProjectsPage();
    return;
  }
  let html = '';
  if (ui.currentPage === 'institution') html = renderInstitutionPage(project);
  else if (ui.currentPage === 'participants') html = renderParticipantsPage(project);
  else if (ui.currentPage === 'questions') html = renderQuestionsPage(project);
  else if (ui.currentPage === 'responses') html = renderResponsesPage(project);
  else if (ui.currentPage === 'excel') html = renderExcelPage(project);
  else if (ui.currentPage === 'googleform') html = renderGoogleFormPage(project);
  else if (ui.currentPage === 'analysis') html = renderAnalysisPage(project);
  else if (ui.currentPage === 'sociogram') html = renderSociogramPage(project);
  else if (ui.currentPage === 'reports') html = renderReportsPage(project);
  else html = renderInstitutionPage(project);
  view.innerHTML = html;
  if (ui.currentPage === 'institution') bindInstitutionPage(project);
  else if (ui.currentPage === 'participants') bindParticipantsPage(project);
  else if (ui.currentPage === 'questions') bindQuestionsPage(project);
  else if (ui.currentPage === 'responses') bindResponsesPage(project);
  else if (ui.currentPage === 'excel') bindExcelPage(project);
  else if (ui.currentPage === 'googleform') bindGoogleFormPage(project);
  else if (ui.currentPage === 'analysis') bindAnalysisPage(project);
  else if (ui.currentPage === 'sociogram') bindSociogramPage(project);
  else if (ui.currentPage === 'reports') bindReportsPage(project);
  else if (ui.currentPage === 'googleform') bindGoogleFormPage(project);
}
render();
</script>

<script>
let deferredInstallPrompt = null;
const installBtn = document.getElementById('install-app-btn');
if (installBtn) {
  installBtn.addEventListener('click', async () => {
    if (!deferredInstallPrompt) return;
    deferredInstallPrompt.prompt();
    await deferredInstallPrompt.userChoice;
    deferredInstallPrompt = null;
    installBtn.classList.add('hidden');
  });
}
window.addEventListener('beforeinstallprompt', (event) => {
  event.preventDefault();
  deferredInstallPrompt = event;
  installBtn?.classList.remove('hidden');
});
window.addEventListener('appinstalled', () => {
  deferredInstallPrompt = null;
  installBtn?.classList.add('hidden');
});
if ('serviceWorker' in navigator) {
  window.addEventListener('load', async () => {
    try {
      await navigator.serviceWorker.register('./sw.js');
    } catch (err) {
      console.error('Service worker kaydı başarısız:', err);
    }
  });
}
</script>
