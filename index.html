    function renderComparePage(project) {
      if (!project.preTestProjectId) return '<div class="empty">Bu proje bir Son-Test değil. Karşılaştırılacak Ön-Test yok.</div>';
      const preTestProject = loadProjects().find(p => p.id === project.preTestProjectId);
      if (!preTestProject) return '<div class="empty">Ön-Test projesi veritabanında bulunamadı (silinmiş olabilir).</div>';
      if (!project.analysis?.calculatedAt) return '<div class="empty"><div class="empty-icon">📊</div><div class="empty-title">Son-Test Analizi Yok</div><div class="empty-desc">Önce "Analiz" sayfasından analizi çalıştırın.</div></div>';
      if (!preTestProject.analysis?.calculatedAt) return '<div class="empty"><div class="empty-icon">📊</div><div class="empty-title">Ön-Test Analizi Yok</div><div class="empty-desc">Ön-Test projesini açıp analizini çalıştırın.</div></div>';

      const m1raw = preTestProject.analysis.personMetrics || [];
      const m2    = project.analysis.personMetrics       || [];
      const pm1   = preTestProject.analysis.groupMetrics || {};
      const pm2   = project.analysis.groupMetrics        || {};

      // ── İsim bazlı köprü: ön-test ID → son-test katılımcı ID ──────────────
      // Excel'den iki ayrı import yapıldığında ID'ler farklı olur.
      // Eşleştirmeyi her zaman fullName (normalize) üzerinden yapıyoruz.
      const prePartById  = new Map((preTestProject.participants||[]).map(p=>[p.id, p]));
      const postPartByName = new Map(
        project.participants.filter(p=>p.active).map(p=>[normalizeTR(p.values.fullName||''), p])
      );

      // ön-test metric'ini son-test katılımcısının ID'sine göre bul
      function getPreMetric(postPid) {
        const postP = project.participants.find(x=>x.id===postPid);
        if (!postP) return null;
        const normName = normalizeTR(postP.values.fullName||'');
        // ön-test katılımcısını isimle bul
        const preP = (preTestProject.participants||[]).find(p=>normalizeTR(p.values.fullName||'')===normName);
        if (!preP) return null;
        return m1raw.find(x=>x.participantId===preP.id) || null;
      }

      // pulse/scale map'lerini isim→değer olarak yeniden indeksle (ön-test için)
      function buildNameMap(rawMap, sourceParticipants) {
        const out = {};
        for (const [pid, val] of Object.entries(rawMap)) {
          const p = (sourceParticipants||[]).find(x=>x.id===pid);
          if (p) out[normalizeTR(p.values.fullName||'')] = val;
        }
        return out;
      }

      const pulse1ByName = buildNameMap(preTestProject.analysis.pulseMetrics?.personPulseScores||{}, preTestProject.participants);
      const scale1ByName = buildNameMap(preTestProject.analysis.pulseMetrics?.personScaleScores||{}, preTestProject.participants);

      // son-test pulse/scale → ID map (değişmedi, normal kullan)
      const pulse2Map = project.analysis.pulseMetrics?.personPulseScores || {};
      const scale2Map = project.analysis.pulseMetrics?.personScaleScores || {};

      function getPrePulse(postPid) {
        const postP = project.participants.find(x=>x.id===postPid);
        if (!postP) return null;
        return pulse1ByName[normalizeTR(postP.values.fullName||'')] ?? null;
      }
      function getPreScale(postPid) {
        const postP = project.participants.find(x=>x.id===postPid);
        if (!postP) return null;
        return scale1ByName[normalizeTR(postP.values.fullName||'')] ?? null;
      }

      const hasPulseData = Object.keys(pulse1ByName).length > 0 || Object.keys(pulse2Map).length > 0;
      const hasScaleData = Object.values(scale1ByName).some(v=>v&&Object.values(v).some(Boolean)) ||
                           Object.keys(scale2Map).some(pid=>Object.values(scale2Map[pid]||{}).some(Boolean));

      const activeP = project.participants.filter(p => p.active);

      // ── Zaman aralığı ──────────────────────────────────────────────────────
      const t1 = preTestProject.analysis.calculatedAt;
      const t2 = project.analysis.calculatedAt;
      const daysDiff = t1 && t2
        ? Math.round(Math.abs(new Date(t2)-new Date(t1))/(1000*60*60*24))
        : null;

      function getRisk(metricsList, pid, pulseMap, scaleMap) {
        const m = metricsList.find(x => x.participantId === pid);
        if (!m) return 0;
        return calcRiskScore(m, pulseMap[pid]??null, scaleMap[pid]??null);
      }

      // ön-test risk — isim bazlı
      function getPreRisk(postPid) {
        const d1 = getPreMetric(postPid);
        if (!d1) return 0;
        return calcRiskScore(d1, getPrePulse(postPid), getPreScale(postPid));
      }

      // ── Kritik geçişler ────────────────────────────────────────────────────
      const cikilanIzole = [], yeniIzole = [], tekYonluCikti = [], yeniTekYonlu = [];
      const iyilesenler = [], kotulesenler = [];

      for (const p of activeP) {
        const d1 = getPreMetric(p.id);
        const d2 = m2.find(x => x.participantId === p.id);
        if (!d1 && !d2) continue;
        const iso1 = d1?.isolationType, iso2 = d2?.isolationType;
        if (iso1 === 'tam'  && !iso2)          cikilanIzole.push(p.values.fullName);
        if (!iso1 && iso2 === 'tam')           yeniIzole.push(p.values.fullName);
        if (iso1 === 'tek-yonlu' && !iso2)     tekYonluCikti.push(p.values.fullName);
        if (!iso1 && iso2 === 'tek-yonlu')     yeniTekYonlu.push(p.values.fullName);
        const sss1 = d1?.sss||0, sss2 = d2?.sss||0, sssDelta = sss2-sss1;
        if (sssDelta > 0.15) iyilesenler.push(p.values.fullName);
        if (sssDelta < -0.15) kotulesenler.push(p.values.fullName);
      }

      // ── Müdahale etki özeti ────────────────────────────────────────────────
      const tasks = project.tasks || [];
      const doneTasks = tasks.filter(t => t.status === 'done' && t.participantId);
      let etkiliAksiyon = 0;
      for (const t of doneTasks) {
        const d1 = getPreMetric(t.participantId);
        const d2 = m2.find(x => x.participantId === t.participantId);
        if (d1 && d2 && d2.sss > d1.sss) etkiliAksiyon++;
      }

      // ── Grup delta metrikleri ──────────────────────────────────────────────
      function metricCard(label, v1, v2, unit='', lowerBetter=false) {
        const d = typeof v1==='number' && typeof v2==='number' ? v2-v1 : null;
        const good = d===null ? false : lowerBetter ? d<0 : d>0;
        const bad  = d===null ? false : lowerBetter ? d>0 : d<0;
        const col  = good?'#0e7c5b' : bad?'#c0392b' : '#64748b';
        const sym  = d===null ? '' : d>0 ? '▲ +' : d<0 ? '▼ ' : '';
        return `<div class="card">
          <div style="font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em;">${label}</div>
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-top:10px;">
            <div style="font-size:13px;color:var(--muted);">${v1!==null&&v1!==undefined?v1+unit:'—'}</div>
            <div style="font-size:11px;color:var(--muted);">➔</div>
            <div style="font-size:22px;font-weight:900;">${v2!==null&&v2!==undefined?v2+unit:'—'}</div>
          </div>
          ${d!==null ? `<div style="font-size:12px;font-weight:800;color:${col};margin-top:4px;">${sym}${Math.abs(d).toFixed(typeof d==='number'&&!Number.isInteger(d)?2:0)}${unit}</div>` : ''}
        </div>`;
      }

      // ── Kişi bazlı delta tablosu ──────────────────────────────────────────
      const sortedP = [...activeP].sort((a,b) => {
        const r1a = getPreRisk(a.id), r2a = getRisk(m2,a.id,pulse2Map,scale2Map);
        const r1b = getPreRisk(b.id), r2b = getRisk(m2,b.id,pulse2Map,scale2Map);
        return Math.abs(r2b-r1b) - Math.abs(r2a-r1a);
      });

      let rowsHtml = '';
      for (const p of sortedP) {
        const d1 = getPreMetric(p.id);
        const d2 = m2.find(x => x.participantId === p.id);
        if (!d1 && !d2) continue;

        const sss1 = d1?.sss||0, sss2 = d2?.sss||0, sssDelta = +(sss2-sss1).toFixed(2);
        const r1   = getPreRisk(p.id);
        const r2   = getRisk(m2,p.id,pulse2Map,scale2Map);
        const rDelta = r2-r1;
        const rc1 = d1?.receivedChoices||0, rc2 = d2?.receivedChoices||0, rcDelta = rc2-rc1;
        const rr1 = d1?.receivedRejections||0, rr2 = d2?.receivedRejections||0, rrDelta = rr2-rr1;
        const pulse1 = getPrePulse(p.id), pulse2 = pulse2Map[p.id]??null;
        const pulseDelta = (pulse1!==null&&pulse2!==null) ? pulse2-pulse1 : null;
        const iso1 = d1?.isolationType, iso2 = d2?.isolationType;

        let statusLabel='Aynı Seviye', statusColor='#64748b';
        if (rDelta<=-15||sssDelta>=0.2)  {statusLabel='🌟 İyileşti';  statusColor='#0e7c5b';}
        else if (rDelta>=15||sssDelta<=-0.2) {statusLabel='⚠ Kötüleşti'; statusColor='#c0392b';}

        let isoHtml='';
        if (iso1==='tam'&&!iso2)        isoHtml='<div style="color:#0e7c5b;font-size:11px;font-weight:700;margin-top:3px;">✓ İzolasyondan çıktı</div>';
        else if (!iso1&&iso2==='tam')   isoHtml='<div style="color:#c0392b;font-size:11px;font-weight:700;margin-top:3px;">🚨 Yeni tam izole</div>';
        else if (iso1===iso2&&iso1)     isoHtml=`<div style="color:#b45309;font-size:11px;margin-top:3px;">${iso1==='tam'?'Hâlâ tam izole':'Hâlâ tek-yönlü'}</div>`;

        // Ölçek karşılaştırması
        let scaleHtml = '';
        if (hasScaleData) {
          const sc1 = getPreScale(p.id)||{}, sc2 = scale2Map[p.id]||{};
          const allSids = new Set([...Object.keys(sc1),...Object.keys(sc2)]);
          for (const sid of allSids) {
            const s1=sc1[sid], s2=sc2[sid];
            if (!s1&&!s2) continue;
            const col = s2&&s1 ? (s2.total<s1.total?'#0e7c5b':s2.total>s1.total?'#c0392b':'#64748b') : '#64748b';
            const d = s1&&s2 ? s2.total-s1.total : null;
            scaleHtml += `<div style="font-size:11px;color:${col};font-weight:700;">${sid.toUpperCase()}: ${s1?s1.total:'—'} → ${s2?s2.total:'—'}${d!==null?` (${d>0?'+':''}${d})`:''} ${s2?'('+s2.label+')':''}</div>`;
          }
        }

        // Mini sparkline bar
        const barW = Math.max(0,Math.min(100,50+(sssDelta*100)));
        const barCol = sssDelta>0.05?'#0e7c5b':sssDelta<-0.05?'#c0392b':'#94a3b8';

        rowsHtml += `<tr>
          <td>
            <strong style="font-size:14px;">${esc(p.values.fullName||'—')}</strong>
            ${isoHtml}
            ${scaleHtml ? `<div style="margin-top:4px;">${scaleHtml}</div>` : ''}
          </td>
          <td>
            <div style="display:flex;align-items:center;gap:6px;">
              <span style="color:var(--muted);font-size:12px;">${sss1.toFixed(2)} → ${sss2.toFixed(2)}</span>
              <span style="color:${sssDelta>0.05?'#0e7c5b':sssDelta<-0.05?'#c0392b':'var(--muted)'};font-weight:800;font-size:12px;">${sssDelta>0?'▲ +'+sssDelta.toFixed(2):sssDelta<0?'▼ '+Math.abs(sssDelta).toFixed(2):'—'}</span>
            </div>
            <div style="margin-top:4px;height:4px;background:var(--surface2);border-radius:99px;width:80px;">
              <div style="width:${barW}%;height:100%;border-radius:99px;background:${barCol};transition:width .4s;"></div>
            </div>
          </td>
          <td>
            <div style="display:flex;align-items:center;gap:6px;">
              <span style="color:var(--muted);font-size:12px;">${r1} → ${r2}</span>
              <span style="color:${rDelta<=-10?'#0e7c5b':rDelta>=10?'#c0392b':'var(--muted)'};font-weight:800;font-size:12px;">${rDelta<0?'▼ '+Math.abs(rDelta):rDelta>0?'▲ +'+rDelta:'—'}</span>
            </div>
          </td>
          <td>
            <div style="display:flex;align-items:center;gap:6px;">
              <span style="color:var(--muted);font-size:12px;">${rc1} → ${rc2}</span>
              <span style="color:${rcDelta>0?'#0e7c5b':rcDelta<0?'#c0392b':'var(--muted)'};font-weight:800;font-size:12px;">${rcDelta>0?'▲ +'+rcDelta:rcDelta<0?'▼ '+Math.abs(rcDelta):'—'}</span>
            </div>
          </td>
          <td>
            <div style="display:flex;align-items:center;gap:6px;">
              <span style="color:var(--muted);font-size:12px;">${rr1} → ${rr2}</span>
              <span style="color:${rrDelta<0?'#0e7c5b':rrDelta>0?'#c0392b':'var(--muted)'};font-weight:800;font-size:12px;">${rrDelta<0?'▼ '+Math.abs(rrDelta):rrDelta>0?'▲ +'+rrDelta:'—'}</span>
            </div>
          </td>
          ${hasPulseData?`<td>
            <div style="display:flex;align-items:center;gap:6px;">
              <span style="color:var(--muted);font-size:12px;">${pulse1!==null?pulse1+'%':'—'} → ${pulse2!==null?pulse2+'%':'—'}</span>
              ${pulseDelta!==null?`<span style="color:${pulseDelta>5?'#0e7c5b':pulseDelta<-5?'#c0392b':'var(--muted)'};font-weight:800;font-size:12px;">${pulseDelta>0?'▲ +'+pulseDelta:pulseDelta<0?'▼ '+Math.abs(pulseDelta):'—'}</span>`:''}
            </div>
          </td>`:''}
          <td>
            <span style="background:${statusColor}18;color:${statusColor};padding:3px 10px;border-radius:99px;font-size:12px;font-weight:700;">${statusLabel}</span>
          </td>
        </tr>`;
      }

      // ── Kritik geçiş paneli HTML ────────────────────────────────────────
      function gecisPanel(list, icon, label, col, bg) {
        if (!list.length) return '';
        return `<div style="background:${bg};border-radius:12px;padding:12px 14px;border-left:4px solid ${col};">
          <div style="font-size:12px;font-weight:800;color:${col};margin-bottom:6px;">${icon} ${label} (${list.length} kişi)</div>
          <div style="display:flex;flex-wrap:wrap;gap:6px;">
            ${list.map(n=>`<span style="background:white;padding:3px 10px;border-radius:99px;font-size:12px;border:1px solid ${col}44;">${esc(n)}</span>`).join('')}
          </div>
        </div>`;
      }

      const hasGecisPanels = cikilanIzole.length||yeniIzole.length||tekYonluCikti.length||yeniTekYonlu.length||iyilesenler.length||kotulesenler.length;

      return `
        <div class="page-header">
          <div>
            <h2 class="page-title">📈 Etki Karşılaştırması</h2>
            <p class="page-subtitle">
              <strong>Ön-Test:</strong> ${esc(preTestProject.name)}
              <span style="color:var(--muted);padding:0 8px;">➔</span>
              <strong>Son-Test:</strong> ${esc(project.name)}
              ${daysDiff!==null?`<span style="margin-left:12px;background:var(--accent-soft);color:var(--accent);padding:2px 10px;border-radius:99px;font-size:12px;font-weight:700;">⏱ ${daysDiff} günlük süreç</span>`:''}
            </p>
          </div>
          <button class="btn btn-soft" id="compare-pdf-btn">🖨 PDF</button>
        </div>

        <!-- Zaman Damgası -->
        <div style="display:flex;gap:8px;margin-bottom:20px;font-size:12px;color:var(--muted);">
          <span>Ön-Test analizi: <strong>${t1?new Date(t1).toLocaleDateString('tr-TR'):'—'}</strong></span>
          <span>·</span>
          <span>Son-Test analizi: <strong>${t2?new Date(t2).toLocaleDateString('tr-TR'):'—'}</strong></span>
        </div>

        <!-- Müdahale Etki Özeti -->
        ${doneTasks.length>0?`
        <div class="card" style="margin-bottom:20px;border-left:4px solid var(--accent);">
          <div style="font-size:13px;font-weight:800;color:var(--accent);margin-bottom:10px;">🎯 Müdahale Etki Özeti</div>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;">
            <div style="background:var(--surface2);border-radius:10px;padding:12px;text-align:center;">
              <div style="font-size:11px;color:var(--muted);">Tamamlanan Aksiyon</div>
              <div style="font-size:26px;font-weight:900;color:var(--accent);">${doneTasks.length}</div>
            </div>
            <div style="background:var(--surface2);border-radius:10px;padding:12px;text-align:center;">
              <div style="font-size:11px;color:var(--muted);">SSS İyileşmesiyle Örtüşen</div>
              <div style="font-size:26px;font-weight:900;color:#0e7c5b;">${etkiliAksiyon}</div>
            </div>
            <div style="background:var(--surface2);border-radius:10px;padding:12px;text-align:center;">
              <div style="font-size:11px;color:var(--muted);">Etki Oranı</div>
              <div style="font-size:26px;font-weight:900;color:${doneTasks.length?Math.round(etkiliAksiyon/doneTasks.length*100)>=50?'#0e7c5b':'#b45309':'var(--muted)'};">${doneTasks.length?Math.round(etkiliAksiyon/doneTasks.length*100)+'%':'—'}</div>
            </div>
          </div>
        </div>` : ''}

        <!-- Kritik Geçişler -->
        ${hasGecisPanels?`
        <div class="section-title">🚦 KRİTİK GEÇİŞLER</div>
        <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:20px;">
          ${gecisPanel(cikilanIzole,'✅','Tam İzolasyondan Çıkanlar','#0e7c5b','#d1fae5')}
          ${gecisPanel(yeniIzole,'🚨','Yeni Tam İzole Olanlar','#c0392b','#fde8e6')}
          ${gecisPanel(tekYonluCikti,'↑','Tek-Yönlü İzolasyondan Çıkanlar','#1a56a0','#dbeafe')}
          ${gecisPanel(yeniTekYonlu,'↓','Yeni Tek-Yönlü İzole','#b45309','#fef3c7')}
          ${gecisPanel(iyilesenler,'🌟','SSS Belirgin İyileşme (Δ>0.15)','#0e7c5b','#d1fae5')}
          ${gecisPanel(kotulesenler,'⚠','SSS Belirgin Kötüleşme (Δ<-0.15)','#c0392b','#fde8e6')}
        </div>`:''} 

        <!-- Grup Düzeyinde Metrikler -->
        <div class="section-title">GRUP DÜZEYİ DEĞİŞİM</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:20px;">
          ${metricCard('Katılım Oranı', Math.round((pm1.participationRate||0)*100), Math.round((pm2.participationRate||0)*100), '%')}
          ${metricCard('Ağ Yoğunluğu', pm1.networkDensity||0, pm2.networkDensity||0, '%')}
          ${metricCard('Karşılıklı Seçim', pm1.mutualRate||0, pm2.mutualRate||0, '%')}
          ${metricCard('Tam İzole', pm1.fullyIsolated?.length||0, pm2.fullyIsolated?.length||0, ' kişi', true)}
          ${metricCard('Tek-Yönlü İzole', pm1.oneWayIsolated?.length||0, pm2.oneWayIsolated?.length||0, ' kişi', true)}
          ${metricCard('Yıldız Kişi', pm1.stars?.length||0, pm2.stars?.length||0, ' kişi')}
          ${metricCard('Alt Grup', pm1.cliques?.length||0, pm2.cliques?.length||0, ' adet')}
          ${metricCard('Karşılıklı İtme', pm1.mutualRejectionPairs?.length||0, pm2.mutualRejectionPairs?.length||0, ' çift', true)}
        </div>

        <!-- Kişi Bazlı Delta Tablosu -->
        <div class="section-title">KİŞİ BAZLI DEĞİŞİM (DELTA Δ) — En çok değişenler üstte</div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Ad Soyad</th>
                <th>SSS Δ</th>
                <th>Risk Δ</th>
                <th>Seçilme Δ</th>
                <th>İtilme Δ</th>
                ${hasPulseData?`<th style="color:var(--pulse);">💜 Pulse Δ</th>`:''}
                <th>Durum</th>
              </tr>
            </thead>
            <tbody>${rowsHtml}</tbody>
          </table>
        </div>
      `;
    }

    function bindComparePage(project) {
      const pdfBtn = document.getElementById('compare-pdf-btn');
      if (pdfBtn) pdfBtn.onclick = () => {
        const w = window.open('','_blank');
        const content = document.getElementById('view').innerHTML;
        w.document.open();
        w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Etki Raporu</title>
          <style>body{font-family:Arial,sans-serif;padding:24px;font-size:13px;}
          table{width:100%;border-collapse:collapse;margin:12px 0;}
          th,td{border:1px solid #ddd;padding:8px 10px;font-size:12px;}
          th{background:#eff6ff;color:#1e3a8a;font-weight:700;}
          .card{border:1px solid #ddd;border-radius:8px;padding:14px;margin:8px 0;}
          @media print{button{display:none!important;}}</style>
        </head><body>${content}</body></html>`);
        w.document.close();
        w.focus();
        setTimeout(()=>w.print(), 400);
      };
    }

    function renderKanbanPage(project) {
      const tasks = project.tasks || [];
      const todo  = tasks.filter(t => t.status === 'todo');
      const doing = tasks.filter(t => t.status === 'doing');
      const done  = tasks.filter(t => t.status === 'done');

      const priorityBadge = (p) => {
        if (p === 'acil')  return `<span style="background:#fde8e6;color:#c0392b;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;">🔴 Acil</span>`;
        if (p === 'dusuk') return `<span style="background:#d1fae5;color:#0e7c5b;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;">🟢 Düşük</span>`;
        return `<span style="background:#fef3c7;color:#b45309;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;">🟡 Orta</span>`;
      };

      function rCol(title, color, list, status) {
        return `<div style="flex:1;min-width:280px;background:var(--surface2);border-radius:14px;padding:14px;border:1px solid var(--border);">
      <div style="font-size:13px;font-weight:800;color:${color};margin-bottom:12px;letter-spacing:.05em;">${title} (${list.length})</div>
      <div style="display:flex;flex-direction:column;gap:10px;">
        ${list.map(t => {
          const p = project.participants.find(x => x.id === t.participantId);
          return `<div class="card" style="padding:14px;border-left:4px solid ${color};">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;gap:8px;">
              <div style="font-size:13px;font-weight:700;flex:1;">${esc(t.text)}</div>
              ${priorityBadge(t.priority || 'orta')}
            </div>
            ${p ? `<div style="font-size:11px;color:var(--accent);font-weight:600;margin-bottom:4px;">👤 ${esc(p.values.fullName)}</div>` : '<div style="font-size:11px;color:var(--muted);margin-bottom:4px;">📋 Genel görev</div>'}
            ${t.note ? `<div style="font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:8px;padding:8px;background:var(--surface2);border-radius:8px;border-left:2px solid var(--border);">${esc(t.note)}</div>` : ''}
            <div style="font-size:10px;color:var(--muted);margin-bottom:10px;">${t.createdAt ? new Date(t.createdAt).toLocaleDateString('tr-TR') : ''}</div>
            <div style="display:flex;gap:6px;flex-wrap:wrap;">
              ${status !== 'todo' ? `<button class="btn btn-soft" style="font-size:11px;padding:4px 8px;" data-move-task="${t.id}" data-to="${status === 'done' ? 'doing' : 'todo'}">← Geri</button>` : ''}
              ${status === 'todo'  ? `<button class="btn btn-primary" style="font-size:11px;padding:4px 8px;" data-move-task="${t.id}" data-to="doing">Başla →</button>` : ''}
              ${status === 'doing' ? `<button class="btn" style="font-size:11px;padding:4px 8px;background:var(--ok);color:white;border-color:var(--ok);" data-move-task="${t.id}" data-to="done">Bitir ✓</button>` : ''}
              <div style="flex:1"></div>
              <button class="btn btn-danger" style="font-size:11px;padding:4px 8px;" data-delete-task="${t.id}">Sil</button>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
      }

      // Manuel görev ekleme formu için participant options
      const pOptions = project.participants.filter(p => p.active)
        .map(p => `<option value="${p.id}">${esc(p.values.fullName)}</option>`).join('');

      return `<div class="page-header">
        <div><h2 class="page-title">Görev Panosu (Kanban)</h2>
        <p class="page-subtitle">Müdahale kararlarını aksiyona dönüştür ve takip et.</p></div>
        <button class="btn btn-primary" id="kanban-add-task-btn">➕ Yeni Görev</button>
      </div>
    ${renderMessages()}

    <!-- Manuel görev ekleme formu -->
    <div id="kanban-task-form" style="display:none;margin-bottom:20px;">
      <div class="card" style="border-left:4px solid var(--accent);">
        <div style="font-size:13px;font-weight:800;color:var(--accent);margin-bottom:12px;">YENİ GÖREV EKLE</div>
        <div style="display:flex;flex-direction:column;gap:10px;">
          <div class="field">
            <label style="font-size:12px;color:var(--muted);font-weight:600;">Görev Başlığı</label>
            <input class="input" id="kf-title" placeholder="Görev başlığını yaz…">
          </div>
          <div class="field">
            <label style="font-size:12px;color:var(--muted);font-weight:600;">Not / Açıklama</label>
            <textarea class="textarea" id="kf-note" style="min-height:80px;" placeholder="Detay, bağlam, kaynaklar…"></textarea>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
            <div class="field">
              <label style="font-size:12px;color:var(--muted);font-weight:600;">İlgili Kişi</label>
              <select class="select" id="kf-pid">
                <option value="">— Genel görev —</option>
                ${pOptions}
              </select>
            </div>
            <div class="field">
              <label style="font-size:12px;color:var(--muted);font-weight:600;">Öncelik</label>
              <select class="select" id="kf-priority">
                <option value="acil">🔴 Acil</option>
                <option value="orta" selected>🟡 Orta</option>
                <option value="dusuk">🟢 Düşük</option>
              </select>
            </div>
          </div>
          <div style="display:flex;gap:8px;">
            <button class="btn btn-primary" id="kf-save">✓ Ekle</button>
            <button class="btn btn-soft" id="kf-cancel">İptal</button>
          </div>
        </div>
      </div>
    </div>

    <div style="display:flex;gap:16px;overflow-x:auto;padding-bottom:20px;min-height:400px;align-items:flex-start;">
      ${rCol('BEKLİYOR', 'var(--warning)', todo, 'todo')}
      ${rCol('DEVAM EDİYOR', 'var(--accent)', doing, 'doing')}
      ${rCol('TAMAMLANDI', 'var(--ok)', done, 'done')}
    </div>`;
    }
    function bindKanbanPage(project) {
      document.querySelectorAll('[data-move-task]').forEach(b => b.onclick = () => {
        const task = (project.tasks || []).find(t => t.id === b.dataset.moveTask);
        if (task) { task.status = b.dataset.to; project.updatedAt = nowISO(); updateProject(project); render(); }
      });
      document.querySelectorAll('[data-delete-task]').forEach(b => b.onclick = () => {
        if (!confirm('Görevi silmek istediğinize emin misiniz?')) return;
        project.tasks = (project.tasks || []).filter(t => t.id !== b.dataset.deleteTask);
        project.updatedAt = nowISO(); updateProject(project); render();
      });

      // Manuel yeni görev formu
      const addBtn    = document.getElementById('kanban-add-task-btn');
      const formEl    = document.getElementById('kanban-task-form');
      const cancelBtn = document.getElementById('kf-cancel');
      const saveBtn   = document.getElementById('kf-save');

      if (addBtn && formEl) {
        addBtn.onclick = () => {
          const isOpen = formEl.style.display === 'block';
          formEl.style.display = isOpen ? 'none' : 'block';
          if (!isOpen) document.getElementById('kf-title')?.focus();
        };
      }
      if (cancelBtn && formEl) {
        cancelBtn.onclick = () => { formEl.style.display = 'none'; };
      }
      if (saveBtn) {
        saveBtn.onclick = () => {
          const title    = document.getElementById('kf-title')?.value.trim();
          const note     = document.getElementById('kf-note')?.value.trim();
          const pid      = document.getElementById('kf-pid')?.value || null;
          const priority = document.getElementById('kf-priority')?.value || 'orta';
          if (!title) { showMessage('error', 'Görev başlığı boş olamaz.'); return; }
          if (!project.tasks) project.tasks = [];
          project.tasks.push({ id: uid('task'), participantId: pid, text: title, note: note || '', priority, status: 'todo', createdAt: nowISO() });
          project.updatedAt = nowISO(); updateProject(project); render();
        };
      }
    }

    function render() {
      renderSidebar();
      const view = document.getElementById('view');
      const project = getProject();
      if (!project) { view.innerHTML = renderProjectsPage(); bindProjectsPage(); return; }
      let html = '';
      if (ui.currentPage === 'institution') html = renderInstitutionPage(project);
      else if (ui.currentPage === 'participants') html = renderParticipantsPage(project);
      else if (ui.currentPage === 'questions') html = renderQuestionsPage(project);
      else if (ui.currentPage === 'responses') html = renderResponsesPage(project);
      else if (ui.currentPage === 'excel') html = renderExcelPage(project);
      else if (ui.currentPage === 'googleform') html = renderGoogleFormPage(project);
      else if (ui.currentPage === 'analysis') html = renderAnalysisPage(project);
      else if (ui.currentPage === 'sociogram') html = renderSociogramPage(project);
      else if (ui.currentPage === 'mudahale') html = renderMudahalePage(project);
      else if (ui.currentPage === 'kanban') html = renderKanbanPage(project);
      else if (ui.currentPage === 'reports') html = renderReportsPage(project);
      else if (ui.currentPage === 'compare') html = renderComparePage(project);
      else html = renderInstitutionPage(project);
      view.innerHTML = html;
      if (ui.currentPage === 'institution') bindInstitutionPage(project);
      else if (ui.currentPage === 'participants') bindParticipantsPage(project);
      else if (ui.currentPage === 'questions') bindQuestionsPage(project);
      else if (ui.currentPage === 'responses') bindResponsesPage(project);
      else if (ui.currentPage === 'excel') bindExcelPage(project);
      else if (ui.currentPage === 'googleform') bindGoogleFormPage(project);
      else if (ui.currentPage === 'analysis') bindAnalysisPage(project);
      else if (ui.currentPage === 'sociogram') bindSociogramPage(project);
      else if (ui.currentPage === 'mudahale') bindMudahalePage(project);
      else if (ui.currentPage === 'kanban') bindKanbanPage(project);
      else if (ui.currentPage === 'reports') bindReportsPage(project);
      else if (ui.currentPage === 'compare') bindComparePage(project);
    }
    render();
  </script>

  <script>
    let deferredInstallPrompt = null;
    const installBtn = document.getElementById('install-app-btn');
    if (installBtn) {
      installBtn.addEventListener('click', async () => { if (!deferredInstallPrompt) return; deferredInstallPrompt.prompt(); await deferredInstallPrompt.userChoice; deferredInstallPrompt = null; installBtn.classList.add('hidden'); });
    }
    window.addEventListener('beforeinstallprompt', (event) => { event.preventDefault(); deferredInstallPrompt = event; installBtn?.classList.remove('hidden'); });
    window.addEventListener('appinstalled', () => { deferredInstallPrompt = null; installBtn?.classList.add('hidden'); });
    if ('serviceWorker' in navigator) { window.addEventListener('load', async () => { try { await navigator.serviceWorker.register('./sw.js'); } catch (err) { console.error('SW kayıt hatası:', err); } }); }
  </script>
</body>

</html>
